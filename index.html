<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="color-scheme" content="dark"/>
<title>INOUT</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230a0a09'/%3E%3Cpath d='M18 44V20h6v24h-6Zm22-24v24h-6V20h6Z' fill='%23e8d5a0'/%3E%3Cpath d='M30 20h4v24h-4z' fill='%23f0ece3' opacity='.65'/%3E%3C/svg%3E"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://js.stripe.com/v3"></script>
<script>
(function(){
  if (typeof supabase === 'undefined') return;
  var url = 'https://tfmbqiwxfgrwtjvoqomf.supabase.co';
  var key = 'sb_publishable_QzPgZBu5XwFXmnvD-DYCRw_EWFuhLn_';
  window._sb = window._sb || supabase.createClient(url, key, { auth: { detectSessionInUrl: true } });
  if (!window.sb) window.sb = window._sb;
  window.doSignIn = function() {
    var s = window.sb || window._sb;
    if (!s || !s.auth || !s.auth.signInWithOAuth) return;
    var opt = { provider: 'google' };
    if (window.location.origin) opt.options = { redirectTo: window.location.origin + '/' };
    s.auth.signInWithOAuth(opt).then(function(r) {
      if (r && r.data && r.data.url) window.location.href = r.data.url;
    }).catch(function(e) { console.error('Sign-in error', e); });
  };
})();
</script>
<link rel="stylesheet" href="/styles.css"/>
</head>
<body>
<div id="app-loader" aria-hidden="true" style="display:none !important">
  <div class="loader-inner">
    <div class="loader-ring"></div>
    <div class="loader-ring"></div>
    <div class="loader-ring"></div>
    <div class="loader-dash"></div>
  </div>
</div>

<div id="app">
  <header>
    <div class="logo">IN<span>OUT</span></div>
    <div class="header-right">
      <div id="online-count"><span class="dot"></span><span id="oc-num">—</span></div>
      <div id="msg-count"></div>
      <button id="user-btn" aria-label="Account" onclick="var m=document.getElementById('user-modal-backdrop');var c=document.getElementById('channel-modal-backdrop');if(c)c.style.display='none';if(m){m.style.display='block';m.setAttribute('aria-hidden','false');}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M12 12c2.761 0 5-2.239 5-5s-2.239-5-5-5-5 2.239-5 5 2.239 5 5 5Z" stroke="currentColor" stroke-width="1.8"/>
          <path d="M4 22c0-4.418 3.582-8 8-8s8 3.582 8 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </header>

  <div id="manage-bar">
    <div class="bar-scroll" id="manage-bar-scroll">
      <div class="bar-group" data-bar-group="left">
        <button id="select-toggle" class="manage-btn" data-bar-id="select-toggle">Select</button>
        <span id="select-extra" class="select-extra">
          <button id="select-all" class="manage-btn">All</button>
          <button id="select-none" class="manage-btn">None</button>
        </span>
      </div>
      <div class="bar-group" id="manage-actions" data-bar-group="actions">
        <button id="delete-selected" class="manage-btn" data-bar-id="delete-selected">Delete</button>
        <select id="move-target" data-bar-id="move-target"></select>
        <button id="move-selected" class="manage-btn" data-bar-id="move-selected">Move</button>
        <button id="export-tab" class="manage-btn" data-bar-id="export-tab">Export</button>
        <button id="view-toggle" class="manage-btn" data-bar-id="view-toggle">View ▾</button>
        <div id="view-menu">
          <label><input type="checkbox" id="field-time" checked>Time</label>
          <label><input type="checkbox" id="field-author" checked>Author</label>
        </div>
      </div>
    </div>
    <button type="button" id="bar-reorder-toggle" class="manage-btn" aria-label="Reorder bar buttons" title="Reorder bar">⋯</button>
  </div>

  <div id="feed">
    <div class="feed-inner" id="feed-inner">
      <div id="empty">
        <div class="loader-inner">
          <div class="loader-ring"></div>
          <div class="loader-ring"></div>
          <div class="loader-ring"></div>
          <div class="loader-dash"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="input-area">
    <div id="tabs"></div>
    <div id="clipboard-bubble">
      <div id="clipboard-bubble-text"></div>
      <div class="clipboard-bubble-actions">
        <button id="clipboard-paste" class="draft-btn">Paste</button>
        <button id="clipboard-dismiss" class="draft-btn">Dismiss</button>
      </div>
    </div>
    <div id="draft-bubble">
      <div id="draft-bubble-text"></div>
    <div class="draft-bubble-actions">
      <button id="draft-copy" class="draft-btn">Copy</button>
      <button id="draft-send" class="draft-btn">Send</button>
      <button id="draft-clear" class="draft-btn">Delete</button>
    </div>
    </div>
    <div class="input-wrap">
      <div class="main-input-wrap">
        <textarea
          id="msg-input"
          placeholder="say something…"
          rows="1"
          maxlength="2000"
          autocomplete="off"
          spellcheck="true"
        ></textarea>
        <button type="button" id="clear-input" class="clear-input-btn" aria-label="Clear input" title="Clear">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" aria-hidden="true">
            <path d="M18 6L6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <button type="button" id="send-btn" disabled>Send</button>
    </div>
    <div class="input-tools">
      <button id="clipboard-button" class="draft-btn">From clipboard</button>
      <div class="log-dropup-wrap">
        <button id="log-action-btn" type="button" aria-label="Action log">Log</button>
        <div id="log-dropup-panel" role="dialog" aria-label="Action log">
          <div class="log-dropup-body" id="log-dropup-body"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<button id="scroll-btn" onclick="scrollBottom()">↓ new messages</button>
<div id="toast"></div>

<div id="user-modal-backdrop" aria-hidden="true" onclick="if(event.target===this){this.style.display='none';this.setAttribute('aria-hidden','true')}">
  <div id="user-modal" role="dialog" aria-modal="true" aria-label="Account" onclick="event.stopPropagation()">
    <div class="um-top">
      <div class="um-title">Account</div>
      <button id="user-close" type="button" aria-label="Close account screen" onclick="var m=document.getElementById('user-modal-backdrop');if(m){m.style.display='none';m.setAttribute('aria-hidden','true')}">×</button>
    </div>

    <div class="um-section">
      <div class="um-label">Status</div>
      <div class="um-value" id="um-auth-status">Not signed in</div>
      <div class="um-row">
        <button class="um-btn um-btn-primary" id="um-auth-btn" type="button" onclick="var f=window.doSignIn||window.signIn;if(f)f();">Sign in</button>
      </div>
    </div>

    <div class="um-section">
      <div class="um-label">Version</div>
      <div class="um-row" style="justify-content:space-between;align-items:center;">
        <span class="um-value" id="um-version-badge">Free</span>
        <button class="um-btn" id="um-upgrade-btn">Get Pro</button>
      </div>
    </div>

    <div class="um-section">
      <div class="um-label">Nickname</div>
      <input id="um-nickname" class="cm-input" placeholder="optional nickname shown as author"/>
      <div class="um-row">
        <button class="um-btn" id="um-nick-save">Save nickname</button>
      </div>
    </div>

    <div class="um-section">
      <div class="um-label">Your user id</div>
      <div class="um-value" id="um-user-id">—</div>
      <div class="um-row">
        <button class="um-btn" id="um-copy-id" disabled>Copy ID</button>
      </div>
    </div>
  </div>
</div>

<div id="channel-modal-backdrop">
  <div id="channel-modal">
    <div class="cm-title">New feed</div>
    <div class="cm-field">
      <div class="cm-label">Name</div>
      <input id="cm-name" class="cm-input" placeholder="e.g. team-a"/>
    </div>
    <div class="cm-field">
      <div class="cm-label">Your user id</div>
      <div class="cm-input" id="cm-self" style="font-size:9px;word-break:break-all;"></div>
      <div class="cm-hint">Automatically added to this feed.</div>
    </div>
    <div class="cm-field">
      <div class="cm-label">Share with user ids</div>
      <input id="cm-others" class="cm-input" placeholder="comma separated user ids"/>
      <div class="cm-hint">Paste other INOUT user ids to share this feed.</div>
    </div>
    <div class="cm-row">
      <button class="cm-btn" id="cm-cancel">Cancel</button>
      <button class="cm-btn cm-btn-primary" id="cm-create">Create</button>
    </div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
