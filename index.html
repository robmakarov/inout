<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>INOUT</title>

<style>
body{
font-family:system-ui;
margin:0;
background:#f3f3f3;
}

#app{
max-width:700px;
margin:auto;
padding:20px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
}

#feed{
margin-top:20px;
background:white;
border-radius:8px;
padding:10px;
min-height:200px;
max-height:60vh;
overflow:auto;
}

.msg{
padding:8px;
border-bottom:1px solid #eee;
}

.time{
font-size:12px;
color:#777;
}

footer{
margin-top:10px;
display:flex;
gap:8px;
}

textarea{
flex:1;
padding:8px;
resize:none;
height:50px;
}

button{
padding:8px 14px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="app">

<header>
<h3>INOUT</h3>
<div>
<button id="login">Login</button>
<button id="logout" style="display:none;">Logout</button>
</div>
</header>

<div id="feed"></div>

<footer>
<textarea id="input" placeholder="write..."></textarea>
<button id="send">Send</button>
</footer>

</div>

<script type="module">

import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"

const SUPABASE_URL = "https://tfmbqiwxfgrwtjvoqomf.supabase.co"
const SUPABASE_KEY = "sb_publishable_QzPgZBu5XwFXmnvD-DYCRw_EWFuhLn_"

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)

const feed = document.getElementById("feed")
const input = document.getElementById("input")
const send = document.getElementById("send")

const loginBtn = document.getElementById("login")
const logoutBtn = document.getElementById("logout")

let user = null
let channel = null


function addMessage(m){

const el = document.createElement("div")
el.className = "msg"

el.innerHTML =
"<div>"+escape(m.text)+"</div>"+
"<div class='time'>"+new Date(m.created_at).toLocaleString()+"</div>"

feed.appendChild(el)
feed.scrollTop = feed.scrollHeight

}

function escape(s){
return s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]))
}

function clearFeed(){
feed.innerHTML=""
}



loginBtn.onclick = () => {

supabase.auth.signInWithOAuth({
provider:"google"
})

}



logoutBtn.onclick = async () => {

await supabase.auth.signOut()
location.reload()

}



async function sendMessage(){

if(!user) return

const text = input.value.trim()

if(!text) return

input.value=""

await supabase
.from("entries")
.insert({
text:text,
user_id:user.id
})

}



send.onclick = sendMessage

input.addEventListener("keydown",e=>{

if(e.key==="Enter" && !e.shiftKey){
e.preventDefault()
sendMessage()
}

})



async function loadMessages(){

clearFeed()

const {data} = await supabase
.from("entries")
.select("*")
.order("created_at",{ascending:true})

if(data) data.forEach(addMessage)

}



function subscribe(){

channel = supabase
.channel("entries")

.on(
"postgres_changes",
{
event:"INSERT",
schema:"public",
table:"entries",
filter:`user_id=eq.${user.id}`
},
payload=>{
addMessage(payload.new)
}
)

.subscribe()

}



async function init(){

const {data:{session}} = await supabase.auth.getSession()

if(!session){

loginBtn.style.display="inline-block"
logoutBtn.style.display="none"
return

}

user = session.user

loginBtn.style.display="none"
logoutBtn.style.display="inline-block"

await loadMessages()

subscribe()

}

init()

</script>

</body>
</html>
