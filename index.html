<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>INOUT</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:     #0a0a09;
  --bg2:    #111110;
  --line:   #1e1e1c;
  --line2:  #2a2a27;
  --dim:    #3a3a36;
  --muted:  #666660;
  --soft:   #999990;
  --text:   #e2ddd4;
  --bright: #f0ece3;
  --acc:    #e8d5a0;
  --acc2:   #b8a060;
  --mono:   'DM Mono', monospace;
  --sans:   'Syne', sans-serif;
}

html,body{height:100%;overscroll-behavior:none}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--mono);
  font-size:13px;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  display:flex;
  flex-direction:column;
  min-height:100vh;
}

/* ── HEADER ── */
header{
  position:sticky;top:0;z-index:100;
  background:var(--bg);
  border-bottom:1px solid var(--line);
  padding:0 20px;
  height:48px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}

.logo{
  font-family:var(--sans);
  font-size:15px;
  font-weight:800;
  letter-spacing:0.08em;
  color:var(--bright);
  text-transform:uppercase;
  user-select:none;
}
.logo span{color:var(--acc)}

.header-right{
  display:flex;align-items:center;gap:16px;
}

#auth-box{
  display:flex;align-items:center;gap:8px;
  font-size:11px;color:var(--dim);
}

#id-btn{
  border:1px solid var(--line2);
  background:transparent;
  color:var(--dim);
  font-family:var(--mono);
  font-size:9px;
  padding:3px 6px;
  border-radius:3px;
  cursor:pointer;
  text-transform:uppercase;
  letter-spacing:0.06em;
}

#id-btn:hover{
  background:var(--line);
  color:var(--text);
}

#auth-status{
  max-width:160px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

#auth-btn{
  border:1px solid var(--line2);
  background:transparent;
  color:var(--soft);
  font-family:var(--mono);
  font-size:10px;
  padding:3px 8px;
  border-radius:2px;
  cursor:pointer;
  letter-spacing:0.06em;
  text-transform:uppercase;
}

#auth-btn:hover{
  background:var(--line);
  color:var(--text);
}

#online-count{
  font-size:11px;
  color:var(--muted);
  letter-spacing:0.05em;
  display:flex;align-items:center;gap:6px;
}
.dot{
  width:6px;height:6px;border-radius:50%;
  background:#4a9;
  box-shadow:0 0 6px rgba(68,170,136,0.6);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

#msg-count{
  font-size:11px;color:var(--dim);letter-spacing:0.05em;
}

/* ── FEED ── */
#feed{
  flex:1;
  overflow-y:auto;
  padding:0;
  display:flex;
  flex-direction:column;
  scroll-behavior:smooth;
}
#feed::-webkit-scrollbar{width:3px}
#feed::-webkit-scrollbar-track{background:transparent}
#feed::-webkit-scrollbar-thumb{background:var(--line2);border-radius:2px}

.feed-inner{
  padding:16px 0 8px;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  min-height:100%;
  gap:0;
}

/* empty state */
#empty{
  flex:1;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:10px;
  padding:60px 20px;
  opacity:0;
  animation:fadin .6s .3s ease both;
}
#empty .e-label{
  font-family:var(--sans);
  font-size:22px;font-weight:700;
  color:var(--dim);
  letter-spacing:0.02em;
}
#empty .e-sub{
  font-size:11px;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;
}
@keyframes fadin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* message row */
.msg{
  display:grid;
  grid-template-columns:64px 1fr auto;
  align-items:baseline;
  gap:0 12px;
  padding:7px 20px;
  border-bottom:1px solid var(--line);
  transition:background .1s;
  animation:msgin .2s ease both;
}
@keyframes msgin{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.msg:hover{background:var(--bg2)}
.msg:last-child{border-bottom:none}

.msg-time{
  font-size:10px;color:var(--dim);
  letter-spacing:0.04em;
  text-align:right;
  padding-top:1px;
  white-space:nowrap;
}

.msg-text{
  font-size:13px;color:var(--text);
  word-break:break-word;
  white-space:pre-wrap;
  line-height:1.55;
}

.msg-text a{
  color:var(--acc);
  text-decoration:none;
  border-bottom:1px solid var(--acc2);
}
.msg-text a:hover{color:var(--bright)}

.msg-num{
  font-size:10px;color:var(--line2);
  letter-spacing:0.02em;
  padding-top:1px;
  user-select:none;
}

/* new message flash */
.msg.new-flash{
  background:rgba(232,213,160,0.04);
}

/* ── INPUT AREA ── */
#input-area{
  flex-shrink:0;
  background:var(--bg);
  border-top:1px solid var(--line);
  padding:12px 20px 16px;
}

.input-wrap{
  display:flex;
  align-items:flex-end;
  gap:10px;
  max-width:900px;
  margin:0 auto;
}

#msg-input{
  flex:1;
  background:var(--bg2);
  border:1px solid var(--line2);
  color:var(--text);
  font-family:var(--mono);
  font-size:13px;
  line-height:1.55;
  padding:9px 12px;
  resize:none;
  outline:none;
  border-radius:3px;
  min-height:38px;
  max-height:160px;
  overflow-y:auto;
  transition:border-color .15s, background .15s;
  scrollbar-width:none;
}
#msg-input::-webkit-scrollbar{display:none}
#msg-input::placeholder{color:var(--dim)}
#msg-input:focus{
  border-color:var(--line2);
  background:#161614;
  outline:none;
}
#msg-input:focus-visible{outline:none}

#send-btn{
  flex-shrink:0;
  height:38px;
  padding:0 16px;
  background:var(--acc);
  color:var(--bg);
  border:none;
  font-family:var(--sans);
  font-size:12px;
  font-weight:700;
  letter-spacing:0.1em;
  text-transform:uppercase;
  cursor:pointer;
  border-radius:3px;
  transition:background .12s, transform .08s;
  white-space:nowrap;
}
#send-btn:hover{background:#f0e0b0}
#send-btn:active{transform:scale(.97)}
#send-btn:disabled{background:var(--dim);color:var(--muted);cursor:default;transform:none}

.input-hint{
  text-align:center;
  font-size:10px;
  color:var(--dim);
  letter-spacing:0.06em;
  margin-top:8px;
  max-width:900px;
  margin-inline:auto;
}
.input-hint kbd{
  background:var(--line);
  border:1px solid var(--line2);
  border-radius:2px;
  padding:0 4px;
  font-family:var(--mono);
  font-size:9px;
  color:var(--soft);
}

/* ── TOAST ── */
#toast{
  position:fixed;
  bottom:80px;left:50%;transform:translateX(-50%) translateY(8px);
  background:var(--bg2);border:1px solid var(--line2);
  border-radius:3px;
  font-size:11px;color:var(--soft);
  padding:6px 14px;
  letter-spacing:0.06em;
  pointer-events:none;
  opacity:0;transition:opacity .2s,transform .2s;
  z-index:999;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── SCROLL TO BOTTOM BTN ── */
#scroll-btn{
  position:fixed;
  bottom:90px;right:20px;
  background:var(--bg2);
  border:1px solid var(--line2);
  color:var(--soft);
  font-family:var(--mono);font-size:11px;
  padding:6px 12px;
  cursor:pointer;border-radius:3px;
  opacity:0;pointer-events:none;
  transition:opacity .2s;
  z-index:50;
  letter-spacing:0.04em;
}
#scroll-btn.visible{opacity:1;pointer-events:auto}
#scroll-btn:hover{background:var(--line);color:var(--text)}

/* ── MOBILE ── */
@media(max-width:540px){
  .msg{grid-template-columns:52px 1fr;gap:0 8px}
  .msg-num{display:none}
  header{padding:0 14px}
  #input-area{padding:10px 14px 14px}
}

/* ── RED RECTANGLE / TABS ── */
.red-rect{
  width:100%;
  height:4px;
  background:#ff2b2b;
}

#tabs{
  display:flex;
  gap:6px;
  padding:6px 20px 4px;
  border-bottom:1px solid var(--line);
  background:var(--bg2);
  align-items:center;
}

.tab{
  border:1px solid var(--line2);
  background:transparent;
  color:var(--soft);
  font-family:var(--mono);
  font-size:11px;
  padding:3px 8px;
  border-radius:999px;
  cursor:pointer;
  letter-spacing:0.04em;
  text-transform:uppercase;
}

.tab-active{
  background:var(--acc);
  color:var(--bg);
  border-color:var(--acc2);
}

.tab-new{
  border-style:dashed;
  color:var(--dim);
}

.tab-close{
  margin-left:6px;
  font-size:11px;
  opacity:0.7;
}

.tab-close:hover{
  opacity:1;
}

/* ── CHANNEL MODAL ── */
#channel-modal-backdrop{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:200;
}

#channel-modal{
  background:var(--bg2);
  border:1px solid var(--line2);
  border-radius:8px;
  padding:16px 18px 14px;
  width:320px;
  max-width:90vw;
  font-size:11px;
  color:var(--soft);
}

.cm-title{
  font-family:var(--sans);
  font-size:13px;
  font-weight:600;
  color:var(--bright);
  margin-bottom:10px;
}

.cm-field{
  margin-bottom:8px;
}

.cm-label{
  text-transform:uppercase;
  letter-spacing:0.08em;
  font-size:9px;
  color:var(--dim);
  margin-bottom:3px;
}

.cm-input{
  width:100%;
  border:1px solid var(--line2);
  background:var(--bg);
  color:var(--text);
  border-radius:3px;
  padding:5px 7px;
  font-family:var(--mono);
  font-size:11px;
}

.cm-hint{
  font-size:9px;
  color:var(--dim);
  margin-top:2px;
}

.cm-row{
  display:flex;
  justify-content:flex-end;
  gap:6px;
  margin-top:10px;
}

.cm-btn{
  border:1px solid var(--line2);
  background:var(--bg);
  color:var(--soft);
  font-family:var(--mono);
  font-size:10px;
  padding:4px 10px;
  border-radius:3px;
  cursor:pointer;
  text-transform:uppercase;
  letter-spacing:0.06em;
}

.cm-btn-primary{
  background:var(--acc);
  color:var(--bg);
  border-color:var(--acc2);
}
</style>
</head>
<body>

<header>
  <div class="logo">IN<span>OUT</span></div>
  <div class="header-right">
    <div id="online-count"><span class="dot"></span><span id="oc-num">—</span></div>
    <div id="msg-count"></div>
    <div id="auth-box">
      <span id="auth-status">Not signed in</span>
      <button id="auth-btn">Sign in</button>
    </div>
    <button id="id-btn" style="display:none;">Copy ID</button>
  </div>
</header>

<div class="red-rect"></div>

<div id="tabs"></div>

<div id="feed">
  <div class="feed-inner" id="feed-inner">
    <div id="empty">
      <div class="e-label">Nothing yet.</div>
      <div class="e-sub">Be the first to say something</div>
    </div>
  </div>
</div>

<div id="input-area">
  <div class="input-wrap">
    <textarea
      id="msg-input"
      placeholder="say something…"
      rows="1"
      maxlength="2000"
      autocomplete="off"
      spellcheck="true"
    ></textarea>
    <button id="send-btn" disabled>Send</button>
  </div>
  <div class="input-hint"><kbd>Enter</kbd> to send &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> for newline</div>
</div>

<button id="scroll-btn" onclick="scrollBottom()">↓ new messages</button>
<div id="toast"></div>

<div id="channel-modal-backdrop">
  <div id="channel-modal">
    <div class="cm-title">New feed</div>
    <div class="cm-field">
      <div class="cm-label">Name</div>
      <input id="cm-name" class="cm-input" placeholder="e.g. team-a"/>
    </div>
    <div class="cm-field">
      <div class="cm-label">Your user id</div>
      <div class="cm-input" id="cm-self" style="font-size:9px;word-break:break-all;"></div>
      <div class="cm-hint">Automatically added to this feed.</div>
    </div>
    <div class="cm-field">
      <div class="cm-label">Share with user ids</div>
      <input id="cm-others" class="cm-input" placeholder="comma separated user ids"/>
      <div class="cm-hint">Paste other INOUT user ids to share this feed.</div>
    </div>
    <div class="cm-row">
      <button class="cm-btn" id="cm-cancel">Cancel</button>
      <button class="cm-btn cm-btn-primary" id="cm-create">Create</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL  = 'https://tfmbqiwxfgrwtjvoqomf.supabase.co';
const SUPABASE_ANON = 'sb_publishable_QzPgZBu5XwFXmnvD-DYCRw_EWFuhLn_';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const feedInner  = document.getElementById('feed-inner');
const feedEl     = document.getElementById('feed');
const input      = document.getElementById('msg-input');
const sendBtn    = document.getElementById('send-btn');
const emptyEl    = document.getElementById('empty');
const scrollBtn  = document.getElementById('scroll-btn');
const ocNum      = document.getElementById('oc-num');
const msgCountEl = document.getElementById('msg-count');
const toastEl    = document.getElementById('toast');
const authStatus = document.getElementById('auth-status');
const authBtn    = document.getElementById('auth-btn');
const tabsEl     = document.getElementById('tabs');
const idBtn      = document.getElementById('id-btn');
const cmBackdrop = document.getElementById('channel-modal-backdrop');
const cmName     = document.getElementById('cm-name');
const cmSelf     = document.getElementById('cm-self');
const cmOthers   = document.getElementById('cm-others');
const cmCancel   = document.getElementById('cm-cancel');
const cmCreate   = document.getElementById('cm-create');

let msgCount    = 0;
let atBottom    = true;
let channel     = null;
let presenceCh  = null;
let toastTimer  = null;
let myId        = crypto.randomUUID();
let currentUser = null;
let currentChannel = 'main';
let channels      = ['main'];
const CHANNELS_KEY = 'inout_channels_v1';

/* ═══ INIT ═══════════════════════════════════════════════ */
async function init() {
  loadChannelsList();
  await refreshAuth();
  setupAuthListener();
  setupTabs();
  if (currentUser) {
    await loadMessages();
    subscribeRealtime();
  }
  setupPresence();
  scrollBottom();
  cleanupAuthHash();
}

/* ═══ LOAD ════════════════════════════════════════════════ */
async function loadMessages() {
  if (!currentUser) return;

  const { data, error } = await sb
    .from('entries')
    .select('id, created_at, text, channel')
    .eq('channel', currentChannel)
    .order('created_at', { ascending: true })
    .limit(200);

  if (error) { console.error(error); return; }

  if (data && data.length > 0) {
    hideEmpty();
    data.forEach(m => appendMsg(m, false));
    msgCount = data.length;
    updateMsgCount();
  }
}

/* ═══ REALTIME ════════════════════════════════════════════ */
function subscribeRealtime() {
  if (channel) {
    channel.unsubscribe();
  }
  channel = sb
    .channel('entries-feed')
    .on('postgres_changes',
      { event: 'INSERT', schema: 'public', table: 'entries', filter: 'channel=eq.' + currentChannel },
      payload => {
        hideEmpty();
        const wasAtBottom = atBottom;
        appendMsg(payload.new, true);
        msgCount++;
        updateMsgCount();
        if (wasAtBottom) {
          requestAnimationFrame(scrollBottom);
        } else {
          scrollBtn.classList.add('visible');
        }
      }
    )
    .subscribe();
}

/* ═══ PRESENCE (online count) ════════════════════════════ */
function setupPresence() {
  presenceCh = sb.channel('presence-room', {
    config: { presence: { key: myId } }
  });

  presenceCh
    .on('presence', { event: 'sync' }, () => {
      const state = presenceCh.presenceState();
      ocNum.textContent = Object.keys(state).length;
    })
    .on('presence', { event: 'join' }, () => {})
    .on('presence', { event: 'leave' }, () => {})
    .subscribe(async status => {
      if (status === 'SUBSCRIBED') {
        await presenceCh.track({ online_at: new Date().toISOString() });
      }
    });
}

/* ═══ RENDER ══════════════════════════════════════════════ */
function appendMsg(msg, isNew) {
  // remove empty state
  if (emptyEl.parentNode) emptyEl.remove();

  const row  = document.createElement('div');
  row.className = 'msg' + (isNew ? ' new-flash' : '');
  if (isNew) setTimeout(() => row.classList.remove('new-flash'), 800);

  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = formatTime(msg.created_at);
  time.title = new Date(msg.created_at).toLocaleString();

  const text = document.createElement('div');
  text.className = 'msg-text';
  text.innerHTML = linkify(escapeHtml(msg.text));

  const num = document.createElement('div');
  num.className = 'msg-num';
  num.textContent = '#' + (++globalMsgNum);

  row.appendChild(time);
  row.appendChild(text);
  row.appendChild(num);
  feedInner.appendChild(row);
}

let globalMsgNum = 0;

function hideEmpty() {
  if (emptyEl.parentNode) emptyEl.remove();
}

function updateMsgCount() {
  msgCountEl.textContent = msgCount + (msgCount === 1 ? ' msg' : ' msgs');
}

/* ═══ TABS ════════════════════════════════════════════════ */
function setupTabs() {
  renderTabs();
}

function updateTabsUI() {
  if (!tabsEl) return;
  const buttons = tabsEl.querySelectorAll('.tab[data-channel]');
  buttons.forEach(btn => {
    const ch = btn.getAttribute('data-channel') || 'main';
    if (ch === currentChannel) {
      btn.classList.add('tab-active');
    } else {
      btn.classList.remove('tab-active');
    }
  });
}

function loadChannelsList() {
  try {
    const raw = localStorage.getItem(CHANNELS_KEY);
    if (!raw) return;
    const parsed = JSON.parse(raw);
    if (Array.isArray(parsed)) {
      const cleaned = parsed
        .map(x => (typeof x === 'string' ? x.trim() : ''))
        .filter(x => x && x !== 'main');
      channels = ['main', ...Array.from(new Set(cleaned))];
    }
  } catch (_) {}
}

function saveChannelsList() {
  try {
    const toSave = channels.filter(ch => ch !== 'main');
    localStorage.setItem(CHANNELS_KEY, JSON.stringify(toSave));
  } catch (_) {}
}

function renderTabs() {
  if (!tabsEl) return;
  tabsEl.innerHTML = '';

  channels.forEach(ch => {
    const btn = document.createElement('button');
    btn.className = 'tab';
    btn.setAttribute('data-channel', ch);
    btn.textContent = ch === 'main' ? 'Main' : ch;

    if (ch !== 'main') {
      const close = document.createElement('span');
      close.className = 'tab-close';
      close.textContent = '×';
      close.addEventListener('click', e => {
        e.stopPropagation();
        deleteChannel(ch);
      });
      btn.appendChild(close);
    }

    btn.addEventListener('click', () => switchChannel(ch));
    tabsEl.appendChild(btn);
  });

  const addBtn = document.createElement('button');
  addBtn.className = 'tab tab-new';
  addBtn.textContent = '+';
  addBtn.addEventListener('click', openChannelModal);
  tabsEl.appendChild(addBtn);

  updateTabsUI();
}

function switchChannel(ch) {
  if (ch === currentChannel) return;
  currentChannel = ch;
  updateTabsUI();
  if (currentUser) {
    ensureMembership().then(reloadForUser);
  } else {
    clearMessages();
  }
}

function openChannelModal() {
  if (!currentUser) {
    toast('Sign in to create a feed.');
    return;
  }
  if (!cmBackdrop || !cmName || !cmSelf || !cmOthers) return;
  cmName.value = '';
  cmOthers.value = '';
  cmSelf.textContent = currentUser.id || '';
  cmBackdrop.style.display = 'flex';
  cmName.focus();
}

function closeChannelModal() {
  if (!cmBackdrop) return;
  cmBackdrop.style.display = 'none';
}

if (cmCancel) cmCancel.addEventListener('click', closeChannelModal);
if (cmBackdrop) cmBackdrop.addEventListener('click', e => {
  if (e.target === cmBackdrop) closeChannelModal();
});
if (cmCreate) cmCreate.addEventListener('click', createChannelFromModal);

async function createChannelFromModal() {
  if (!currentUser) {
    toast('Sign in to create a feed.');
    return;
  }
  if (!cmName || !cmOthers) return;
  let name = cmName.value.trim();
  if (!name) {
    toast('Feed name is required.');
    return;
  }
  if (name.toLowerCase() === 'main') {
    toast('Feed name \"main\" is reserved.');
    return;
  }

  if (!channels.includes(name)) {
    channels.push(name);
    saveChannelsList();
    renderTabs();
  }

  const extraRaw = cmOthers.value || '';
  const extraIds = extraRaw
    .split(',')
    .map(x => x.trim())
    .filter(x => x && x !== currentUser.id);

  try {
    const rows = [
      { channel: name, user_id: currentUser.id },
      ...extraIds.map(id => ({ channel: name, user_id: id })),
    ];
    await sb.from('channel_members').upsert(rows, { onConflict: 'channel,user_id' });
  } catch (e) {
    console.error(e);
    toast('Failed to save members — ' + humanError(e.message));
  }

  closeChannelModal();
  switchChannel(name);
}

function deleteChannel(ch) {
  if (ch === 'main') return;
  channels = channels.filter(x => x !== ch);
  saveChannelsList();
  if (currentChannel === ch) {
    currentChannel = 'main';
  }
  renderTabs();
  if (currentUser) {
    reloadForUser();
  } else {
    clearMessages();
  }
}

async function ensureMembership() {
  if (!currentUser) return;
  try {
    await sb.from('channel_members').upsert({
      channel: currentChannel,
      user_id: currentUser.id
    }, { onConflict: 'channel,user_id' });
  } catch (e) {
    console.error(e);
  }
}

/* ═══ AUTH ════════════════════════════════════════════════ */
async function refreshAuth() {
  try {
    const { data, error } = await sb.auth.getUser();
    if (error) {
      console.error(error);
      currentUser = null;
    } else {
      currentUser = data.user ?? null;
    }
  } catch (e) {
    console.error(e);
    currentUser = null;
  }
  updateAuthUI();
}

function setupAuthListener() {
  sb.auth.onAuthStateChange((_event, session) => {
    const prevUser = currentUser;
    currentUser = session?.user ?? null;
    updateAuthUI();
    if (!prevUser && currentUser) {
      reloadForUser();
    } else if (prevUser && !currentUser) {
      clearMessages();
      if (channel) {
        channel.unsubscribe();
        channel = null;
      }
    }
  });

  authBtn.addEventListener('click', () => {
    if (currentUser) {
      signOut();
    } else {
      signIn();
    }
  });

  if (idBtn) {
    idBtn.addEventListener('click', copyUserId);
  }
}

function updateAuthUI() {
  if (!authStatus || !authBtn) return;

  if (currentUser) {
    const email = currentUser.email || 'Signed in';
    authStatus.textContent = email;
    authBtn.textContent = 'Sign out';
    sendBtn.disabled = !input.value.trim();
    if (idBtn) idBtn.style.display = 'inline-block';
  } else {
    authStatus.textContent = 'Not signed in';
    authBtn.textContent = 'Sign in';
    sendBtn.disabled = true;
    if (idBtn) idBtn.style.display = 'none';
  }
}

async function reloadForUser() {
  clearMessages();
  await loadMessages();
  subscribeRealtime();
}

function clearMessages() {
  feedInner.innerHTML = '';
  globalMsgNum = 0;
  msgCount = 0;
  updateMsgCount();
  if (emptyEl && !emptyEl.parentNode) {
    feedInner.appendChild(emptyEl);
  }
}

async function signIn() {
  try {
    const { error } = await sb.auth.signInWithOAuth({ provider: 'google' });
    if (error) {
      console.error(error);
      toast('Sign-in failed — ' + humanError(error.message));
    }
  } catch (e) {
    console.error(e);
    toast('Sign-in failed — ' + humanError(e.message));
  }
}

async function signOut() {
  try {
    const { error } = await sb.auth.signOut();
    if (error) {
      console.error(error);
      toast('Sign-out failed — ' + humanError(error.message));
    }
  } catch (e) {
    console.error(e);
    toast('Sign-out failed — ' + humanError(e.message));
  }
}

async function copyUserId() {
  if (!currentUser || !currentUser.id) {
    toast('No user id to copy.');
    return;
  }
  try {
    await navigator.clipboard.writeText(currentUser.id);
    toast('User id copied.');
  } catch (e) {
    console.error(e);
    toast('Failed to copy id.');
  }
}

function cleanupAuthHash() {
  if (!location.hash) return;
  if (!location.hash.includes('access_token=')) return;
  try {
    history.replaceState(null, '', location.pathname + location.search);
  } catch (_) {}
}

/* ═══ SEND ════════════════════════════════════════════════ */
async function send() {
  const text = input.value.trim();
  if (!text) return;

  if (!currentUser) {
    toast('Sign in with Google to send.');
    return;
  }

  sendBtn.disabled = true;
  input.disabled   = true;

  const { error } = await sb.from('entries').insert({
    text,
    user_id: currentUser.id,
    channel: currentChannel
  });

  input.disabled = false;

  if (error) {
    console.error(error);
    toast('Failed to send — ' + humanError(error.message));
    sendBtn.disabled = false;
  } else {
    input.value = '';
    autoResize();
    sendBtn.disabled = true;
    input.focus();
  }
}

/* ═══ INPUT HANDLING ══════════════════════════════════════ */
input.addEventListener('input', () => {
  autoResize();
  sendBtn.disabled = !input.value.trim();
});

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled) send();
  }
});

sendBtn.addEventListener('click', send);

function autoResize() {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 160) + 'px';
}

/* ═══ SCROLL ══════════════════════════════════════════════ */
feedEl.addEventListener('scroll', () => {
  const threshold = 80;
  atBottom = feedEl.scrollHeight - feedEl.scrollTop - feedEl.clientHeight < threshold;
  if (atBottom) scrollBtn.classList.remove('visible');
});

function scrollBottom() {
  feedEl.scrollTop = feedEl.scrollHeight;
  scrollBtn.classList.remove('visible');
  atBottom = true;
}

/* ═══ UTILS ═══════════════════════════════════════════════ */
function formatTime(iso) {
  const d = new Date(iso);
  const now = new Date();
  const diff = now - d;

  if (diff < 60000)  return 'just now';
  if (diff < 3600000) {
    const m = Math.floor(diff / 60000);
    return m + 'm ago';
  }
  if (diff < 86400000) {
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
  }
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

function escapeHtml(s) {
  return s
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function linkify(s) {
  return s.replace(
    /(https?:\/\/[^\s<>"']+)/g,
    '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>'
  );
}

function toast(msg, dur = 2800) {
  clearTimeout(toastTimer);
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), dur);
}

function humanError(message) {
  if (!message) return 'Something went wrong.';
  const msg = message.toLowerCase();

  if (msg.includes('row-level security')) {
    return 'Not allowed to send this message (security rules).';
  }

  if (msg.includes('failed to fetch') || msg.includes('network')) {
    return 'Network issue — check your connection.';
  }

  if (msg.includes('invalid jw') || msg.includes('jwt')) {
    return 'Session expired — refresh and sign in again.';
  }

  return message;
}

/* ═══ GO ══════════════════════════════════════════════════ */
init();
</script>
