<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>inout</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0a0a0a;color:#f0f0f0;font-family:monospace;font-size:14px}
#auth{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px}
#auth h1{color:#e8ff47;font-size:20px;letter-spacing:-0.5px}
#auth p{color:#555;font-size:12px}
#google-btn{display:flex;align-items:center;gap:10px;background:#111;border:1px solid #2a2a2a;color:#f0f0f0;font-family:monospace;font-size:13px;padding:12px 24px;cursor:pointer;transition:border-color .15s}
#google-btn:hover{border-color:#e8ff47}
#google-btn svg{width:16px;height:16px}
#app{display:none;flex-direction:column;height:100%;max-width:600px;margin:0 auto;padding:24px 16px}
#header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #1e1e1e}
#header span{color:#e8ff47;font-size:16px}
#signout{color:#555;font-size:12px;background:none;border:none;cursor:pointer;font-family:monospace}
#signout:hover{color:#f0f0f0}
#feed{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.entry{padding:8px 12px;border-left:2px solid #e8ff47;word-break:break-word;animation:in .15s ease}
@keyframes in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
#bar{display:flex;border:1px solid #2a2a2a;background:#111}
textarea{flex:1;background:transparent;border:none;outline:none;color:#f0f0f0;font-family:monospace;font-size:14px;padding:12px 16px;resize:none;min-height:48px;max-height:200px}
#btn{background:#e8ff47;color:#0a0a0a;border:none;cursor:pointer;font-family:monospace;font-size:13px;font-weight:bold;padding:0 20px;flex-shrink:0}
</style>
</head>
<body>
<div id="auth">
  <h1>inout</h1>
  <button id="google-btn">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
    continue with google
  </button>
  <p>your inputs, private to you</p>
</div>

<div id="app">
  <div id="header">
    <span>inout</span>
    <button id="signout">sign out</button>
  </div>
  <div id="feed"></div>
  <div id="bar">
    <textarea id="inp" placeholder="type anything..." rows="1"></textarea>
    <button id="btn">send</button>
  </div>
</div>

<script>
const sb=supabase.createClient('https://tfmbqiwxfgrwtjvoqomf.supabase.co','sb_publishable_QzPgZBu5XwFXmnvD-DYCRw_EWFuhLn_');
const authEl=document.getElementById('auth');
const appEl=document.getElementById('app');
const feed=document.getElementById('feed');
const inp=document.getElementById('inp');
let uid=null;

function add(text){
  const d=document.createElement('div');
  d.className='entry';
  d.textContent=text;
  feed.appendChild(d);
  feed.scrollTop=feed.scrollHeight;
}

async function load(){
  feed.innerHTML='';
  const{data}=await sb.from('entries').select('text').eq('user_id',uid).order('created_at');
  if(data)data.forEach(r=>add(r.text));
}

async function send(){
  const t=inp.value.trim();
  if(!t)return;
  inp.value='';
  inp.style.height='auto';
  const{error}=await sb.from('entries').insert({text:t,user_id:uid});
  if(!error)add(t);
}

function show(user){
  uid=user.id;
  authEl.style.display='none';
  appEl.style.display='flex';
  load();
}

function hide(){
  uid=null;
  authEl.style.display='flex';
  appEl.style.display='none';
  feed.innerHTML='';
}

sb.auth.getSession().then(({data:{session}})=>{
  if(session)show(session.user);
});

sb.auth.onAuthStateChange((_,session)=>{
  if(session)show(session.user);
  else hide();
});

document.getElementById('google-btn').onclick=()=>sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:'https://inout.vercel.app'}});
document.getElementById('signout').onclick=()=>sb.auth.signOut();
document.getElementById('btn').onclick=send;
inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}});
inp.addEventListener('input',()=>{inp.style.height='auto';inp.style.height=inp.scrollHeight+'px'});
</script>
</body>
</html>
