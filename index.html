<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>inout</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0a0a0a;color:#f0f0f0;font-family:monospace;font-size:14px;display:flex;flex-direction:column;align-items:center;justify-content:center}
#wrap{width:100%;max-width:600px;height:100%;display:flex;flex-direction:column;padding:24px 16px}
#feed{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;margin-bottom:24px}
.entry{padding:8px 12px;border-left:2px solid #e8ff47;word-break:break-word;animation:in .15s ease}
@keyframes in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
#bar{display:flex;border:1px solid #2a2a2a;background:#111}
textarea{flex:1;background:transparent;border:none;outline:none;color:#f0f0f0;font-family:monospace;font-size:14px;padding:12px 16px;resize:none;min-height:48px;max-height:200px}
#btn{background:#e8ff47;color:#0a0a0a;border:none;cursor:pointer;font-family:monospace;font-size:13px;font-weight:bold;padding:0 20px;flex-shrink:0}
</style>
</head>
<body>
<div id="wrap">
  <div id="feed"></div>
  <div id="bar">
    <textarea id="inp" placeholder="type anything..." rows="1"></textarea>
    <button id="btn">send</button>
  </div>
</div>
<script>
const sb=supabase.createClient('https://tfmbqiwxfgrwtjvoqomf.supabase.co','sb_publishable_QzPgZBu5XwFXmnvD-DYCRw_EWFuhLn_');
const feed=document.getElementById('feed');
const inp=document.getElementById('inp');

function add(text){
  const d=document.createElement('div');
  d.className='entry';
  d.textContent=text;
  feed.appendChild(d);
  feed.scrollTop=feed.scrollHeight;
}

async function load(){
  const{data}=await sb.from('entries').select('text').order('created_at');
  if(data)data.forEach(r=>add(r.text));
}

sb.channel('entries').on('postgres_changes',{event:'INSERT',schema:'public',table:'entries'},p=>add(p.new.text)).subscribe();

async function send(){
  const t=inp.value.trim();
  if(!t)return;
  inp.value='';
  inp.style.height='auto';
  await sb.from('entries').insert({text:t});
}

document.getElementById('btn').onclick=send;
inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}});
inp.addEventListener('input',()=>{inp.style.height='auto';inp.style.height=inp.scrollHeight+'px'});

load();
</script>
</body>
</html>
