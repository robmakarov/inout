<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>INOUT</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:     #0a0a09;
  --bg2:    #111110;
  --line:   #1e1e1c;
  --line2:  #2a2a27;
  --dim:    #3a3a36;
  --muted:  #666660;
  --soft:   #999990;
  --text:   #e2ddd4;
  --bright: #f0ece3;
  --acc:    #e8d5a0;
  --acc2:   #b8a060;
  --mono:   'DM Mono', monospace;
  --sans:   'Syne', sans-serif;
}

html,body{
  height:100%;
  overscroll-behavior:none;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--mono);
  font-size:13px;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  display:flex;
  flex-direction:column;
  height:100vh;
  overflow:hidden; /* only the content area scrolls */
}

/* visible scrollbar (content area) */
#feed{
  scrollbar-width:thin;
  scrollbar-color:var(--line2) var(--bg2);
}
#feed::-webkit-scrollbar{width:8px}
#feed::-webkit-scrollbar-track{background:var(--bg2)}
#feed::-webkit-scrollbar-thumb{background:var(--line2);border-radius:4px}

#app{
  flex:1;
  display:flex;
  flex-direction:column;
  min-height:0;
}

/* ── HEADER ── */
header{
  background:var(--bg);
  border-bottom:1px solid var(--line);
  padding:0 20px;
  height:48px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}

.logo{
  font-family:var(--sans);
  font-size:15px;
  font-weight:800;
  letter-spacing:0.08em;
  color:var(--bright);
  text-transform:uppercase;
  user-select:none;
}
.logo span{color:var(--acc)}

.header-right{
  display:flex;align-items:center;gap:16px;
}

/* user/account button */
#user-btn{
  width:30px;height:30px;
  display:grid;place-items:center;
  border:1px solid var(--line2);
  background:transparent;
  color:var(--soft);
  border-radius:999px;
  cursor:pointer;
  transition:background .12s, border-color .12s, color .12s;
}
#user-btn:hover{background:var(--line);color:var(--text)}
#user-btn.signed-in{
  border-color:rgba(232,213,160,0.55);
  box-shadow:0 0 0 1px rgba(232,213,160,0.12) inset;
}
#user-btn svg{display:block}

/* ── ACCOUNT DRAWER ── */
#user-modal-backdrop{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.62);
  display:none;
  z-index:250;
}

#user-modal{
  position:absolute;
  top:0;right:0;bottom:0;
  width:360px;
  max-width:92vw;
  background:var(--bg2);
  border-left:1px solid var(--line2);
  box-shadow:-24px 0 60px rgba(0,0,0,0.55);
  padding:14px 16px;
  display:flex;
  flex-direction:column;
  gap:12px;
  animation:drawerIn .18s ease both;
}

@keyframes drawerIn{from{transform:translateX(10px);opacity:0}to{transform:translateX(0);opacity:1}}

.um-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.um-title{
  font-family:var(--sans);
  font-size:13px;
  font-weight:700;
  letter-spacing:0.02em;
  color:var(--bright);
}

#user-close{
  border:1px solid var(--line2);
  background:transparent;
  color:var(--soft);
  width:28px;height:28px;
  border-radius:6px;
  cursor:pointer;
}
#user-close:hover{background:var(--line);color:var(--text)}

.um-section{
  border:1px solid var(--line2);
  background:var(--bg);
  border-radius:8px;
  padding:10px 10px;
}
.um-label{
  text-transform:uppercase;
  letter-spacing:0.08em;
  font-size:9px;
  color:var(--dim);
  margin-bottom:6px;
}
.um-value{
  font-size:11px;
  color:var(--soft);
  word-break:break-word;
}
.um-row{
  display:flex;
  gap:8px;
  align-items:center;
  margin-top:10px;
}
.um-btn{
  border:1px solid var(--line2);
  background:transparent;
  color:var(--soft);
  font-family:var(--mono);
  font-size:10px;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
  text-transform:uppercase;
  letter-spacing:0.06em;
}
.um-btn:hover{background:var(--line);color:var(--text)}
.um-btn-primary{
  background:var(--acc);
  color:var(--bg);
  border-color:var(--acc2);
}
.um-btn-primary:hover{background:#f0e0b0;color:var(--bg)}

@media(max-width:540px){
  #user-modal{
    width:100%;
    max-width:100%;
    border-left:none;
  }
}

#online-count{
  font-size:11px;
  color:var(--muted);
  letter-spacing:0.05em;
  display:flex;align-items:center;gap:6px;
}
.dot{
  width:6px;height:6px;border-radius:50%;
  background:#4a9;
  box-shadow:0 0 6px rgba(68,170,136,0.6);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

#msg-count{
  font-size:11px;color:var(--dim);letter-spacing:0.05em;
  display:none;
}

/* ── FEED ── */
#feed{
  flex:1;
  min-height:0;
  padding:0;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}

.feed-inner{
  padding:16px 0 8px;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  min-height:100%;
  gap:0;
}

/* empty state */
#empty{
  flex:1;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:10px;
  padding:60px 20px;
  opacity:0;
  animation:fadin .6s .3s ease both;
}
#empty .e-label{
  font-family:var(--sans);
  font-size:22px;font-weight:700;
  color:var(--dim);
  letter-spacing:0.02em;
}
#empty .e-sub{
  font-size:11px;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;
}
@keyframes fadin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* message row */
.msg{
  display:flex;
  flex-direction:column;
  align-items:flex-start;
  gap:2px;
  padding:4px 20px;
  border-bottom:1px solid var(--line);
  transition:background .1s;
  animation:msgin .2s ease both;
}
@keyframes msgin{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.msg:hover{background:var(--bg2)}
.msg:last-child{border-bottom:none}

.msg-meta{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:10px;
  color:var(--dim);
  letter-spacing:0.02em;
}

.msg-sender{
  font-size:10px;
  color:var(--soft);
  font-weight:500;
}

.msg-time{
  font-size:10px;
  color:var(--dim);
  letter-spacing:0.04em;
}

.msg-text{
  font-size:13px;
  color:var(--text);
  line-height:1.55;
  white-space:pre-wrap;
}

.msg-text a{
  color:var(--acc);
  text-decoration:none;
  border-bottom:1px solid var(--acc2);
}
.msg-text a:hover{color:var(--bright)}

/* new message flash */
.msg.new-flash{
  background:rgba(232,213,160,0.04);
}

/* ── INPUT AREA ── */
#input-area{
  flex-shrink:0;
  background:var(--bg);
  border-top:1px solid var(--line);
  padding:12px 20px calc(16px + env(safe-area-inset-bottom, 0px));
}

.input-wrap{
  display:flex;
  align-items:flex-end;
  gap:10px;
}

/* remote draft bubble (other device) */
#draft-bubble{
  display:none;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:6px;
  padding:6px 8px;
  border-radius:4px;
  background:var(--bg2);
  border:1px dashed var(--line2);
  font-size:11px;
  color:var(--soft);
}
#draft-bubble-text{
  flex:1;
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.draft-bubble-actions{
  display:flex;
  gap:6px;
}
.draft-btn{
  border:1px solid var(--line2);
  background:transparent;
  color:var(--soft);
  font-family:var(--mono);
  font-size:9px;
  padding:3px 6px;
  border-radius:3px;
  cursor:pointer;
  text-transform:uppercase;
  letter-spacing:0.06em;
}
.draft-btn:hover{
  background:var(--line);
  color:var(--text);
}

#msg-input{
  flex:1;
  background:var(--bg2);
  border:1px solid var(--line2);
  color:var(--text);
  font-family:var(--mono);
  font-size:13px;
  line-height:1.55;
  padding:9px 12px;
  resize:none;
  outline:none;
  border-radius:3px;
  min-height:38px;
  max-height:160px;
  overflow-y:auto;
  transition:border-color .15s, background .15s;
  scrollbar-width:none;
}
#msg-input::-webkit-scrollbar{display:none}
#msg-input::placeholder{color:var(--dim)}
#msg-input:focus{
  border-color:var(--line2);
  background:#161614;
  outline:none;
}
#msg-input:focus-visible{outline:none}

#send-btn{
  flex-shrink:0;
  height:38px;
  padding:0 16px;
  background:var(--acc);
  color:var(--bg);
  border:none;
  font-family:var(--sans);
  font-size:12px;
  font-weight:700;
  letter-spacing:0.1em;
  text-transform:uppercase;
  cursor:pointer;
  border-radius:3px;
  transition:background .12s, transform .08s;
  white-space:nowrap;
}
#send-btn:hover{background:#f0e0b0}
#send-btn:active{transform:scale(.97)}
#send-btn:disabled{background:var(--dim);color:var(--muted);cursor:default;transform:none}

.input-hint{
  text-align:center;
  font-size:10px;
  color:var(--dim);
  letter-spacing:0.06em;
  margin-top:8px;
  max-width:900px;
  margin-inline:auto;
}
.input-hint kbd{
  background:var(--line);
  border:1px solid var(--line2);
  border-radius:2px;
  padding:0 4px;
  font-family:var(--mono);
  font-size:9px;
  color:var(--soft);
}

/* ── TOAST ── */
#toast{
  position:fixed;
  bottom:80px;left:50%;transform:translateX(-50%) translateY(8px);
  background:var(--bg2);border:1px solid var(--line2);
  border-radius:3px;
  font-size:11px;color:var(--soft);
  padding:6px 14px;
  letter-spacing:0.06em;
  pointer-events:none;
  opacity:0;transition:opacity .2s,transform .2s;
  z-index:999;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── SCROLL TO BOTTOM BTN ── */
#scroll-btn{
  position:fixed;
  bottom:90px;right:20px;
  background:var(--bg2);
  border:1px solid var(--line2);
  color:var(--soft);
  font-family:var(--mono);font-size:11px;
  padding:6px 12px;
  cursor:pointer;border-radius:3px;
  opacity:0;pointer-events:none;
  transition:opacity .2s;
  z-index:50;
  letter-spacing:0.04em;
}
#scroll-btn.visible{opacity:1;pointer-events:auto}
#scroll-btn:hover{background:var(--line);color:var(--text)}

/* ── MOBILE ── */
@media(max-width:540px){
  .msg{gap:8px}
  .msg-meta{
    min-width:120px;
    max-width:160px;
  }
  header{padding:0 14px}
  #input-area{padding:10px 10px 14px}
  #tabs{
    padding:8px 10px 8px;
    margin:-10px -10px 10px;
  }
}

#tabs{
  display:flex;
  gap:6px;
  padding:8px 20px 8px;
  border-bottom:1px solid var(--line);
  background:var(--bg2);
  align-items:center;
  margin:-12px -20px 10px;
}

.tab{
  border:1px solid var(--line2);
  background:transparent;
  color:var(--soft);
  font-family:var(--mono);
  font-size:11px;
  padding:3px 8px;
  border-radius:999px;
  cursor:pointer;
  letter-spacing:0.04em;
  text-transform:uppercase;
  display:inline-flex;
  align-items:center;
  gap:6px;
}

.tab-active{
  background:var(--acc);
  color:var(--bg);
  border-color:var(--acc2);
}

.tab-shared{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:14px;height:14px;
  color:var(--dim);
}
.tab-active .tab-shared{color:rgba(10,10,9,0.75)}

.tab-badge{
  display:none;
  min-width:16px;
  height:16px;
  padding:0 5px;
  border-radius:999px;
  background:rgba(232,213,160,0.16);
  border:1px solid rgba(232,213,160,0.35);
  color:var(--acc);
  font-size:10px;
  line-height:14px;
  letter-spacing:0.02em;
}
.tab-badge.show{display:inline-flex;align-items:center;justify-content:center}
.tab-active .tab-badge{
  background:rgba(10,10,9,0.12);
  border-color:rgba(10,10,9,0.25);
  color:rgba(10,10,9,0.8);
}

.tab-new{
  border-style:dashed;
  color:var(--dim);
}

.tab-close{
  margin-left:6px;
  font-size:11px;
  opacity:0.7;
}

.tab-close:hover{
  opacity:1;
}

/* ── CHANNEL MODAL ── */
#channel-modal-backdrop{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:200;
}

#channel-modal{
  background:var(--bg2);
  border:1px solid var(--line2);
  border-radius:8px;
  padding:16px 18px 14px;
  width:320px;
  max-width:90vw;
  font-size:11px;
  color:var(--soft);
}

.cm-title{
  font-family:var(--sans);
  font-size:13px;
  font-weight:600;
  color:var(--bright);
  margin-bottom:10px;
}

.cm-field{
  margin-bottom:8px;
}

.cm-label{
  text-transform:uppercase;
  letter-spacing:0.08em;
  font-size:9px;
  color:var(--dim);
  margin-bottom:3px;
}

.cm-input{
  width:100%;
  border:1px solid var(--line2);
  background:var(--bg);
  color:var(--text);
  border-radius:3px;
  padding:5px 7px;
  font-family:var(--mono);
  font-size:11px;
}

.cm-hint{
  font-size:9px;
  color:var(--dim);
  margin-top:2px;
}

.cm-row{
  display:flex;
  justify-content:flex-end;
  gap:6px;
  margin-top:10px;
}

.cm-btn{
  border:1px solid var(--line2);
  background:var(--bg);
  color:var(--soft);
  font-family:var(--mono);
  font-size:10px;
  padding:4px 10px;
  border-radius:3px;
  cursor:pointer;
  text-transform:uppercase;
  letter-spacing:0.06em;
}

.cm-btn-primary{
  background:var(--acc);
  color:var(--bg);
  border-color:var(--acc2);
}
</style>
</head>
<body>

<div id="app">
  <header>
    <div class="logo">IN<span>OUT</span></div>
    <div class="header-right">
      <div id="online-count"><span class="dot"></span><span id="oc-num">—</span></div>
      <div id="msg-count"></div>
      <button id="user-btn" aria-label="Account" title="Account">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M12 12c2.761 0 5-2.239 5-5s-2.239-5-5-5-5 2.239-5 5 2.239 5 5 5Z" stroke="currentColor" stroke-width="1.8"/>
          <path d="M4 22c0-4.418 3.582-8 8-8s8 3.582 8 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </header>

  <div id="feed">
    <div class="feed-inner" id="feed-inner">
      <div id="empty">
        <div class="e-label">Nothing yet.</div>
        <div class="e-sub">Be the first to say something</div>
      </div>
    </div>
  </div>

  <div id="input-area">
    <div id="tabs"></div>
    <div id="draft-bubble">
      <div id="draft-bubble-text"></div>
    <div class="draft-bubble-actions">
      <button id="draft-copy" class="draft-btn">Copy</button>
      <button id="draft-send" class="draft-btn">Send</button>
      <button id="draft-clear" class="draft-btn">Delete</button>
    </div>
    </div>
    <div class="input-wrap">
      <textarea
        id="msg-input"
        placeholder="say something…"
        rows="1"
        maxlength="2000"
        autocomplete="off"
        spellcheck="true"
      ></textarea>
      <button id="send-btn" disabled>Send</button>
    </div>
    <div class="input-hint"><kbd>Enter</kbd> to send &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> for newline</div>
  </div>
</div>

<button id="scroll-btn" onclick="scrollBottom()">↓ new messages</button>
<div id="toast"></div>

<div id="user-modal-backdrop" aria-hidden="true">
  <div id="user-modal" role="dialog" aria-modal="true" aria-label="Account">
    <div class="um-top">
      <div class="um-title">Account</div>
      <button id="user-close" aria-label="Close account screen" title="Close">×</button>
    </div>

    <div class="um-section">
      <div class="um-label">Status</div>
      <div class="um-value" id="um-auth-status">Not signed in</div>
      <div class="um-row">
        <button class="um-btn um-btn-primary" id="um-auth-btn">Sign in</button>
      </div>
    </div>

    <div class="um-section">
      <div class="um-label">Nickname</div>
      <input id="um-nickname" class="cm-input" placeholder="optional nickname shown as author"/>
      <div class="um-row">
        <button class="um-btn" id="um-nick-save">Save nickname</button>
      </div>
    </div>

    <div class="um-section">
      <div class="um-label">Your user id</div>
      <div class="um-value" id="um-user-id">—</div>
      <div class="um-row">
        <button class="um-btn" id="um-copy-id" disabled>Copy ID</button>
      </div>
    </div>
  </div>
</div>

<div id="channel-modal-backdrop">
  <div id="channel-modal">
    <div class="cm-title">New feed</div>
    <div class="cm-field">
      <div class="cm-label">Name</div>
      <input id="cm-name" class="cm-input" placeholder="e.g. team-a"/>
    </div>
    <div class="cm-field">
      <div class="cm-label">Your user id</div>
      <div class="cm-input" id="cm-self" style="font-size:9px;word-break:break-all;"></div>
      <div class="cm-hint">Automatically added to this feed.</div>
    </div>
    <div class="cm-field">
      <div class="cm-label">Share with user ids</div>
      <input id="cm-others" class="cm-input" placeholder="comma separated user ids"/>
      <div class="cm-hint">Paste other INOUT user ids to share this feed.</div>
    </div>
    <div class="cm-row">
      <button class="cm-btn" id="cm-cancel">Cancel</button>
      <button class="cm-btn cm-btn-primary" id="cm-create">Create</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL  = 'https://tfmbqiwxfgrwtjvoqomf.supabase.co';
const SUPABASE_ANON = 'sb_publishable_QzPgZBu5XwFXmnvD-DYCRw_EWFuhLn_';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const feedInner  = document.getElementById('feed-inner');
const feedEl     = document.getElementById('feed');
const inputArea  = document.getElementById('input-area');
const input      = document.getElementById('msg-input');
const sendBtn    = document.getElementById('send-btn');
const emptyEl    = document.getElementById('empty');
const scrollBtn  = document.getElementById('scroll-btn');
const ocNum      = document.getElementById('oc-num');
const msgCountEl = document.getElementById('msg-count');
const toastEl    = document.getElementById('toast');
const userBtn    = document.getElementById('user-btn');
const umBackdrop = document.getElementById('user-modal-backdrop');
const umClose    = document.getElementById('user-close');
const umAuthStatus = document.getElementById('um-auth-status');
const umAuthBtn    = document.getElementById('um-auth-btn');
const umUserId     = document.getElementById('um-user-id');
const umCopyIdBtn  = document.getElementById('um-copy-id');
const umNickname   = document.getElementById('um-nickname');
const umNickSave   = document.getElementById('um-nick-save');
const tabsEl     = document.getElementById('tabs');
const draftBubble    = document.getElementById('draft-bubble');
const draftBubbleTxt = document.getElementById('draft-bubble-text');
const draftCopyBtn   = document.getElementById('draft-copy');
const draftSendBtn   = document.getElementById('draft-send');
const draftClearBtn  = document.getElementById('draft-clear');
const cmBackdrop = document.getElementById('channel-modal-backdrop');
const cmName     = document.getElementById('cm-name');
const cmSelf     = document.getElementById('cm-self');
const cmOthers   = document.getElementById('cm-others');
const cmCancel   = document.getElementById('cm-cancel');
const cmCreate   = document.getElementById('cm-create');

let msgCount    = 0;
let atBottom    = true;
let presenceCh  = null;
let toastTimer     = null;
let myId           = crypto.randomUUID();
let currentUser    = null;
let currentChannel = 'main';
let channels       = ['main'];
const CHANNELS_KEY  = 'inout_channels_v1';
const seenIds       = new Set();
const channelScroll = new Map();
const unreadCounts  = new Map(); // channel -> number
const sharedChannels = new Set(); // channel -> has other members
let channelSubs = new Map(); // channel -> realtime subscription
let draftChannel = null;
let latestRemoteDraft = '';

function updateTabBadge(ch) {
  if (!tabsEl) return;
  const btn = tabsEl.querySelector('.tab[data-channel="' + CSS.escape(ch) + '"]');
  if (!btn) return;
  const badge = btn.querySelector('.tab-badge');
  if (!badge) return;
  const n = unreadCounts.get(ch) || 0;
  if (n > 0) {
    badge.textContent = String(n);
    badge.classList.add('show');
  } else {
    badge.textContent = '';
    badge.classList.remove('show');
  }
}

function updateAllTabBadges() {
  channels.forEach(ch => updateTabBadge(ch));
}

function isNearBottom() {
  const base = 80;
  const extra = (inputArea && inputArea.offsetHeight) ? inputArea.offsetHeight : 120;
  const threshold = base + extra;
  return feedEl.scrollHeight - feedEl.scrollTop - feedEl.clientHeight < threshold;
}

/* ═══ INIT ═══════════════════════════════════════════════ */
async function init() {
  loadChannelsList();
  await refreshAuth();
  if (currentUser) {
    await syncChannelsFromServer();
  }
  setupAuthListener();
  setupTabs();
  if (currentUser) {
    await loadMessages();
    subscribeRealtimeAll();
    setupDraftChannel();
  }
  setupPresence();
  scrollBottom();
  cleanupAuthHash();
  if (input) input.focus();
}

function openUserModal() {
  if (!umBackdrop) return;
  umBackdrop.style.display = 'block';
  umBackdrop.setAttribute('aria-hidden', 'false');
}

function closeUserModal() {
  if (!umBackdrop) return;
  umBackdrop.style.display = 'none';
  umBackdrop.setAttribute('aria-hidden', 'true');
}

if (userBtn) userBtn.addEventListener('click', openUserModal);
if (umClose) umClose.addEventListener('click', closeUserModal);
if (umBackdrop) umBackdrop.addEventListener('click', e => {
  if (e.target === umBackdrop) closeUserModal();
});
document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && umBackdrop && umBackdrop.style.display === 'block') closeUserModal();
});

/* ═══ LOAD ════════════════════════════════════════════════ */
async function loadMessages() {
  if (!currentUser) return;

  const { data, error } = await sb
    .from('entries')
    .select('id, created_at, text, channel, user_id')
    .eq('channel', currentChannel)
    .order('created_at', { ascending: true })
    .limit(200);

  if (error) { console.error(error); return; }

  if (data && data.length > 0) {
    renderInitialMessages(data);
    msgCount = data.length;
    updateMsgCount();
  }
}

/* ═══ REALTIME ════════════════════════════════════════════ */
function subscribeRealtimeAll() {
  for (const sub of channelSubs.values()) {
    try { sub.unsubscribe(); } catch (_) {}
  }
  channelSubs = new Map();

  if (!currentUser) return;

  channels.forEach(ch => {
    const sub = sb
      .channel('entries-' + ch)
      .on(
        'postgres_changes',
        { event: 'INSERT', schema: 'public', table: 'entries', filter: 'channel=eq.' + ch },
        payload => onInsertForChannel(ch, payload.new)
      )
      .subscribe();
    channelSubs.set(ch, sub);
  });
}

function onInsertForChannel(ch, msg) {
  if (ch === currentChannel) {
    hideEmpty();
    appendMsg(msg, true);
    msgCount++;
    updateMsgCount();
    // Always keep the newest message visible (messenger behavior).
    requestAnimationFrame(scrollBottom);
    return;
  }

  const next = (unreadCounts.get(ch) || 0) + 1;
  unreadCounts.set(ch, next);
  updateTabBadge(ch);
}

/* ═══ PRESENCE (online count) ════════════════════════════ */
function setupPresence() {
  presenceCh = sb.channel('presence-room', {
    config: { presence: { key: myId } }
  });

  presenceCh
    .on('presence', { event: 'sync' }, () => {
      const state = presenceCh.presenceState();
      ocNum.textContent = Object.keys(state).length;
    })
    .on('presence', { event: 'join' }, () => {})
    .on('presence', { event: 'leave' }, () => {})
    .subscribe(async status => {
      if (status === 'SUBSCRIBED') {
        await presenceCh.track({ online_at: new Date().toISOString() });
      }
    });
}

/* ═══ CROSS-DEVICE DRAFTS (SAME USER) ══════════════════════ */
function setupDraftChannel() {
  teardownDraftChannel();
  latestRemoteDraft = '';
  if (!currentUser) return;

  draftChannel = sb
    .channel('drafts-' + currentUser.id, {
      config: {
        broadcast: { self: false }
      }
    })
    .on('broadcast', { event: 'draft' }, payload => {
      const data = payload.payload || {};
      if (!data || data.from === myId) return; // ignore own events
      const text = (data.text || '').trim();
      latestRemoteDraft = text;
      if (text) {
        showDraftBubble(text);
      } else {
        hideDraftBubble();
      }
    })
    .subscribe();
}

function teardownDraftChannel() {
  latestRemoteDraft = '';
  hideDraftBubble();
  if (draftChannel) {
    try { draftChannel.unsubscribe(); } catch (_) {}
    draftChannel = null;
  }
}

function broadcastDraft(text) {
  if (!draftChannel || !currentUser) return;
  draftChannel.send({
    type: 'broadcast',
    event: 'draft',
    payload: { from: myId, text: text || '' }
  });
}

function showDraftBubble(text) {
  if (!draftBubble || !draftBubbleTxt) return;
  draftBubbleTxt.textContent = text;
  draftBubble.style.display = 'flex';
}

function hideDraftBubble() {
  if (!draftBubble) return;
  draftBubble.style.display = 'none';
  if (draftBubbleTxt) draftBubbleTxt.textContent = '';
}

/* ═══ RENDER ══════════════════════════════════════════════ */
function createMsgRow(msg, isNew) {
  if (msg && typeof msg.id !== 'undefined') {
    if (seenIds.has(msg.id)) return null;
    seenIds.add(msg.id);
  }
  // remove empty state
  if (emptyEl.parentNode) emptyEl.remove();

  const row  = document.createElement('div');
  row.className = 'msg' + (isNew ? ' new-flash' : '');
  if (isNew) setTimeout(() => row.classList.remove('new-flash'), 800);
  if (typeof msg.id !== 'undefined') {
    row.dataset.id = String(msg.id);
  }

  const meta = document.createElement('div');
  meta.className = 'msg-meta';

  const sender = document.createElement('div');
  sender.className = 'msg-sender';
  if (msg.user_id && currentUser && msg.user_id === currentUser.id) {
    const nick = currentUser.user_metadata && currentUser.user_metadata.nickname
      ? String(currentUser.user_metadata.nickname)
      : 'you';
    sender.textContent = nick;
  } else if (msg.user_id) {
    sender.textContent = String(msg.user_id);
  } else {
    sender.textContent = 'unknown';
  }
  sender.title = sender.textContent;

  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = formatTime(msg.created_at);
  time.title = new Date(msg.created_at).toLocaleString();

  meta.appendChild(sender);
  meta.appendChild(time);

  const text = document.createElement('div');
  text.className = 'msg-text';
  text.innerHTML = linkify(escapeHtml(msg.text));
  text.title = msg.text || '';

  row.appendChild(meta);
  row.appendChild(text);
  return row;
}

function appendMsg(msg, isNew) {
  const row = createMsgRow(msg, isNew);
  if (!row) return;
  feedInner.appendChild(row);
}

function renderInitialMessages(list) {
  if (!Array.isArray(list) || list.length === 0) return;
  hideEmpty();
  const frag = document.createDocumentFragment();
  for (const msg of list) {
    const row = createMsgRow(msg, false);
    if (row) frag.appendChild(row);
  }
  feedInner.appendChild(frag);
}

let globalMsgNum = 0;

function hideEmpty() {
  if (emptyEl.parentNode) emptyEl.remove();
}

function updateMsgCount() {
  msgCountEl.textContent = msgCount + (msgCount === 1 ? ' msg' : ' msgs');
}

/* ═══ TABS ════════════════════════════════════════════════ */
function setupTabs() {
  renderTabs();
}

function updateTabsUI() {
  if (!tabsEl) return;
  const buttons = tabsEl.querySelectorAll('.tab[data-channel]');
  buttons.forEach(btn => {
    const ch = btn.getAttribute('data-channel') || 'main';
    if (ch === currentChannel) {
      btn.classList.add('tab-active');
    } else {
      btn.classList.remove('tab-active');
    }
  });
}

function loadChannelsList() {
  try {
    const raw = localStorage.getItem(CHANNELS_KEY);
    if (!raw) return;
    const parsed = JSON.parse(raw);
    if (Array.isArray(parsed)) {
      const cleaned = parsed
        .map(x => (typeof x === 'string' ? x.trim() : ''))
        .filter(x => x && x !== 'main');
      channels = ['main', ...Array.from(new Set(cleaned))];
    }
  } catch (_) {}
}

function saveChannelsList() {
  try {
    const toSave = channels.filter(ch => ch !== 'main');
    localStorage.setItem(CHANNELS_KEY, JSON.stringify(toSave));
  } catch (_) {}
}

function renderTabs() {
  if (!tabsEl) return;
  tabsEl.innerHTML = '';

  channels.forEach(ch => {
    const btn = document.createElement('button');
    btn.className = 'tab';
    btn.setAttribute('data-channel', ch);
    const label = document.createElement('span');
    label.textContent = ch === 'main' ? 'Main' : ch;
    btn.appendChild(label);

    if (sharedChannels.has(ch) && ch !== 'main') {
      const shared = document.createElement('span');
      shared.className = 'tab-shared';
      shared.title = 'Shared';
      shared.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M16 11c1.657 0 3-1.567 3-3.5S17.657 4 16 4s-3 1.567-3 3.5S14.343 11 16 11Z" stroke="currentColor" stroke-width="1.6"/><path d="M8 11c1.657 0 3-1.567 3-3.5S9.657 4 8 4 5 5.567 5 7.5 6.343 11 8 11Z" stroke="currentColor" stroke-width="1.6"/><path d="M4 20c0-3.314 2.686-6 6-6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M14 14c3.314 0 6 2.686 6 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><path d="M10 14c1.7 0 3.24.71 4.33 1.85" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>';
      btn.appendChild(shared);
    }

    const badge = document.createElement('span');
    badge.className = 'tab-badge';
    btn.appendChild(badge);

    if (ch !== 'main') {
      const close = document.createElement('span');
      close.className = 'tab-close';
      close.textContent = '×';
      close.addEventListener('click', e => {
        e.stopPropagation();
        deleteChannel(ch);
      });
      btn.appendChild(close);
    }

    btn.addEventListener('click', () => switchChannel(ch));
    tabsEl.appendChild(btn);
  });

  const addBtn = document.createElement('button');
  addBtn.className = 'tab tab-new';
  addBtn.textContent = '+';
  addBtn.addEventListener('click', openChannelModal);
  tabsEl.appendChild(addBtn);

  updateTabsUI();
  updateAllTabBadges();
}

async function syncChannelsFromServer() {
  if (!currentUser) return;
  try {
    const { data, error } = await sb
      .from('channel_members')
      .select('channel')
      .eq('user_id', currentUser.id);
    if (error) {
      console.error(error);
      return;
    }
    const server = (data || [])
      .map(r => (typeof r.channel === 'string' ? r.channel.trim() : ''))
      .filter(ch => ch && ch !== 'main');
    const merged = new Set(['main', ...channels, ...server]);
    channels = Array.from(merged);
    saveChannelsList();
    await refreshSharedFlags();
    renderTabs();
    subscribeRealtimeAll();
  } catch (e) {
    console.error(e);
  }
}

async function refreshSharedFlags() {
  if (!currentUser) return;
  sharedChannels.clear();
  try {
    // mark channel as shared if it has any member other than me
    const { data, error } = await sb
      .from('channel_members')
      .select('channel,user_id')
      .in('channel', channels)
      .neq('user_id', currentUser.id);
    if (error) {
      console.error(error);
      return;
    }
    (data || []).forEach(r => {
      if (r && typeof r.channel === 'string') sharedChannels.add(r.channel);
    });
  } catch (e) {
    console.error(e);
  }
}

function switchChannel(ch) {
  if (ch === currentChannel) return;
  if (feedEl) {
    channelScroll.set(currentChannel, feedEl.scrollTop);
  }
  currentChannel = ch;
  unreadCounts.set(ch, 0);
  updateTabsUI();
  updateTabBadge(ch);
  if (input) input.focus();
  if (currentUser) {
    ensureMembership().then(reloadForUser);
  } else {
    clearMessages();
  }
}

function openChannelModal() {
  if (!currentUser) {
    toast('Sign in to create a feed.');
    return;
  }
  if (!cmBackdrop || !cmName || !cmSelf || !cmOthers) return;
  cmName.value = '';
  cmOthers.value = '';
  cmSelf.textContent = currentUser.id || '';
  cmBackdrop.style.display = 'flex';
  cmName.focus();
}

function closeChannelModal() {
  if (!cmBackdrop) return;
  cmBackdrop.style.display = 'none';
}

if (cmCancel) cmCancel.addEventListener('click', closeChannelModal);
if (cmBackdrop) cmBackdrop.addEventListener('click', e => {
  if (e.target === cmBackdrop) closeChannelModal();
});
if (cmCreate) cmCreate.addEventListener('click', createChannelFromModal);

async function createChannelFromModal() {
  if (!currentUser) {
    toast('Sign in to create a feed.');
    return;
  }
  if (!cmName || !cmOthers) return;
  let name = cmName.value.trim();
  if (!name) {
    toast('Feed name is required.');
    return;
  }
  if (name.toLowerCase() === 'main') {
    toast('Feed name \"main\" is reserved.');
    return;
  }

  if (!channels.includes(name)) {
    channels.push(name);
    saveChannelsList();
    renderTabs();
  }

  const extraRaw = cmOthers.value || '';
  const extraIds = extraRaw
    .split(',')
    .map(x => x.trim())
    .filter(x => x && x !== currentUser.id);

  try {
    const rows = [
      { channel: name, user_id: currentUser.id, creator_id: currentUser.id },
      ...extraIds.map(id => ({ channel: name, user_id: id, creator_id: currentUser.id })),
    ];
    await sb.from('channel_members').upsert(rows, { onConflict: 'channel,user_id' });
  } catch (e) {
    console.error(e);
    toast('Failed to save members — ' + humanError(e.message));
  }

  if (extraIds.length > 0) sharedChannels.add(name);

  closeChannelModal();
  switchChannel(name);
}

function deleteChannel(ch) {
  if (ch === 'main') return;
  channels = channels.filter(x => x !== ch);
  saveChannelsList();
  unreadCounts.delete(ch);
  sharedChannels.delete(ch);
  if (currentChannel === ch) {
    currentChannel = 'main';
  }
  renderTabs();
  subscribeRealtimeAll();
  if (currentUser) {
    reloadForUser();
  } else {
    clearMessages();
  }
}

async function ensureMembership() {
  if (!currentUser) return;
  try {
    await sb.from('channel_members').upsert({
      channel: currentChannel,
      user_id: currentUser.id,
      creator_id: currentUser.id
    }, { onConflict: 'channel,user_id' });
  } catch (e) {
    console.error(e);
  }
}

/* ═══ AUTH ════════════════════════════════════════════════ */
async function refreshAuth() {
  try {
    const { data, error } = await sb.auth.getUser();
    if (error) {
      console.error(error);
      currentUser = null;
    } else {
      currentUser = data.user ?? null;
    }
  } catch (e) {
    console.error(e);
    currentUser = null;
  }
  updateAuthUI();
  if (currentUser) {
    await refreshSharedFlags();
    renderTabs();
    subscribeRealtimeAll();
    setupDraftChannel();
  } else {
    sharedChannels.clear();
    unreadCounts.clear();
    renderTabs();
    subscribeRealtimeAll();
    teardownDraftChannel();
  }
}

function setupAuthListener() {
  sb.auth.onAuthStateChange(async (_event, session) => {
    const prevUser = currentUser;
    currentUser = session?.user ?? null;
    updateAuthUI();
    if (!prevUser && currentUser) {
      await syncChannelsFromServer();
      reloadForUser();
      setupDraftChannel();
    } else if (prevUser && !currentUser) {
      clearMessages();
      teardownDraftChannel();
    }
  });

  if (umAuthBtn) umAuthBtn.addEventListener('click', () => {
    if (currentUser) {
      signOut();
    } else {
      signIn();
    }
  });

  if (umCopyIdBtn) umCopyIdBtn.addEventListener('click', copyUserId);

  if (umNickSave && umNickname) {
    umNickSave.addEventListener('click', saveNickname);
  }
}

async function saveNickname() {
  if (!currentUser || !umNickname) return;
  const raw = umNickname.value.trim();
  const nick = raw.slice(0, 40);
  try {
    const { data, error } = await sb.auth.updateUser({
      data: { nickname: nick || null }
    });
    if (error) {
      console.error(error);
      toast('Failed to save nickname — ' + humanError(error.message));
      return;
    }
    if (data && data.user) {
      currentUser = data.user;
      updateAuthUI();
      toast('Nickname saved.');
    }
  } catch (e) {
    console.error(e);
    toast('Failed to save nickname — ' + humanError(e.message));
  }
}

function updateAuthUI() {
  if (userBtn) userBtn.classList.toggle('signed-in', !!currentUser);

  if (currentUser) {
    const email = currentUser.email || 'Signed in';
    const nick  = currentUser.user_metadata && currentUser.user_metadata.nickname
      ? String(currentUser.user_metadata.nickname)
      : '';
    if (umAuthStatus) umAuthStatus.textContent = email;
    if (umAuthBtn) umAuthBtn.textContent = 'Sign out';
    if (umNickname) umNickname.value = nick;
    sendBtn.disabled = !input.value.trim();
    if (umUserId) umUserId.textContent = currentUser.id || '—';
    if (umCopyIdBtn) umCopyIdBtn.disabled = !currentUser.id;
  } else {
    if (umAuthStatus) umAuthStatus.textContent = 'Not signed in';
    if (umAuthBtn) umAuthBtn.textContent = 'Sign in';
    sendBtn.disabled = true;
    if (umUserId) umUserId.textContent = '—';
    if (umCopyIdBtn) umCopyIdBtn.disabled = true;
    if (umNickname) umNickname.value = '';
  }
}

async function reloadForUser() {
  clearMessages();
  await loadMessages();
  subscribeRealtimeAll();
  // Always jump to the latest message when opening a tab.
  requestAnimationFrame(scrollBottom);
}

function clearMessages() {
  feedInner.innerHTML = '';
  globalMsgNum = 0;
  msgCount = 0;
  updateMsgCount();
  seenIds.clear();
  if (emptyEl && !emptyEl.parentNode) {
    feedInner.appendChild(emptyEl);
  }
}

async function signIn() {
  try {
    const { error } = await sb.auth.signInWithOAuth({ provider: 'google' });
    if (error) {
      console.error(error);
      toast('Sign-in failed — ' + humanError(error.message));
    }
  } catch (e) {
    console.error(e);
    toast('Sign-in failed — ' + humanError(e.message));
  }
}

async function signOut() {
  try {
    const { error } = await sb.auth.signOut();
    if (error) {
      console.error(error);
      toast('Sign-out failed — ' + humanError(error.message));
    }
  } catch (e) {
    console.error(e);
    toast('Sign-out failed — ' + humanError(e.message));
  }
}

async function copyUserId() {
  if (!currentUser || !currentUser.id) {
    toast('No user id to copy.');
    return;
  }
  try {
    await navigator.clipboard.writeText(currentUser.id);
    toast('User id copied.');
  } catch (e) {
    console.error(e);
    toast('Failed to copy id.');
  }
}

function cleanupAuthHash() {
  if (!location.hash) return;
  if (!location.hash.includes('access_token=')) return;
  try {
    history.replaceState(null, '', location.pathname + location.search);
  } catch (_) {}
}

/* ═══ SEND ════════════════════════════════════════════════ */
async function send() {
  const text = input.value.trim();
  if (!text) return;

  await sendText(text);
}

async function sendText(text) {
  const trimmed = (text || '').trim();
  if (!trimmed) return;

  if (!currentUser) {
    toast('Sign in with Google to send.');
    return;
  }

  sendBtn.disabled = true;
  input.disabled   = true;

  const { data, error } = await sb
    .from('entries')
    .insert({
      text,
      user_id: currentUser.id,
      channel: currentChannel
    })
    .select('id, created_at, text, channel')
    .single();

  input.disabled = false;

  if (error) {
    console.error(error);
    toast('Failed to send — ' + humanError(error.message));
    sendBtn.disabled = false;
  } else {
    if (data && data.channel === currentChannel) {
      hideEmpty();
      appendMsg(data, true);
      msgCount++;
      updateMsgCount();
    }
    input.value = '';
    autoResize();
    sendBtn.disabled = true;
    input.focus();
  }
}

/* ═══ INPUT HANDLING ══════════════════════════════════════ */
input.addEventListener('input', () => {
  autoResize();
  sendBtn.disabled = !input.value.trim();
  // send current draft for this user so other devices see it
  if (currentUser) {
    broadcastDraft(input.value);
  }
});

input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled) send();
  }
});

sendBtn.addEventListener('click', send);

if (draftCopyBtn) {
  draftCopyBtn.addEventListener('click', () => {
    if (!latestRemoteDraft) return;
    try {
      navigator.clipboard.writeText(latestRemoteDraft);
      toast('Draft copied to clipboard.');
    } catch (e) {
      console.error(e);
      toast('Could not copy draft.');
    }
  });
}

if (draftSendBtn) {
  draftSendBtn.addEventListener('click', () => {
    if (!latestRemoteDraft) return;
    sendText(latestRemoteDraft);
  });
}

if (draftClearBtn) {
  draftClearBtn.addEventListener('click', () => {
    latestRemoteDraft = '';
    hideDraftBubble();
    if (currentUser) {
      broadcastDraft('');
    }
  });
}

function autoResize() {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 160) + 'px';
}

/* ═══ SCROLL ══════════════════════════════════════════════ */
feedEl.addEventListener('scroll', () => {
  atBottom = isNearBottom();
  if (atBottom) scrollBtn.classList.remove('visible');
}, { passive: true });

function scrollBottom() {
  feedEl.scrollTop = feedEl.scrollHeight;
  scrollBtn.classList.remove('visible');
  atBottom = true;
}

/* ═══ UTILS ═══════════════════════════════════════════════ */
function formatTime(iso) {
  const d = new Date(iso);
  const now = new Date();
  const diff = now - d;

  if (diff < 60000)  return 'just now';
  if (diff < 3600000) {
    const m = Math.floor(diff / 60000);
    return m + 'm ago';
  }
  if (diff < 86400000) {
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
  }
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

function escapeHtml(s) {
  return s
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function linkify(s) {
  return s.replace(
    /(https?:\/\/[^\s<>"']+)/g,
    '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>'
  );
}

function toast(msg, dur = 2800) {
  clearTimeout(toastTimer);
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), dur);
}

function humanError(message) {
  if (!message) return 'Something went wrong.';
  const msg = message.toLowerCase();

  if (msg.includes('row-level security')) {
    return 'Not allowed to send this message (security rules).';
  }

  if (msg.includes('failed to fetch') || msg.includes('network')) {
    return 'Network issue — check your connection.';
  }

  if (msg.includes('invalid jw') || msg.includes('jwt')) {
    return 'Session expired — refresh and sign in again.';
  }

  return message;
}

init();
</script>
