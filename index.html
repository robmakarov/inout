<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>inout</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0a0a0a;color:#f0f0f0;font-family:monospace;font-size:14px}
#feed{position:fixed;top:0;left:0;right:0;bottom:48px;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
.entry{padding:8px 12px;border-left:2px solid #e8ff47;color:#f0f0f0;word-break:break-word;animation:in .15s ease}
@keyframes in{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
#bar{position:fixed;bottom:0;left:0;right:0;height:48px;display:flex;border-top:1px solid #1e1e1e}
#inp{flex:1;background:#111;border:none;outline:none;color:#f0f0f0;font-family:monospace;font-size:14px;padding:0 16px}
#btn{background:#e8ff47;color:#0a0a0a;border:none;cursor:pointer;font-family:monospace;font-size:13px;font-weight:bold;padding:0 20px}
</style>
</head>
<body>
<div id="feed"></div>
<div id="bar">
  <input id="inp" placeholder="type anything..." autocomplete="off"/>
  <button id="btn">send</button>
</div>
<script>
const sb=supabase.createClient('https://tfmbqiwxfgrwtjvoqomf.supabase.co','sb_publishable_QzPgZBu5XwFXmnvD-DYCRw_EWFuhLn_');
const feed=document.getElementById('feed');
const inp=document.getElementById('inp');

function add(text){
  const d=document.createElement('div');
  d.className='entry';
  d.textContent=text;
  feed.appendChild(d);
  feed.scrollTop=feed.scrollHeight;
}

async function load(){
  const{data}=await sb.from('entries').select('text').order('created_at');
  if(data)data.forEach(r=>add(r.text));
}

sb.channel('entries').on('postgres_changes',{event:'INSERT',schema:'public',table:'entries'},p=>add(p.new.text)).subscribe();

async function send(){
  const t=inp.value.trim();
  if(!t)return;
  inp.value='';
  await sb.from('entries').insert({text:t});
}

document.getElementById('btn').onclick=send;
inp.onkeydown=e=>e.key==='Enter'&&send();
load();
</script>
</body>
</html>
