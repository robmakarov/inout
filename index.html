<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="color-scheme" content="dark"/>
<title>INOUT</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230a0a09'/%3E%3Cpath d='M18 44V20h6v24h-6Zm22-24v24h-6V20h6Z' fill='%23e8d5a0'/%3E%3Cpath d='M30 20h4v24h-4z' fill='%23f0ece3' opacity='.65'/%3E%3C/svg%3E"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://js.stripe.com/v3"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  color-scheme:dark;
  --bg:     #0a0a09;
  --bg2:    #111110;
  --line:   #1e1e1c;
  --line2:  #2a2a27;
  --dim:    #3a3a36;
  --muted:  #666660;
  --soft:   #999990;
  --text:   #e2ddd4;
  --bright: #f0ece3;
  --acc:    #e8d5a0;
  --acc2:   #b8a060;
  --mono:   'DM Mono', monospace;
  --sans:   'Syne', sans-serif;
  --vv-top: 0px; /* visual viewport top offset (iOS keyboard) */
}

html,body{
  height:100%;
  overscroll-behavior:none;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--mono);
  font-size:13px;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  display:flex;
  flex-direction:column;
  min-height:100vh;
  overflow:hidden; /* only the content area scrolls */
}

/* hide scrollbars, keep scroll behavior */
#feed{
  scrollbar-width:none;
  -ms-overflow-style:none;
}
#feed::-webkit-scrollbar{display:none}

#app{
  flex:1;
  display:flex;
  flex-direction:column;
  min-height:0;
  height:100vh;
  overflow:hidden;
  pointer-events:none;
}
#app header,
#app #manage-bar,
#app #input-area,
#app #feed{
  pointer-events:auto;
}

/* iOS/Safari dynamic viewport handling for app shell */
@supports (height: 100dvh) {
  #app{height:100dvh}
}
@supports (height: 100svh) {
  #app{height:100svh}
}

/* ── HEADER ── */
header{
  position:relative;
  z-index:100;
  background:var(--bg);
  border-bottom:1px solid var(--line);
  padding:0 20px;
  height:48px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}

/* ── MANAGE BAR (SELECTION) ── */
#manage-bar{
  position:relative;
  z-index:99;
  flex-shrink:0;
  background:var(--bg2);
  border-bottom:1px solid var(--line);
  padding:4px 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  font-size:10px;
  color:var(--dim);
}

#select-toggle{
  border:1px solid var(--line2);
  background:transparent;
  color:var(--soft);
  font-family:var(--mono);
  font-size:10px;
  padding:3px 8px;
  border-radius:999px;
  cursor:pointer;
  text-transform:uppercase;
  letter-spacing:0.06em;
}
#select-toggle.active{
  background:var(--acc);
  color:var(--bg);
  border-color:var(--acc2);
}

.select-extra{
  display:inline-flex;
  align-items:center;
  gap:4px;
  overflow:hidden;
  max-width:0;
  opacity:0;
  transform:translateX(-4px);
  transition:max-width .2s cubic-bezier(.2,.8,.2,1), opacity .2s cubic-bezier(.2,.8,.2,1), transform .2s cubic-bezier(.2,.8,.2,1);
  vertical-align:top;
}
.select-extra.show{
  max-width:120px;
  opacity:1;
  transform:translateX(0);
}

#manage-actions{
  display:flex;
  align-items:center;
  gap:6px;
}

.manage-btn{
  border:1px solid var(--line2);
  background:var(--bg);
  color:var(--soft);
  font-family:var(--mono);
  font-size:10px;
  padding:3px 8px;
  border-radius:4px;
  cursor:pointer;
  text-transform:uppercase;
  letter-spacing:0.06em;
}
.manage-btn:hover{
  background:var(--line);
  color:var(--text);
}

#move-target{
  border:1px solid var(--line2);
  background:var(--bg);
  color:var(--soft);
  font-family:var(--mono);
  font-size:10px;
  padding:3px 6px;
  border-radius:4px;
}

#view-menu{
  position:absolute;
  top:100%;
  right:20px;
  margin-top:4px;
  padding:6px 8px;
  background:var(--bg);
  border:1px solid var(--line2);
  border-radius:4px;
  font-size:10px;
  color:var(--soft);
  display:none;
  flex-direction:column;
  gap:4px;
  z-index:130;
}
#view-menu.open{
  display:flex;
}
#view-menu label{
  display:inline-flex;
  align-items:center;
  gap:4px;
  cursor:pointer;
}
#view-menu input[type="checkbox"]{
  width:13px;
  height:13px;
  -webkit-appearance:none;
  appearance:none;
  border:1px solid var(--line2);
  border-radius:3px;
  background:var(--bg);
  cursor:pointer;
}
#view-menu input[type="checkbox"]:checked{
  background:var(--acc);
  border-color:var(--acc2);
  box-shadow:inset 0 0 0 2px var(--bg);
}

.logo{
  font-family:var(--sans);
  font-size:15px;
  font-weight:800;
  letter-spacing:0.08em;
  color:var(--bright);
  text-transform:uppercase;
  user-select:none;
}
.logo span{color:var(--acc)}

.header-right{
  display:flex;align-items:center;gap:16px;
}

/* user/account button */
#user-btn{
  width:30px;height:30px;
  display:grid;place-items:center;
  border:1px solid var(--line2);
  background:transparent;
  color:var(--soft);
  border-radius:999px;
  cursor:pointer;
  transition:background .12s, border-color .12s, color .12s;
}
#user-btn:hover{background:var(--line);color:var(--text)}
#user-btn.signed-in{
  border-color:rgba(232,213,160,0.55);
  box-shadow:0 0 0 1px rgba(232,213,160,0.12) inset;
}
#user-btn svg{display:block}

/* ── ACCOUNT DRAWER ── */
#user-modal-backdrop{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.62);
  display:none;
  z-index:250;
  pointer-events:auto;
}

#user-modal{
  position:absolute;
  top:0;right:0;bottom:0;
  width:360px;
  max-width:92vw;
  background:var(--bg2);
  border-left:1px solid var(--line2);
  box-shadow:-24px 0 60px rgba(0,0,0,0.55);
  padding:14px 16px;
  display:flex;
  flex-direction:column;
  gap:12px;
  animation:drawerIn .18s ease both;
  pointer-events:auto;
}

#user-modal button,
#user-modal input{
  pointer-events:auto;
}

@keyframes drawerIn{from{transform:translateX(10px);opacity:0}to{transform:translateX(0);opacity:1}}

.um-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.um-title{
  font-family:var(--sans);
  font-size:13px;
  font-weight:700;
  letter-spacing:0.02em;
  color:var(--bright);
}

#user-close{
  border:1px solid var(--line2);
  background:transparent;
  color:var(--soft);
  width:28px;height:28px;
  border-radius:6px;
  cursor:pointer;
}
#user-close:hover{background:var(--line);color:var(--text)}

.um-section{
  border:1px solid var(--line2);
  background:var(--bg);
  border-radius:8px;
  padding:10px 10px;
}
.um-label{
  text-transform:uppercase;
  letter-spacing:0.08em;
  font-size:9px;
  color:var(--dim);
  margin-bottom:6px;
}
.um-value{
  font-size:11px;
  color:var(--soft);
  word-break:break-word;
}
.um-row{
  display:flex;
  gap:8px;
  align-items:center;
  margin-top:10px;
}
.um-btn{
  border:1px solid var(--line2);
  background:transparent;
  color:var(--soft);
  font-family:var(--mono);
  font-size:10px;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
  text-transform:uppercase;
  letter-spacing:0.06em;
}
.um-btn:hover{background:var(--line);color:var(--text)}
.um-btn-primary{
  background:var(--acc);
  color:var(--bg);
  border-color:var(--acc2);
}
.um-btn-primary:hover{background:#f0e0b0;color:var(--bg)}

@media(max-width:540px){
  #user-modal{
    width:100%;
    max-width:100%;
    border-left:none;
  }
}

#online-count{
  font-size:11px;
  color:var(--muted);
  letter-spacing:0.05em;
  display:flex;align-items:center;gap:6px;
}
.dot{
  width:6px;height:6px;border-radius:50%;
  background:#4a9;
  box-shadow:0 0 6px rgba(68,170,136,0.6);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── LOADER (shared: splash + empty state) ── */
#app-loader{
  display:none;
}
.loader-inner{
  position:relative;
  width:88px;
  height:88px;
  overflow:visible;
}
.loader-inner .loader-ring{
  position:absolute;
  inset:-8px;
  border:2px solid transparent;
  border-radius:50%;
  border-top-color:var(--acc);
  border-right-color:var(--acc2);
  animation:loader-spin 1.1s cubic-bezier(0.5, 0, 0.5, 1) infinite;
}
.loader-inner .loader-ring:nth-child(2){
  inset:-4px;
  border-top-color:transparent;
  border-right-color:transparent;
  border-bottom-color:var(--acc2);
  border-left-color:var(--acc);
  animation-duration:0.9s;
  animation-direction:reverse;
}
.loader-inner .loader-ring:nth-child(3){
  inset:4px;
  border-right-color:transparent;
  border-bottom-color:var(--acc);
  animation-duration:1.3s;
  animation-direction:reverse;
}
.loader-inner .loader-dash{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
}
.loader-inner .loader-dash::after{
  content:'';
  width:70px;
  height:2px;
  border-radius:999px;
  background:linear-gradient(90deg, transparent 0, var(--acc) 40%, var(--acc2) 60%, transparent 100%);
  box-shadow:0 0 12px rgba(232,213,160,0.4);
  animation:loader-bars 1.25s ease-in-out infinite;
}
.loader-inner .loader-dash::before{
  content:'';
  width:44px;
  height:2px;
  border-radius:999px;
  background:linear-gradient(90deg, transparent 0, rgba(232,213,160,0.0) 15%, rgba(232,213,160,0.55) 50%, transparent 85%);
  animation:loader-bars-inner 1.25s ease-in-out infinite;
}
@keyframes loader-spin{
  to{ transform:rotate(360deg); }
}
@keyframes loader-bars{
  0%{
    transform:scaleX(0.5) translateX(-10px);
    opacity:0.4;
  }
  25%{
    transform:scaleX(1) translateX(0);
    opacity:1;
  }
  50%{
    transform:scaleX(0.6) translateX(10px);
    opacity:0.7;
  }
  75%{
    transform:scaleX(1) translateX(0);
    opacity:1;
  }
  100%{
    transform:scaleX(0.5) translateX(-10px);
    opacity:0.4;
  }
}
@keyframes loader-bars-inner{
  0%{
    transform:scaleX(0.4) translateX(8px);
    opacity:0.2;
  }
  25%{
    transform:scaleX(0.9) translateX(0);
    opacity:0.85;
  }
  50%{
    transform:scaleX(0.4) translateX(-8px);
    opacity:0.3;
  }
  75%{
    transform:scaleX(0.9) translateX(0);
    opacity:0.85;
  }
  100%{
    transform:scaleX(0.4) translateX(8px);
    opacity:0.2;
  }
}

#msg-count{
  font-size:11px;color:var(--dim);letter-spacing:0.05em;
  display:none;
}

/* ── FEED ── */
#feed{
  position:relative;
  z-index:1;
  flex:1;
  min-height:0;
  padding:0;
  overflow-y:auto;
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  touch-action:pan-y;
  outline:none;
}
#feed:focus{outline:none}
#feed.feed-updating{opacity:0.998;contain:layout style}

.feed-inner{
  position:relative;
  padding:16px 0 8px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  min-height:100%;
  gap:0;
}
/* drop position: 4px line, brighter */
.feed-drop-indicator{
  position:fixed;
  left:0;
  width:100%;
  height:4px;
  pointer-events:none;
  touch-action:none;
  z-index:9999;
  display:none;
  visibility:hidden;
  background:rgba(91, 155, 213, 0.55);
  border-radius:1px;
  transform:translateZ(0);
  isolation:isolate;
  transition:top 0.06s ease-out;
}
.feed-drop-indicator.visible{ display:block; visibility:visible; }
/* Origin: always a 2px dark blue line (fixed, never in flow) to avoid 4px shake */
.feed-drop-origin{
  position:fixed;
  left:0;
  width:100%;
  height:2px;
  pointer-events:none;
  touch-action:none;
  z-index:9998;
  display:none;
  visibility:hidden;
  background:rgba(37,99,235,0.75);
  border-radius:0;
  box-sizing:border-box;
  transform:translateZ(0);
  isolation:isolate;
  margin:0;
  padding:0;
}
.feed-drop-origin.visible{ display:block; visibility:visible; }
.feed-drop-origin.stuck{ height:2px; }

/* Ghost copies at origin: visible placeholder, same layout as .msg, not interactive */
.msg-origin-ghost{
  display:flex;
  align-items:center;
  gap:6px;
  padding:4px 20px;
  border-bottom:1px solid var(--line);
  pointer-events:none;
  opacity:0.5;
  background:rgba(0,0,0,0.25);
  box-sizing:border-box;
  min-height:32px;
}
.origin-ghost-overlay{
  position:absolute;
  left:0;
  right:0;
  top:0;
  bottom:0;
  pointer-events:none;
  z-index:1;
}
.origin-ghost-overlay .msg-origin-ghost{
  position:absolute;
  left:0;
  right:0;
  width:100%;
  box-sizing:border-box;
}
.msg.dragging-in-feed{ opacity:0.35; }
.msg-origin-ghost .msg-time,
.msg-origin-ghost .msg-sender,
.msg-origin-ghost .msg-text{ color:var(--text); }
.msg-origin-ghost + .msg-origin-ghost{ margin-top:-2px }

/* empty state: loader animation (visible on refresh before load) */
#empty{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:16px;
  padding:60px 20px;
  opacity:1;
  pointer-events:none; /* don't block clicks to header/buttons above */
}
@keyframes fadin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* message row */
.msg{
  display:flex;
  align-items:center;
  gap:6px;
  padding:4px 20px;
  border-bottom:1px solid var(--line);
  transition:background .1s, transform .1s ease-out;
  animation:msgin .2s ease both;
  position:relative;
}
@keyframes msgin{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.msg-drag-image-ghost{
  position:absolute;
  left:-9999px;
  top:0;
  pointer-events:none;
  box-shadow:0 4px 20px rgba(0,0,0,.4);
  border-radius:6px;
  opacity:0.95;
  background:var(--bg2);
  border:1px solid var(--line);
  box-sizing:border-box;
}
/* Spirit = same as row, full feed width, drags only vertically. Colors like hover. */
.msg-drag-spirit{
  position:fixed;
  z-index:10000;
  pointer-events:none;
  box-shadow:0 4px 16px rgba(0,0,0,.35);
  border-radius:0;
  background:var(--bg2);
  box-sizing:border-box;
  animation:spiritAppear 0.2s ease-out;
}
.msg-drag-spirit-stack{
  display:flex;
  flex-direction:column;
  box-shadow:0 4px 16px rgba(0,0,0,.35);
}
.msg-drag-spirit .msg-time,
.msg-drag-spirit .msg-sender{ color:var(--text); }
.msg-drag-spirit-row{ width:100%; box-sizing:border-box; }
@keyframes spiritAppear{ from{ opacity:0.92; } to{ opacity:1; } }
/* Row under cursor shifts 40px right while dragged over, then back */
.msg-drag-nudge-right{ transform:translateX(40px); }
body.dnd-active .msg.msg-drag-nudge-right{ transition:transform 0.12s ease-out; }
.msg-fly-clone{
  position:fixed;
  z-index:9999;
  pointer-events:none;
  box-shadow:0 4px 20px rgba(0,0,0,.35);
  border-radius:4px;
  background:var(--bg2);
  animation:none;
  transition:transform .4s ease-out, opacity .35s ease-out;
}
.msg-fly-clone .msg-actions{visibility:hidden}
.msg:hover{background:var(--bg2)}
.msg.msg-drag-over{background:var(--bg2)}
/* during DnD: dragged plain, others dimmed; no transitions to avoid stack/line shake */
body.dnd-active .msg{transition:none;animation:none}
body.dnd-just-ended .msg{transition:none;animation:none}
body.dnd-active .msg:not(.dragging):not(.msg-drag-group){
  opacity:0.68;
  background:transparent;
}
body.dnd-active .msg:not(.dragging):not(.msg-drag-group):hover{
  background:transparent;
  opacity:0.68;
}
body.dnd-active .msg.dragging,
body.dnd-active .msg.msg-drag-group{background:transparent}
body.dnd-active .msg.dragging .msg-select-wrap,
body.dnd-active .msg.dragging .msg-actions,
body.dnd-active .msg.msg-drag-group .msg-select-wrap,
body.dnd-active .msg.msg-drag-group .msg-actions{opacity:0;pointer-events:none;visibility:hidden}
body.dnd-active .msg.msg-drag-target{background:rgba(91,155,213,0.12);transition:none}
body.dnd-active .msg.msg-drag-spirit{opacity:1 !important;background:var(--bg2) !important;transition:none}
body.dnd-active .msg.msg-origin-ghost{opacity:0.5}
.msg.msg-editing{
  background:var(--bg2);
  box-shadow:inset 0 0 0 1px var(--line2);
}
.msg.msg-editing .msg-time,
.msg.msg-editing .msg-sender{color:var(--text)}
.msg.msg-editing .msg-select-wrap,
.msg.msg-editing .msg-actions{opacity:1;pointer-events:auto}
.msg:last-child{border-bottom:none}

.msg-sender{
  font-size:10px;
  color:var(--dim);
  font-weight:500;
  flex:0 0 10ch;
  max-width:10ch;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  display:none; /* JS shows based on view prefs + non-main channel */
  justify-content:flex-end;
  text-align:right;
}

.msg-time{
  font-size:6px;
  color:var(--dim);
  letter-spacing:0.04em;
  flex:0 0 auto;
  max-width:none;
  white-space:nowrap;
  text-align:left;
  display:none; /* JS shows based on view prefs */
}

.msg-text{
  flex:1 1 auto;
  font-size:13px;
  color:var(--text);
  line-height:1.55;
  white-space:pre-wrap;
  padding-right:72px; /* reserve space under right-side actions */
  cursor:pointer;
}
/* DnD reorder: row under drop position (no nudge to avoid shake) */

@media (max-width:540px){
  /* Disable text selection on messages on mobile so long-press is for drag, not selection */
  .msg,
  .msg *{
    -webkit-user-select:none;
    user-select:none;
  }
  /* On mobile hide checkbox zone until select mode is on */
  .msg-checkbox-zone{
    width:0;
    min-width:0;
    margin-left:0;
    overflow:hidden;
    opacity:0;
    pointer-events:none;
  }
  .msg-checkbox-zone-left{ width:0; min-width:0; }
  body.select-mode .msg-checkbox-zone{
    width:auto;
    min-width:auto;
    margin-left:-48px;
    overflow:visible;
    opacity:1;
    pointer-events:auto;
  }
  body.select-mode .msg-checkbox-zone-left{ width:48px; min-width:48px; }
  body.select-mode .msg-select-wrap{ opacity:1; pointer-events:auto; }
}

/* on hover, make all message parameters (time/author) same color as text */
.msg:hover .msg-time,
.msg:hover .msg-sender,
.msg.msg-drag-over .msg-time,
.msg.msg-drag-over .msg-sender{
  color:var(--text);
}

.msg-checkbox-zone{
  flex:0 0 auto;
  display:flex;
  align-items:center;
  margin-left:-48px;
  margin-top:-4px;
  margin-bottom:-4px;
  min-height:calc(100% + 8px);
  align-self:stretch;
  position:relative;
  z-index:1;
}
.msg-checkbox-zone-left{
  width:48px;
  min-width:48px;
  flex-shrink:0;
  align-self:stretch;
  min-height:100%;
}
.msg-select-wrap{
  flex:0 0 24px;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:opacity .12s ease;
}

body.select-mode .msg-select-wrap,
.msg:hover .msg-select-wrap,
.msg.msg-drag-over .msg-select-wrap,
.msg.msg-selected .msg-select-wrap{
  opacity:1;
  pointer-events:auto;
}

.msg-select{
  width:13px;
  height:13px;
  -webkit-appearance:none;
  appearance:none;
  border:1px solid var(--line2);
  border-radius:3px;
  background:var(--bg);
  cursor:pointer;
}
.msg-select:checked{
  background:var(--acc);
  border-color:var(--acc2);
  box-shadow:inset 0 0 0 2px var(--bg);
}

.msg-actions{
  display:flex;
  align-items:center;
  gap:4px;
  position:absolute;
  right:20px;
  top:50%;
  transform:translateY(-50%);
  margin:0;
  opacity:0;
  pointer-events:none;
  transition:opacity .15s ease;
}
.msg:hover .msg-actions,
.msg.msg-drag-over .msg-actions{
  opacity:1;
  pointer-events:auto;
}
.msg-action-btn{
  border:1px solid var(--line2);
  background:var(--bg);
  color:var(--soft);
  font-family:var(--mono);
  font-size:9px;
  padding:1px 4px;
  border-radius:3px;
  cursor:pointer;
}
.msg-action-btn:hover{
  background:var(--line);
  color:var(--text);
}

.msg-text a{
  color:var(--acc);
  text-decoration:none;
  border-bottom:1px solid var(--acc2);
}
.msg-text a:hover{color:var(--bright)}

/* new message flash */
.msg.new-flash{
  background:rgba(232,213,160,0.04);
}

.msg.dragging,
.msg.msg-drag-group{
  opacity: 1;
  animation: none;
}
.msg.msg-drag-group + .msg.msg-drag-group{margin-top:-2px}
.msg.dragging + .msg.msg-drag-group,
.msg.msg-drag-group + .msg.dragging{margin-top:-2px}

/* ── INPUT AREA ── */
#input-area{
  flex-shrink:0;
  background:var(--bg);
  border-top:1px solid var(--line);
  padding:12px 20px calc(16px + env(safe-area-inset-bottom, 0px));
}

.input-wrap{
  display:flex;
  align-items:flex-end;
  gap:10px;
  position:relative;
}

/* clipboard suggestion bubble (this device) */
#clipboard-bubble{
  display:none;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:6px;
  padding:6px 8px;
  border-radius:4px;
  background:var(--bg2);
  border:1px solid var(--line2);
  font-size:11px;
  color:var(--soft);
}
#clipboard-bubble-text{
  flex:1;
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.clipboard-bubble-actions{
  display:flex;
  gap:6px;
}

/* remote draft bubble (other device) */
#draft-bubble{
  display:none;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:6px;
  padding:6px 8px;
  border-radius:4px;
  background:var(--bg2);
  border:1px dashed var(--line2);
  font-size:11px;
  color:var(--soft);
}
#draft-bubble-text{
  flex:1;
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.draft-bubble-actions{
  display:flex;
  gap:6px;
}
.draft-btn{
  border:1px solid var(--line2);
  background:transparent;
  color:var(--soft);
  font-family:var(--mono);
  font-size:9px;
  padding:3px 6px;
  border-radius:3px;
  cursor:pointer;
  text-transform:uppercase;
  letter-spacing:0.06em;
}
.draft-btn:hover{
  background:var(--line);
  color:var(--text);
}

#msg-input{
  flex:1;
  background:var(--bg2);
  border:1px solid var(--line2);
  color:var(--text);
  font-family:var(--mono);
  font-size:13px;
  line-height:1.55;
  padding:9px 12px;
  resize:none;
  outline:none;
  border-radius:3px;
  min-height:38px;
  max-height:160px;
  overflow-y:auto;
  transition:border-color .15s, background .15s;
  scrollbar-width:none;
}
#msg-input::-webkit-scrollbar{display:none}
#msg-input::placeholder{color:var(--dim)}
#msg-input:focus{
  border-color:var(--line2);
  background:#161614;
  outline:none;
}
#msg-input:focus-visible{outline:none}

#send-btn{
  flex-shrink:0;
  height:38px;
  padding:0 16px;
  background:var(--acc);
  color:var(--bg);
  border:none;
  font-family:var(--sans);
  font-size:12px;
  font-weight:700;
  letter-spacing:0.1em;
  text-transform:uppercase;
  cursor:pointer;
  border-radius:3px;
  transition:background .12s, transform .08s;
  white-space:nowrap;
}
#send-btn:hover{background:#f0e0b0}
#send-btn:active{transform:scale(.97)}
#send-btn:disabled{background:var(--dim);color:var(--muted);cursor:default;transform:none}

.input-tools{
  display:flex;
  justify-content:flex-start;
  align-items:center;
  gap:0;
  margin-top:6px;
}
.log-dropup-wrap{
  margin-left:20px;
  position:relative;
  overflow:visible;
}
#log-action-btn{
  font-size:11px;
  padding:6px 10px;
  min-width:80px;
  max-width:180px;
  text-align:left;
  border:1px solid var(--line2);
  background:var(--bg2);
  color:var(--text);
  border-radius:4px;
  cursor:pointer;
  transition:border-color .2s, box-shadow .2s;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
#log-action-btn.error-signal{
  border-color:#c55;
  box-shadow:0 0 0 1px #c55;
}
#log-action-btn.error-signal-faded{
  border-color:rgba(197,85,85,0.5);
  box-shadow:none;
}
#log-dropup-panel{
  display:none;
  position:absolute;
  bottom:100%;
  left:0;
  margin-bottom:4px;
  width:320px;
  max-height:min(280px, 50vh);
  background:var(--bg2);
  border:1px solid var(--line2);
  border-radius:6px;
  box-shadow:0 -4px 20px rgba(0,0,0,.35);
  z-index:1100;
  flex-direction:column;
  overflow:hidden;
}
#log-dropup-panel.open{
  display:flex;
}
#log-dropup-panel .log-dropup-body{
  overflow-y:auto;
  padding:6px;
  flex:1;
  min-height:0;
}
.log-event-card{
  display:flex;
  align-items:flex-start;
  gap:8px;
  padding:6px 8px;
  margin-bottom:2px;
  border-radius:4px;
  border:1px solid transparent;
  transition:background .12s, border-color .12s;
}
.log-event-card:hover{
  background:var(--bg);
  border-color:var(--line2);
}
.log-event-card.from-this-device{border-left:3px solid var(--acc)}
.log-event-card.error{border-left:3px solid #c55}
.log-event-card.error .log-event-action,
.log-event-card.error .log-event-message{color:#e88}
.log-event-card .log-event-time{
  font-size:10px;
  color:var(--muted);
  flex-shrink:0;
}
.log-event-card .log-event-body{flex:1;min-width:0}
.log-event-card .log-event-action{font-size:11px;color:var(--text)}
.log-event-card .log-event-message{font-size:10px;color:var(--soft);margin-top:2px}
.log-event-card .log-event-device{
  font-size:9px;
  text-transform:uppercase;
  letter-spacing:0.05em;
  color:var(--dim);
}
.log-event-card.from-this-device .log-event-device{color:var(--acc2)}

.clear-input-btn{
  position:absolute;
  top:10px;
  right:66px; /* moved 20px further left inside textarea */
  width:16px;
  height:16px;
  border-radius:999px;
  border:1px solid var(--line2);
  background:var(--bg2);
  color:var(--dim);
  font-size:11px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  opacity:0;
  pointer-events:none;
  transition:opacity .12s ease, background .12s ease, color .12s ease;
}
.clear-input-btn:not(:disabled){
  opacity:1;
  pointer-events:auto;
}
.clear-input-btn:hover:not(:disabled){
  background:var(--line);
  color:var(--text);
}
.clear-input-btn:disabled{
  opacity:0;
  pointer-events:none;
}

/* ── TOAST ── */
#toast{
  position:fixed;
  bottom:80px;left:50%;transform:translateX(-50%) translateY(8px);
  background:var(--bg2);border:1px solid var(--line2);
  border-radius:3px;
  font-size:11px;color:var(--soft);
  padding:6px 14px;
  letter-spacing:0.06em;
  pointer-events:none;
  opacity:0;transition:opacity .2s,transform .2s;
  z-index:999;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── SCROLL TO BOTTOM BTN ── */
#scroll-btn{
  position:fixed;
  bottom:90px;right:20px;
  background:var(--bg2);
  border:1px solid var(--line2);
  color:var(--soft);
  font-family:var(--mono);font-size:11px;
  padding:6px 12px;
  cursor:pointer;border-radius:3px;
  opacity:0;pointer-events:none;
  transition:opacity .2s;
  z-index:50;
  letter-spacing:0.04em;
}
#scroll-btn.visible{opacity:1;pointer-events:auto}
#scroll-btn:hover{background:var(--line);color:var(--text)}

/* ── MOBILE ── */
@media(max-width:540px){
  #scroll-btn{display:none !important;}
  .msg{gap:8px}
  .msg-meta{
    min-width:120px;
    max-width:160px;
  }
  body{
    overflow:hidden;
    overscroll-behavior:none;
  }
  #feed{
    scrollbar-width:none;
    -ms-overflow-style:none;
  }
  #feed::-webkit-scrollbar{display:none}
  /* keep header pinned even when keyboard opens */
  header{
    position:fixed;
    top:0;
    left:0;
    right:0;
    width:100%;
    padding:0 14px;
    z-index:120;
    transform:translateY(var(--vv-top));
    transition:transform .22s cubic-bezier(.2,.8,.2,1);
    will-change:transform;
  }
  /* pin manage bar under header too */
  #manage-bar{
    position:fixed;
    top:48px;
    left:0;
    right:0;
    width:100%;
    z-index:115;
    padding:4px 14px;
    transform:translateY(var(--vv-top));
    transition:transform .22s cubic-bezier(.2,.8,.2,1);
    will-change:transform;
  }
  /* reserve space for fixed header + manage bar */
  #app{padding-top:calc(48px + 34px)}
  /* keep input bar above iOS Safari bottom panel & keyboard */
  #input-area{
    position:fixed;
    left:0;
    right:0;
    bottom:0;
    z-index:110;
    padding:10px 10px calc(14px + env(safe-area-inset-bottom, 0px));
    background:var(--bg);
  }
  /* add bottom space in feed so last messages are not hidden behind input */
  #feed{
    padding-bottom:120px;
  }
  #tabs{
    padding:8px 10px 8px;
    margin:-10px -10px 10px;
  }
  /* prevent iOS Safari zoom-on-focus */
  #msg-input{font-size:16px}
  .cm-input{font-size:16px}
}

#tabs{
  display:flex;
  gap:6px;
  padding:8px 20px 8px;
  border-bottom:1px solid var(--line);
  background:var(--bg2);
  align-items:center;
  margin:-12px -20px 10px;
}

.tab{
  border:1px solid var(--line2);
  background:transparent;
  color:var(--soft);
  font-family:var(--mono);
  font-size:11px;
  padding:3px 8px;
  border-radius:999px;
  cursor:pointer;
  letter-spacing:0.04em;
  text-transform:uppercase;
  display:inline-flex;
  align-items:center;
  gap:6px;
  transition:background .15s, color .15s, border-color .15s, box-shadow .15s, transform .15s;
}

.tab-active{
  background:var(--acc);
  color:var(--bg);
  border-color:var(--acc2);
}

.tab-shared{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:14px;height:14px;
  color:var(--dim);
}
.tab-active .tab-shared{color:rgba(10,10,9,0.75)}

.tab-badge{
  display:none;
  min-width:16px;
  height:16px;
  padding:0 5px;
  border-radius:999px;
  background:rgba(232,213,160,0.16);
  border:1px solid rgba(232,213,160,0.35);
  color:var(--acc);
  font-size:10px;
  line-height:14px;
  letter-spacing:0.02em;
}
.tab-badge.show{display:inline-flex;align-items:center;justify-content:center}
.tab-active .tab-badge{
  background:rgba(10,10,9,0.12);
  border-color:rgba(10,10,9,0.25);
  color:rgba(10,10,9,0.8);
}

.tab.tab-drop-target{
  background:var(--acc) !important;
  color:var(--bg) !important;
  border-color:var(--acc) !important;
  box-shadow:0 0 0 2px var(--bg);
  transform:scale(1.06);
}
.tab.tab-drop-target .tab-shared{color:rgba(10,10,9,0.8)}
.tab.tab-drop-target .tab-close{color:var(--bg);opacity:1}

.tab-new{
  border-style:dashed;
  color:var(--dim);
}

.tab-close{
  margin-left:6px;
  font-size:11px;
  opacity:0.7;
}

.tab-close:hover{
  opacity:1;
}

/* ── CHANNEL MODAL ── */
#channel-modal-backdrop{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.6);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:200;
}

#channel-modal{
  background:var(--bg2);
  border:1px solid var(--line2);
  border-radius:8px;
  padding:16px 18px 14px;
  width:320px;
  max-width:90vw;
  font-size:11px;
  color:var(--soft);
}

.cm-title{
  font-family:var(--sans);
  font-size:13px;
  font-weight:600;
  color:var(--bright);
  margin-bottom:10px;
}

.cm-field{
  margin-bottom:8px;
}

.cm-label{
  text-transform:uppercase;
  letter-spacing:0.08em;
  font-size:9px;
  color:var(--dim);
  margin-bottom:3px;
}

.cm-input{
  width:100%;
  border:1px solid var(--line2);
  background:var(--bg);
  color:var(--text);
  border-radius:3px;
  padding:5px 7px;
  font-family:var(--mono);
  font-size:11px;
}

.cm-hint{
  font-size:9px;
  color:var(--dim);
  margin-top:2px;
}

.cm-row{
  display:flex;
  justify-content:flex-end;
  gap:6px;
  margin-top:10px;
}

.cm-btn{
  border:1px solid var(--line2);
  background:var(--bg);
  color:var(--soft);
  font-family:var(--mono);
  font-size:10px;
  padding:4px 10px;
  border-radius:3px;
  cursor:pointer;
  text-transform:uppercase;
  letter-spacing:0.06em;
}

.cm-btn-primary{
  background:var(--acc);
  color:var(--bg);
  border-color:var(--acc2);
}
</style>

function scrollFeedAtTouchEdge(clientY, clientX) {
  if (!feedEl) return false;
  var feedRect = feedEl.getBoundingClientRect();
  var edgeZone = Math.max(56, feedRect.height * 0.2);
  var baseStep = 6;
  var maxScroll = feedEl.scrollHeight - feedEl.clientHeight;
  var inTop = clientY < feedRect.top + edgeZone;
  var inBottom = clientY > feedRect.bottom - edgeZone;
  if (typeof clientX === 'number') {
    var under = document.elementFromPoint(clientX, clientY);
    if (under && (under.closest('#manage-bar') || under.closest('#input-area'))) return false;
  }
  var closeness, step;
  if (inTop) {
    if (clientY <= feedRect.top) closeness = 1;
    else closeness = 1 - (clientY - feedRect.top) / edgeZone;
    step = baseStep * (0.5 + 2.5 * Math.min(1, closeness));
    feedEl.scrollTop = Math.max(0, feedEl.scrollTop - step);
    return true;
  }
  if (inBottom) {
    if (clientY >= feedRect.bottom) closeness = 1;
    else closeness = 1 - (feedRect.bottom - clientY) / edgeZone;
    step = baseStep * (0.5 + 2.5 * Math.min(1, closeness));
    if (maxScroll > 0) feedEl.scrollTop = Math.min(maxScroll, feedEl.scrollTop + step);
    return true;
  }
  return false;
}

    const rRect = r.getBoundingClientRect();

async function undoLastAction() {
  if (!currentUser) {
    toast('Sign in to undo.');
    return;
  }
  const action = undoStack.pop();
  if (!action) {
    toast('Nothing to undo.');
    return;
  }
  try {
    if (action.type === 'delete' && Array.isArray(action.entries) && action.entries.length) {
      const rows = action.entries.map(e => ({
        id: e.id,
        created_at: e.created_at,
        text: e.text,
        channel: e.channel,
        user_id: e.user_id,
        author_name: e.author_name ?? null,
      }));
      const { error } = await sb.from('entries').insert(rows);
      if (error) throw error;
      if (feedEl) feedEl.classList.add('feed-updating');
      requestAnimationFrame(() => {
        const frag = document.createDocumentFragment();
        rows.forEach(e => {
          const row = createMsgRow(e, false);
          if (row) {
            frag.appendChild(row);
            if (e.id != null) currentMessageOrder.push(e.id);
            msgCount++;
          }
        });
        feedInner.appendChild(frag);
        updateMsgCount();
        saveMessageOrderForCurrentChannel();
        applyFieldPrefsToMessages();
        showEmptyIfNoMessages();
        requestAnimationFrame(() => { if (feedEl) feedEl.classList.remove('feed-updating'); });
      });
    } else if (action.type === 'move' && Array.isArray(action.entries) && action.entries.length) {
      const rows = action.entries;
      await Promise.all(rows.map(e => {
        return sb
          .from('entries')
          .update({ channel: e.channel, created_at: e.created_at })
          .eq('user_id', currentUser.id)
          .eq('id', e.id);
      }));
      const forCurrent = rows.filter(e => e.channel === currentChannel);
      if (feedEl) feedEl.classList.add('feed-updating');
      requestAnimationFrame(() => {
        const frag = document.createDocumentFragment();
        forCurrent.forEach(e => {
          const row = createMsgRow(e, false);
          if (row) {
            frag.appendChild(row);
            if (e.id != null) currentMessageOrder.push(e.id);
            msgCount++;
          }
        });
        if (frag.childNodes.length) feedInner.appendChild(frag);
        if (forCurrent.length) {
          saveMessageOrderForCurrentChannel();
          applyMessageOrderToDOM();
          applyFieldPrefsToMessages();
        }
        showEmptyIfNoMessages();
        requestAnimationFrame(() => { if (feedEl) feedEl.classList.remove('feed-updating'); });
      });
    } else if (action.type === 'send' && Array.isArray(action.entries) && action.entries.length) {
      const ids = action.entries.map(e => e.id).filter(Boolean);
      if (ids.length) {
        const { error } = await sb.from('entries').delete().in('id', ids);
        if (error) throw error;
      }
      if (feedEl) feedEl.classList.add('feed-updating');
      requestAnimationFrame(() => {
        ids.forEach(id => {
          const el = feedInner.querySelector('.msg[data-id="' + CSS.escape(String(id)) + '"]');
          if (el) el.remove();
        });
        currentMessageOrder = currentMessageOrder.filter(x => !ids.includes(x));
        msgCount = Math.max(0, msgCount - ids.length);
        updateMsgCount();
        saveMessageOrderForCurrentChannel();
        showEmptyIfNoMessages();
        requestAnimationFrame(() => { if (feedEl) feedEl.classList.remove('feed-updating'); });
      });
    } else if (action.type === 'edit' && Array.isArray(action.entries) && action.entries.length) {
      const rows = action.entries;
      await Promise.all(rows.map(e => {
        return sb
          .from('entries')
          .update({ text: e.beforeText })
          .eq('user_id', currentUser.id)
          .eq('id', e.id);
      }));
      rows.forEach(e => { updateMessageRowText(e.id, e.beforeText); });
      toast('Undid last action.');
      return;
    } else if (action.type === 'view' && action.before && action.channel) {
      if (action.channel !== currentChannel) {
        currentChannel = action.channel;
      }
      fieldPrefs = {
        showTime: !!action.before.showTime,
        showAuthor: !!action.before.showAuthor,
      };
      saveFieldPrefsForCurrentChannel();
      applyFieldPrefsToMessages();
      return;
    } else if (action.type === 'order' && Array.isArray(action.before)) {
      currentMessageOrder = action.before.slice();
      await saveMessageOrderForCurrentChannel();
      applyMessageOrderToDOM();
      toast('Undid last action.');
      return;
    } else {
      // Unknown or empty action; nothing to do.
      return;
    }
    toast('Undid last action.');
  } catch (e) {
    console.error(e);
    toast('Undo failed — ' + humanError(e.message));
  }
}

function setupFocusOnFirstInteraction() {
  if (!input) return;
  function isInteractive(el) {
    if (!el || el === document.body) return false;
    if (el.tagName === 'BUTTON' || el.tagName === 'A' || el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.tagName === 'SELECT') return true;
    if (el.isContentEditable) return true;
    if (el.closest && el.closest('input, textarea, [contenteditable="true"], button, a, select')) return true;
    if (el.closest && (el.closest('#user-modal') || el.closest('#channel-modal-backdrop') || el.closest('#view-menu'))) return true;
    if (el.closest && el.closest('.msg-actions, .msg-select-wrap')) return true;
    return false;
  }
  document.addEventListener('focusin', () => {
    if (isInteractive(document.activeElement)) return;
    setTimeout(() => { if (input && document.activeElement !== input) input.focus(); }, 0);
  });
  document.addEventListener('click', (e) => {
    if (isInteractive(e.target)) return;
    if (input && document.activeElement !== input) {
      setTimeout(() => { if (input) input.focus(); }, 0);
    }
  });
  document.addEventListener('click', (e) => {
    const t = e.target;
    if (!t || !t.closest || !t.closest('button')) return;
    if (t.closest('#user-modal') || t.closest('#channel-modal-backdrop')) return;
    setTimeout(() => { if (input) input.focus(); }, 0);
  });
  if (feedEl) {
    feedEl.addEventListener('focus', () => {
      if (input && document.activeElement === feedEl) setTimeout(() => { if (input) input.focus(); }, 0);
    });
  }
  input.addEventListener('focusout', (e) => {
    const next = e.relatedTarget;
    if (next && isInteractive(next)) return;
    if (document.activeElement && (document.activeElement.closest('#user-modal') || document.activeElement.closest('#channel-modal-backdrop'))) return;
    setTimeout(() => { if (input && document.activeElement !== input) input.focus(); }, 0);
  });
}

/* entries table fields: id, created_at, text, channel, user_id, author_name */
async function fetchMessagesList() {
  if (!currentUser) return [];
  let query = sb
    .from('entries')
    .select('id, created_at, text, channel, user_id, author_name')
    .eq('channel', currentChannel);
  if (currentChannel === 'main' && currentUser) {
    query = query.eq('user_id', currentUser.id);
  }
  const { data, error } = await query.order('created_at', { ascending: true }).limit(100);
  if (error) { console.error(error); return []; }
  return data && data.length > 0 ? sortMessagesByOrder(data, currentMessageOrder) : [];
}

async function loadMessages() {
  const list = await fetchMessagesList();
  await replaceFeedWithList(list);
}

async function replaceFeedWithList(list) {
  if (!feedInner) return;
  seenIds.clear();
  globalMsgNum = 0;
  msgCount = 0;
  const frag = document.createDocumentFragment();
  for (const msg of list) {
    const row = createMsgRow(msg, false);
    if (row) frag.appendChild(row);
  }
  const hasRows = frag.childNodes.length > 0;
  msgCount = hasRows ? frag.childNodes.length : 0;
  if (hasRows) {
    requestAnimationFrame(() => {
      if (feedInner) {
        feedInner.innerHTML = '';
        if (emptyEl && emptyEl.parentNode) emptyEl.remove();
        feedInner.appendChild(frag);
      }
      updateMsgCount();
      applyFieldPrefsToMessages();
      var saved = channelScroll.get(currentChannel);
      if (feedEl && typeof saved === 'number' && saved >= 0) {
        var maxScroll = feedEl.scrollHeight - feedEl.clientHeight;
        if (maxScroll > 0) feedEl.scrollTop = Math.min(saved, maxScroll);
      }
    });
  } else {
    feedInner.innerHTML = '';
    if (emptyEl && emptyEl.parentNode) emptyEl.remove();
    showEmptyIfNoMessages();
    updateMsgCount();
  }
}

function subscribeRealtimeAll() {
  for (const sub of channelSubs.values()) {
    try { sub.unsubscribe(); } catch (_) {}
  }
  channelSubs = new Map();

  if (!currentUser) return;

  channels.forEach(ch => {
    let filter = 'channel=eq.' + ch;
    if (ch === 'main' && currentUser) {
      filter += ',user_id=eq.' + currentUser.id;
    }
    const sub = sb
      .channel('entries-' + ch)
      .on(
        'postgres_changes',
        { event: 'INSERT', schema: 'public', table: 'entries', filter },
        payload => onInsertForChannel(ch, payload.new)
      )
      .on(
        'postgres_changes',
        { event: 'UPDATE', schema: 'public', table: 'entries', filter },
        payload => onUpdateForChannel(ch, payload.new)
      )
      .subscribe();
    channelSubs.set(ch, sub);
  });
}

function updateMessageRowText(msgId, text) {
  if (!feedInner || msgId == null) return;
  const idStr = String(msgId);
  const el = feedInner.querySelector('.msg[data-id="' + CSS.escape(idStr) + '"]');
  if (!el) return;
  const textEl = el.querySelector('.msg-text');
  if (textEl) textEl.innerHTML = linkify(escapeHtml(text || ''));
}

function onUpdateForChannel(ch, row) {
  if (ch !== currentChannel || !row) return;
  const id = row.id != null ? row.id : row.Id;
  if (id == null) return;
  if (id === editingMessageId) {
    editingMessageId = null;
    try { localStorage.removeItem(WAS_EDITING_KEY); } catch (_) {}
    if (input && input.placeholder === 'Editing message…') input.placeholder = 'say something…';
  }
  const text = row.text != null ? row.text : (row.Text != null ? row.Text : '');
  updateMessageRowText(id, text);
}

function subscribeOrderRealtime() {
  if (!currentUser) return;
  if (orderSub) {
    try { orderSub.unsubscribe(); } catch (_) {}
    orderSub = null;
  }
  orderSub = sb
    .channel('message-orders-' + currentUser.id)
    .on(
      'postgres_changes',
      {
        event: '*',
        schema: 'public',
        table: 'message_orders',
        filter: 'user_id=eq.' + currentUser.id
      },
      async payload => {
        const row = payload.new || payload.old || {};
        if (!row || row.channel !== currentChannel) return;
        if (suppressNextOrderApply) { suppressNextOrderApply = false; return; }
        if (Date.now() < suppressOrderApplyUntil) return;
        await loadMessageOrderForCurrentChannel();
        applyMessageOrderToDOM();
      }
    )
    .subscribe();
}

function subscribeViewRealtime() {
  if (!currentUser) return;
  if (viewSub) {
    try { viewSub.unsubscribe(); } catch (_) {}
    viewSub = null;
  }
  viewSub = sb
    .channel('views-' + currentUser.id)
    .on(
      'postgres_changes',
      {
        event: '*',
        schema: 'public',
        table: 'views',
        filter: 'user_id=eq.' + currentUser.id
      },
      payload => {
        const row = payload.new || payload.old || {};
        if (!row || row.channel !== currentChannel || !row.config) return;
        if (suppressNextViewApply) { suppressNextViewApply = false; return; }
        if (Date.now() < suppressOrderApplyUntil) return;
        const cfg = row.config || {};
        // Update order
        if (Array.isArray(cfg.order)) {
          currentMessageOrder = cfg.order
            .map(x => Number(x))
            .filter(x => Number.isFinite(x));
          saveOrderToLocal();
          applyMessageOrderToDOM();
        }
        // Update field prefs
        const defTime = true;
        const defAuthor = currentChannel === 'main' ? false : true;
        fieldPrefs = {
          showTime: typeof cfg.showTime === 'boolean' ? cfg.showTime : defTime,
          showAuthor: typeof cfg.showAuthor === 'boolean' ? cfg.showAuthor : defAuthor,
        };
        saveFieldPrefsForCurrentChannel();
        applyFieldPrefsToMessages();

    .subscribe();

          event: 'INSERT',

        },
        payload => {

function onInsertForChannel(ch, msg) {

    hideEmpty();
    appendMsg(msg, true);
    msgCount++;
    updateMsgCount();

    requestAnimationFrame(scrollBottom);
    return;
  }

  const next = (unreadCounts.get(ch) || 0) + 1;
  unreadCounts.set(ch, next);
  updateTabBadge(ch);

function setupPresence() {
  presenceCh = sb.channel('presence-room', {
    config: { presence: { key: myId } }
  });

  presenceCh
    .on('presence', { event: 'sync' }, () => {
      const state = presenceCh.presenceState();
      ocNum.textContent = Object.keys(state).length;
    })
    .on('presence', { event: 'join' }, () => {})
    .on('presence', { event: 'leave' }, () => {})
    .subscribe(async status => {
      if (status === 'SUBSCRIBED') {
        await presenceCh.track({ online_at: new Date().toISOString() });
      }
    });
}

/* ═══ CROSS-DEVICE DRAFTS (SAME USER) ══════════════════════ */
function setupDraftChannel() {
  teardownDraftChannel();
  latestRemoteDraft = '';
  if (!currentUser) return;

  draftChannel = sb
    .channel('drafts-' + currentUser.id, {
      config: {
        broadcast: { self: false }
      }
    })
    .on('broadcast', { event: 'draft' }, payload => {
      const data = payload.payload || {};
      if (!data || data.from === myId) return; // ignore own events
      const text = (data.text || '').trim();
      latestRemoteDraft = text;
      if (text) {
        showDraftBubble(text);
      } else {
        hideDraftBubble();
      }
    })
    .subscribe();
}

function teardownDraftChannel() {
  latestRemoteDraft = '';
  hideDraftBubble();
  if (draftChannel) {
    try { draftChannel.unsubscribe(); } catch (_) {}
    draftChannel = null;
  }
}

function broadcastDraft(text) {
  if (!draftChannel || !currentUser) return;
  draftChannel.send({
    type: 'broadcast',
    event: 'draft',
    payload: { from: myId, text: text || '' }
  });
}

function showDraftBubble(text) {
  if (!draftBubble || !draftBubbleTxt) return;
  draftBubbleTxt.textContent = text;
  draftBubble.style.display = 'flex';
}

function hideDraftBubble() {
  if (!draftBubble) return;

}

function showClipboardBubble(text) {
  if (!clipboardBubble || !clipboardBubbleTxt) return;
  clipboardBubbleTxt.textContent = text;
  clipboardBubble.style.display = 'flex';
}

function hideClipboardBubble() {
  if (!clipboardBubble) return;
  clipboardBubble.style.display = 'none';
  if (clipboardBubbleTxt) clipboardBubbleTxt.textContent = '';
}

function showEmptyIfNoMessages() {
  if (!feedInner || !emptyEl) return;
  const hasMsg = feedInner.querySelector('.msg');
  if (hasMsg) return;
  try {
    var loader = emptyEl.querySelector('.loader-inner');
    if (loader) {
      for (var i = emptyEl.childNodes.length - 1; i >= 0; i--) {
        if (emptyEl.childNodes[i] !== loader) emptyEl.removeChild(emptyEl.childNodes[i]);
      }
    }
  } catch (_) {}
  if (!emptyEl.parentNode) {
    emptyEl.style.animation = 'none';
    void emptyEl.offsetWidth;
    emptyEl.style.animation = 'fadin .6s .3s ease both';
    feedInner.appendChild(emptyEl);
  }
}

function setSelectMode(on) {
  selectMode = !!on;
  if (selectToggle) {
    selectToggle.classList.toggle('active', selectMode);
    selectToggle.textContent = 'Select';
    selectToggle.setAttribute('aria-pressed', selectMode ? 'true' : 'false');
  }
  if (selectExtra) selectExtra.classList.toggle('show', selectMode);
  document.body.classList.toggle('select-mode', selectMode);
  if (manageActions) {
    manageActions.classList.toggle('visible', selectMode);
  }
  updateSelectionUI();
}

function updateSelectionUI() {
  if (selectedIds.size > 0 && !selectMode) {
    selectModeAutoOn = true;
    setSelectMode(true);
  } else if (selectedIds.size === 0 && selectModeAutoOn) {
    selectModeAutoOn = false;
    setSelectMode(false);
  }
}

function restoreLastChannel() {
  try {
    const saved = localStorage.getItem(CURRENT_CHANNEL_KEY);
    if (!saved) return;
    if (!channels.includes(saved)) return;
    currentChannel = saved;
    updateTabsUI();
  } catch (_) {}
}

function restoreInputGlobal() {
  if (!input) return;
  try {
    input.value = localStorage.getItem(INPUT_STATE_KEY) || '';
    autoResize();
    sendBtn.disabled = !input.value.trim();
    updateClearInputBtn();
  } catch (_) {}
}

function saveInputGlobal() {
  if (!input) return;
  try {
    localStorage.setItem(INPUT_STATE_KEY, input.value || '');
  } catch (_) {}
}

function updateClearInputBtn() {
  if (!clearInputBtn || !input) return;
  clearInputBtn.disabled = !input.value;
}

function applyFieldPrefsUI() {
  if (fieldTimeChk) fieldTimeChk.checked = !!fieldPrefs.showTime;
  if (fieldAuthorChk) {
    const isMain = currentChannel === 'main';
    fieldAuthorChk.disabled = isMain;
    fieldAuthorChk.checked = !isMain && !!fieldPrefs.showAuthor;
  }
}

async function loadFieldPrefsForCurrentChannel() {
  const defTime = true;
  const defAuthor = currentChannel === 'main' ? false : true;
  if (currentUser) {
    try {
      const { data, error } = await sb
        .from('views')
        .select('config')
        .eq('user_id', currentUser.id)
        .eq('channel', currentChannel)
        .limit(1)
        .maybeSingle();
      if (!error && data && data.config) {
        const cfg = data.config || {};
        fieldPrefs = {
          showTime: typeof cfg.showTime === 'boolean' ? cfg.showTime : defTime,
          showAuthor: typeof cfg.showAuthor === 'boolean' ? cfg.showAuthor : defAuthor,
        };
        try {
          const raw = localStorage.getItem(FIELD_PREFS_KEY);
          const map = raw ? JSON.parse(raw) : {};
          map[currentChannel] = { showTime: !!fieldPrefs.showTime, showAuthor: !!fieldPrefs.showAuthor };
          localStorage.setItem(FIELD_PREFS_KEY, JSON.stringify(map));
        } catch (_) {}
        applyFieldPrefsUI();
        applyFieldPrefsToMessages();
        return;
      }
    } catch (_) {}
  }
  try {
    const raw = localStorage.getItem(FIELD_PREFS_KEY);
    const map = raw ? JSON.parse(raw) : {};
    const prefs = map[currentChannel] || {};
    fieldPrefs = {
      showTime: typeof prefs.showTime === 'boolean' ? prefs.showTime : defTime,
      showAuthor: typeof prefs.showAuthor === 'boolean' ? prefs.showAuthor : defAuthor,
    };
  } catch (_) {
    fieldPrefs = { showTime: true, showAuthor: currentChannel !== 'main' };
  }
  applyFieldPrefsUI();
  applyFieldPrefsToMessages();
}

function saveFieldPrefsForCurrentChannel() {
  try {
    const raw = localStorage.getItem(FIELD_PREFS_KEY);
    const map = raw ? JSON.parse(raw) : {};
    map[currentChannel] = {
      showTime: !!fieldPrefs.showTime,
      showAuthor: !!fieldPrefs.showAuthor,
    };
    localStorage.setItem(FIELD_PREFS_KEY, JSON.stringify(map));
  } catch(_) {}
  // Also persist into unified view config so other devices see it.
  if (currentUser) {
    const cfg = {
      order: currentMessageOrder.slice(),
      showTime: !!fieldPrefs.showTime,
      showAuthor: !!fieldPrefs.showAuthor,
    };
    sb
      .from('views')
      .upsert(
        {
          user_id: currentUser.id,
          channel: currentChannel,
          config: cfg,
        },
        { onConflict: 'user_id,channel' }
      )
      .then(() => {})
      .catch(() => {});
  }
}

function applyFieldPrefsToMessages() {
  if (!feedInner || !fieldPrefs) return;
  const rows = feedInner.querySelectorAll('.msg');
  rows.forEach(row => {
    const timeEl = row.querySelector('.msg-time');
    const senderEl = row.querySelector('.msg-sender');
    if (timeEl) timeEl.style.setProperty('display', fieldPrefs.showTime ? 'block' : 'none', 'important');
    const isMain = currentChannel === 'main' || (row.dataset.channel === 'main');
    if (senderEl) senderEl.style.setProperty('display', !isMain && fieldPrefs.showAuthor ? 'flex' : 'none', 'important');
  });
  applyFieldPrefsUI();
}

/* ═══ RENDER ══════════════════════════════════════════════ */
function setupTouchDragHandlers() {
  if (touchDragState && touchDragState.bound) return;
  touchDragState = {
    row: null,
    started: false,
    timer: null,
    bound: true,
    originLineShown: false,
  };
  const move = e => {
    if (!touchDragState || !touchDragState.started || !touchDragState.row) return;
    const touch = e.touches && e.touches[0];
    if (!touch) return;
    e.preventDefault();
    if (!touchDragState.originLineShown) {
      touchDragState.originLineShown = true;
      showDropOriginLine();
    }
    const y = touch.clientY;
    const rows = Array.from(feedInner.querySelectorAll('.msg'));
    if (!rows.length) return;
    var block = dragSelectedRows && dragSelectedRows.length > 1 ? dragSelectedRows.slice() : [touchDragState.row];
    var skip = new Set(block);
    let target = null;
    let targetCenterDist = Infinity;
    rows.forEach(r => {
      if (skip.has(r)) return;
      const rect = r.getBoundingClientRect();
      const center = rect.top + rect.height / 2;
      const dist = Math.abs(center - y);
      if (dist < targetCenterDist) {
        targetCenterDist = dist;
        target = r;
      }
    });
    if (!target) return;
    const targetRect = target.getBoundingClientRect();
    const before = y < targetRect.top + targetRect.height / 2;
    var insertRef = before ? target : target.nextSibling;
    if (block.length > 1) {
      var refAfterBlock = block[block.length - 1].nextSibling;
      block.forEach(function(r) { if (r.parentNode === feedInner) feedInner.removeChild(r); });
      var ins = block.indexOf(target) >= 0 ? refAfterBlock : insertRef;
      if (ins) {
        feedInner.insertBefore(block[0], ins);
        for (var i = 1; i < block.length; i++) feedInner.insertBefore(block[i], block[i - 1].nextSibling);
      } else {
        feedInner.appendChild(block[0]);
        for (var j = 1; j < block.length; j++) feedInner.insertBefore(block[j], block[j - 1].nextSibling);
      }
    } else {
      if (insertRef) feedInner.insertBefore(touchDragState.row, insertRef);
      else feedInner.appendChild(touchDragState.row);
    }
    updateEdgeScroll(y, touch.clientX);
  };
  const end = () => {
    if (!touchDragState || !touchDragState.row) return;
    if (feedInner) feedInner.querySelectorAll('.msg-drag-group').forEach(function(r) { r.classList.remove('msg-drag-group'); });
    dragSelectedRows = [];
    clearEdgeScrollInterval();
    clearTimeout(touchDragState.timer);
    document.removeEventListener('touchmove', move, { passive: false });
    document.removeEventListener('touchend', end);
    hideDropOriginLine();
    const r = touchDragState.row;
    r.classList.remove('dragging');
    if (document.body) {
      document.body.classList.remove('dnd-active');
      document.body.classList.add('dnd-just-ended');
    }
    touchDragState.started = false;
    touchDragState.row = null;
    touchDragState.originLineShown = false;
    recomputeOrderFromDOM();
    saveMessageOrderForCurrentChannel();
    applyFieldPrefsToMessages();
    r.style.pointerEvents = 'none';
    void r.offsetHeight;
    requestAnimationFrame(() => {
      requestAnimationFrame(() => {
        if (document.body) document.body.classList.remove('dnd-just-ended');
        r.style.pointerEvents = '';
        focusMessageInput();
      });
    });
  };
  document.addEventListener('touchmove', move, { passive: false });
  document.addEventListener('touchend', end);
}

function createMsgRow(msg, isNew) {
  if (msg && typeof msg.id !== 'undefined') {
    if (seenIds.has(msg.id)) return null;
    seenIds.add(msg.id);
  }
  // remove empty state
  if (emptyEl.parentNode) emptyEl.remove();

  const row  = document.createElement('div');
  row.className = 'msg' + (isNew ? ' new-flash' : '');
  if (typeof msg.id !== 'undefined') row.dataset.id = String(msg.id);
  row.draggable = true;
  row.addEventListener('dragstart', e => {
    if (pointerDownOnSelectArea) {
      e.preventDefault();
      pointerDownOnSelectArea = false;
      return;
    }
    if (dragSpiritEl && dragSpiritEl.parentNode) dragSpiritEl.parentNode.removeChild(dragSpiritEl);
    var feedRect = feedEl ? feedEl.getBoundingClientRect() : { left: 0, width: 300 };
    var block = (feedInner && selectedIds.has(msg.id) && selectedIds.size > 1)
      ? Array.from(feedInner.querySelectorAll('.msg.msg-selected'))
      : [row];
    if (block.length > 1) {
      dragSpiritEl = document.createElement('div');
      dragSpiritEl.className = 'msg-drag-spirit msg-drag-spirit-stack';
      dragSpiritEl.setAttribute('aria-hidden', 'true');
      dragSpiritEl.style.left = feedRect.left + 'px';
      dragSpiritEl.style.width = feedRect.width + 'px';
      dragSpiritEl.style.top = (e.clientY || 0) + 'px';
      for (var bi = 0; bi < block.length; bi++) {
        var rc = block[bi].cloneNode(true);
        rc.classList.remove('dragging', 'msg-drag-group', 'msg-selected', 'new-flash', 'msg-editing', 'msg-drag-over', 'msg-drag-target', 'dragging-in-feed');
        rc.classList.add('msg', 'msg-drag-spirit-row');
        rc.removeAttribute('draggable');
        rc.querySelectorAll('.msg-checkbox-zone, .msg-actions, .msg-select-wrap').forEach(function(el) { if (el && el.parentNode) el.parentNode.removeChild(el); });
        dragSpiritEl.appendChild(rc);
      }
      document.body.appendChild(dragSpiritEl);
    } else {
      dragSpiritEl = row.cloneNode(true);
      dragSpiritEl.classList.remove('dragging', 'msg-drag-group', 'msg-selected', 'new-flash', 'msg-editing', 'msg-drag-over', 'msg-drag-target', 'dragging-in-feed');
      dragSpiritEl.classList.add('msg', 'msg-drag-spirit');
      dragSpiritEl.removeAttribute('draggable');
      dragSpiritEl.setAttribute('aria-hidden', 'true');
      dragSpiritEl.style.left = feedRect.left + 'px';
      dragSpiritEl.style.width = feedRect.width + 'px';
      dragSpiritEl.style.top = (e.clientY || 0) + 'px';
      dragSpiritEl.querySelectorAll('.msg-checkbox-zone, .msg-actions, .msg-select-wrap').forEach(function(el) { if (el && el.parentNode) el.parentNode.removeChild(el); });
      document.body.appendChild(dragSpiritEl);
    }
    if (!dragImageEl) {
      dragImageEl = document.createElement('div');
      dragImageEl.setAttribute('aria-hidden', 'true');
      dragImageEl.style.cssText = 'position:fixed;left:0;top:0;width:1px;height:1px;opacity:0;pointer-events:none;overflow:hidden;';
      document.body.appendChild(dragImageEl);
    }
    if (dragImageEl.parentNode !== document.body) document.body.appendChild(dragImageEl);
    e.dataTransfer.setDragImage(dragImageEl, -9999, -9999);
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', typeof msg.text === 'string' ? msg.text : '');
    if (typeof msg.id !== 'undefined') e.dataTransfer.setData('application/x-inout-msg-id', String(msg.id));
    if (feedInner && selectedIds.has(msg.id) && selectedIds.size > 1) {
      dragSelectedRows = Array.from(feedInner.querySelectorAll('.msg.msg-selected'));
    } else {
      dragSelectedRows = [row];
    }
    dragSelectedRows.forEach(function(r) {
      if (dragSelectedRows.length > 1) r.classList.add('msg-drag-group');
      r.classList.add('dragging-in-feed');
    });
    row.classList.add('dragging');
    showOriginGhostOverlay(dragSelectedRows.slice());
    if (document.body) document.body.classList.add('dnd-active');
    savedOrderBeforeDrag = currentMessageOrder.slice();
    dragDropHandled = false;
    if (feedInner) feedInner.querySelectorAll('.msg-drag-over').forEach(r => r.classList.remove('msg-drag-over'));
  });
  row.addEventListener('dragend', () => {
    requestAnimationFrame(() => {
      try {
        if (lastReorderTarget && !originGhostsActive && feedInner && dragSelectedRows.length) {
          var insertBefore = lastReorderTarget.insertBefore;
          var wantAppend = lastReorderTarget.wantAppend;
          var block = dragSelectedRows.length > 1 ? dragSelectedRows.slice() : [row];
          if (block.length > 1) {
            var refAfterBlock = block[block.length - 1].nextSibling;
            block.forEach(function(r) { if (r.parentNode === feedInner) feedInner.removeChild(r); });
            var insertRef = wantAppend ? null : (block.indexOf(insertBefore) >= 0 ? refAfterBlock : insertBefore);
            if (insertRef) {
              feedInner.insertBefore(block[0], insertRef);
              for (var i = 1; i < block.length; i++) feedInner.insertBefore(block[i], block[i - 1].nextSibling);
            } else {
              feedInner.appendChild(block[0]);
              for (var j = 1; j < block.length; j++) feedInner.insertBefore(block[j], block[j - 1].nextSibling);
            }
          } else {
            if (wantAppend) feedInner.appendChild(row);
            else if (insertBefore && insertBefore.parentNode === feedInner) feedInner.insertBefore(row, insertBefore);
          }
        }
        if (dragSpiritEl && dragSpiritEl.parentNode) dragSpiritEl.parentNode.removeChild(dragSpiritEl);
        dragSpiritEl = null;
        removeOriginGhostOverlay();
        if (feedInner) feedInner.querySelectorAll('.msg.dragging-in-feed').forEach(r => r.classList.remove('dragging-in-feed'));
        removeOriginGhostsAndInsertRows();
        if (feedInner) feedInner.querySelectorAll('.msg-drag-group').forEach(r => r.classList.remove('msg-drag-group'));
        dragSelectedRows = [];
        if (document.body) {
          document.body.classList.remove('dnd-active');
          document.body.classList.add('dnd-just-ended');
        }
        lastReorderTarget = null;
        feedDragoverRaf = null;
        feedDragoverLast = null;
        lastDragClientX = null;
        lastDragClientY = null;
        clearEdgeScrollInterval();
        lastDragTargetRow = null;
        if (feedInner) feedInner.querySelectorAll('.msg-drag-over, .msg-drag-target').forEach(r => r.classList.remove('msg-drag-over', 'msg-drag-target', 'msg-drag-nudge-right'));
        row.classList.remove('dragging');
        tabsEl.querySelectorAll('.tab.tab-drop-target').forEach(t => t.classList.remove('tab-drop-target'));
        const domOrder = feedInner ? Array.from(feedInner.querySelectorAll('.msg')).map(r => Number(r.dataset.id)).filter(id => Number.isFinite(id)) : [];
        const orderChanged = !dragDropHandled && domOrder.length === savedOrderBeforeDrag.length && domOrder.some((id, i) => id !== savedOrderBeforeDrag[i]);
        if (!dragDropHandled && !orderChanged) {
          currentMessageOrder = savedOrderBeforeDrag.slice();
          applyMessageOrderToDOM();
          saveMessageOrderForCurrentChannel();
        } else {
          recomputeOrderFromDOM();
          saveMessageOrderForCurrentChannel();
        }
        applyFieldPrefsToMessages();
        row.style.pointerEvents = 'none';
        void row.offsetHeight;
        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            if (document.body) document.body.classList.remove('dnd-just-ended');
            row.style.pointerEvents = '';
            focusMessageInput();
          });
        });
      } finally {
        if (dragSpiritEl && dragSpiritEl.parentNode) dragSpiritEl.parentNode.removeChild(dragSpiritEl);
        dragSpiritEl = null;
        lastDragClientX = null;
        lastDragClientY = null;
        removeOriginGhostOverlay();
        if (feedInner) feedInner.querySelectorAll('.msg.dragging-in-feed').forEach(r => r.classList.remove('dragging-in-feed'));
        hideDropOriginLine();
        if (feedDropIndicatorEl) feedDropIndicatorEl.classList.remove('visible');
        lastIndicatorStyle = { left: -1, width: -1, top: -1, visible: false };
      }
    });
  });
  /* row-level dragover/drop removed: feed is the single drop target for reliable reorder */
  row.addEventListener('touchstart', e => {
    if (!feedInner) return;
    if (e.target.closest('.msg-checkbox-zone')) return;
    const contentLeft = row.querySelector('.msg-time') || row.querySelector('.msg-sender') || row.querySelector('.msg-text');
    if (contentLeft && e.touches[0].clientX < contentLeft.getBoundingClientRect().left) return;
    if (!touchDragState || !touchDragState.bound) {
      setupTouchDragHandlers();
    }
    if (!touchDragState) return;
    clearTimeout(touchDragState.timer);
    touchDragState.row = row;
    touchDragState.started = false;
    touchDragState.timer = setTimeout(() => {
      if (!touchDragState || touchDragState.row !== row) return;
      touchDragState.started = true;
      if (feedInner && selectedIds.has(msg.id) && selectedIds.size > 1) {
        dragSelectedRows = Array.from(feedInner.querySelectorAll('.msg.msg-selected'));
      } else {
        dragSelectedRows = [row];
      }
      dragSelectedRows.forEach(function(r) {
        if (dragSelectedRows.length > 1) r.classList.add('msg-drag-group');
      });
      row.classList.add('dragging');
      if (document.body) document.body.classList.add('dnd-active');
      /* origin line shown on first touchmove, not here, so it doesn't appear on long-press alone */
    }, 300); // long press threshold
  }, { passive: true });
  if (isNew) setTimeout(() => row.classList.remove('new-flash'), 800);

  const actions = document.createElement('div');
  actions.className = 'msg-actions';

  const actionDelete = document.createElement('button');
  actionDelete.className = 'msg-action-btn';
  actionDelete.textContent = 'Del';
  actionDelete.addEventListener('click', e => {
    e.stopPropagation();
    if (!msg.id) return;
    deleteSingleMessage(msg.id);
  });

  const actionMove = document.createElement('button');
  actionMove.className = 'msg-action-btn';
  actionMove.textContent = 'Move';
  actionMove.addEventListener('click', e => {
    e.stopPropagation();
    if (!msg.id) return;
    moveSingleMessage(msg.id);
  });

  const actionExport = document.createElement('button');
  actionExport.className = 'msg-action-btn';
  actionExport.textContent = 'Exp';
  actionExport.addEventListener('click', e => {
    e.stopPropagation();
    if (!msg.id) return;
    exportSingleMessage(msg.id);
  });

  const actionCopy = document.createElement('button');
  actionCopy.className = 'msg-action-btn';
  actionCopy.textContent = 'Copy';
  actionCopy.addEventListener('click', e => {
    e.stopPropagation();
    if (!msg.text) return;
    try {
      navigator.clipboard.writeText(msg.text);
      toast('Message copied.');
    } catch (err) {
      console.error(err);
      toast('Could not copy.');
    }
  });

  actions.appendChild(actionDelete);
  actions.appendChild(actionMove);
  actions.appendChild(actionExport);
  actions.appendChild(actionCopy);

  const sender = document.createElement('div');
  sender.className = 'msg-sender';
  if (msg.author_name) {
    sender.textContent = String(msg.author_name);
  } else if (msg.user_id && currentUser && msg.user_id === currentUser.id) {
    const nick = currentUser.user_metadata && currentUser.user_metadata.nickname
      ? String(currentUser.user_metadata.nickname)
      : 'you';
    sender.textContent = nick;
  } else if (msg.user_id) {
    sender.textContent = String(msg.user_id);
  } else {
    sender.textContent = 'unknown';
  }
  const fullLabel = sender.textContent;
  if (fullLabel.length > 10) {
    sender.textContent = fullLabel.slice(0, 10) + '…';
  }

  const isMainFeed = (msg.channel && msg.channel === 'main') || (!msg.channel && currentChannel === 'main');
  const wantAuthor = !isMainFeed && (!!fieldPrefs ? !!fieldPrefs.showAuthor : true);
  sender.style.setProperty('display', wantAuthor ? 'flex' : 'none', 'important');

  const selectWrap = document.createElement('div');
  selectWrap.className = 'msg-select-wrap';
  const selectBox = document.createElement('input');
  selectBox.type = 'checkbox';
  selectBox.className = 'msg-select';
  selectBox.addEventListener('change', () => {
    if (!msg.id) return;
    if (selectBox.checked) {
      selectedIds.add(msg.id);
      row.classList.add('msg-selected');
    } else {
      selectedIds.delete(msg.id);
      row.classList.remove('msg-selected');
    }
    updateSelectionUI();
  });
  selectWrap.appendChild(selectBox);
  const checkboxZone = document.createElement('div');
  checkboxZone.className = 'msg-checkbox-zone';
  const zoneLeft = document.createElement('div');
  zoneLeft.className = 'msg-checkbox-zone-left';
  zoneLeft.setAttribute('aria-hidden', 'true');
  checkboxZone.appendChild(zoneLeft);
  checkboxZone.appendChild(selectWrap);
  checkboxZone.addEventListener('click', e => {
    if (dragSelectJustEnded || dragSelectToggledByTouch) {
      dragSelectJustEnded = false;
      dragSelectToggledByTouch = false;
      return;
    }
    e.preventDefault();
    e.stopPropagation();
    selectBox.checked = !selectBox.checked;
    if (selectBox.checked) {
      selectedIds.add(msg.id);
      row.classList.add('msg-selected');
    } else {
      selectedIds.delete(msg.id);
      row.classList.remove('msg-selected');
    }
    if (!selectMode) {
      selectModeAutoOn = true;
      setSelectMode(true);
    }
    updateSelectionUI();
  }, true);
  checkboxZone.addEventListener('mousedown', e => {
    if (!msg.id) return;
    pointerDownOnSelectArea = true;
    dragSelectJustEnded = false;
    dragSelectToggledByTouch = false;
    const startY = e.clientY;
    const state = { started: false, mode: null, startRowStates: null, didWeMove: false };
    const onMove = (ev) => {
      if (!state.started) return;
      applyDragSelectRect(feedInner, feedEl, state.startYContent, ev.clientY, state.mode, state.startRowStates);
      updateEdgeScroll(ev.clientY, ev.clientX);
      state.didWeMove = true;
    };
    const onEnd = () => {
      clearEdgeScrollInterval();
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onEnd);
      if (state.started && !state.didWeMove) toggleRowAtY(feedInner, startY);
      dragSelectActive = false;
      dragSelectStarted = false;
      dragSelectJustEnded = true;
      pointerDownOnSelectArea = false;
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onEnd);
    const timer = setTimeout(() => {
      state.started = true;
      dragSelectStarted = true;
      if (!selectMode) {
        selectModeAutoOn = true;
        setSelectMode(true);
      }
      dragSelectActive = true;
      state.mode = selectBox.checked ? 'deselect' : 'select';
      state.startRowStates = new Map();
      if (feedEl) state.startYContent = startY - feedEl.getBoundingClientRect().top + feedEl.scrollTop;
      feedInner.querySelectorAll('.msg').forEach(r => {
        const box = r.querySelector('.msg-select');
        if (box) state.startRowStates.set(r, box.checked);
      });
    }, 200);
    const onDocUp = () => {
      clearTimeout(timer);
      document.removeEventListener('mouseup', onDocUp, true);
      pointerDownOnSelectArea = false;
    };
    document.addEventListener('mouseup', onDocUp, true);
  });

  }, { passive: true });

  /* long-press on message row (anywhere except checkbox-zone/actions/links) starts drag-select; any movement before delay cancels so reorder doesn't trigger */
  row.addEventListener('mousedown', e => {

    };
    const onEnd = () => {
      clearEdgeScrollInterval();
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onEnd);
      if (state.started && !state.didWeMove) toggleRowAtY(feedInner, startY);
      dragSelectActive = false;
      dragSelectStarted = false;
      dragSelectJustEnded = true;
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onEnd);
    let timer = setTimeout(() => {
      timer = null;
      state.started = true;
      dragSelectStarted = true;
      if (!selectMode) {
        selectModeAutoOn = true;
        setSelectMode(true);
      }

    const onDocMove = () => {
      if (timer) clearTimeout(timer);
      timer = null;
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('mouseup', onEnd);
      document.removeEventListener('mousemove', onDocMove, true);
      document.removeEventListener('mouseup', onDocUp, true);
    };
    const onDocUp = () => {
      if (timer) clearTimeout(timer);
      document.removeEventListener('mouseup', onDocUp, true);

    };
    document.addEventListener('mouseup', onDocUp, true);
    document.addEventListener('mousemove', onDocMove, true);
  });
  row.addEventListener('touchstart', e => {
    if (!msg.id || e.touches.length !== 1) return;
    if (e.target.closest('.msg-checkbox-zone, .msg-actions') || (e.target.closest('a') && e.target.closest('.msg-text'))) return;
    const startY = e.touches[0].clientY;
    const state = { started: false, mode: null, startRowStates: null, startYContent: null, didWeMove: false };
    const onTouchMove = (ev) => {
      if (!state.started || ev.touches.length !== 1) return;
      ev.preventDefault();
      const cy = ev.touches[0].clientY;
      applyDragSelectRect(feedInner, feedEl, state.startYContent, cy, state.mode, state.startRowStates);
      updateEdgeScroll(cy, ev.touches[0].clientX);

    };
    const onTouchEnd = () => {
      clearEdgeScrollInterval();
      document.removeEventListener('touchmove', onTouchMove, { passive: false });
      document.removeEventListener('touchend', onTouchEnd);
      document.removeEventListener('touchcancel', onTouchEnd);
      if (state.started && !state.didWeMove) toggleRowAtY(feedInner, startY);
      dragSelectActive = false;
      dragSelectStarted = false;
      dragSelectJustEnded = true;
    };
    document.addEventListener('touchmove', onTouchMove, { passive: false });
    document.addEventListener('touchend', onTouchEnd);
    document.addEventListener('touchcancel', onTouchEnd);
    let timer = setTimeout(() => {
      timer = null;
      state.started = true;
      dragSelectStarted = true;
      if (!selectMode) {
        selectModeAutoOn = true;
        setSelectMode(true);
      }
      dragSelectActive = true;
      state.mode = selectBox.checked ? 'deselect' : 'select';
      state.startRowStates = new Map();
      if (feedEl) state.startYContent = startY - feedEl.getBoundingClientRect().top + feedEl.scrollTop;
      feedInner.querySelectorAll('.msg').forEach(r => {
        const box = r.querySelector('.msg-select');

    const onDocTouchMove = (ev) => {

      cancelEditingMode(true);
      setTimeout(() => { saveInputGlobal(); if (input) input.focus(); }, 0);

    if (Number(msg.id) === Number(editingMessageId)) {

      setTimeout(() => { saveInputGlobal(); if (input) input.focus(); }, 0);

    }
    input.value = msg.text || '';

function appendMsg(msg, isNew) {
  const row = createMsgRow(msg, isNew);
  if (!row) return;
  feedInner.appendChild(row);
  // Ensure new messages respect the current view (time/author) settings.
  applyFieldPrefsToMessages();
  if (typeof msg.id !== 'undefined') {
    const idNum = Number(msg.id);
    if (Number.isFinite(idNum)) {
      currentMessageOrder = currentMessageOrder.filter(x => x !== idNum);
      currentMessageOrder.push(idNum);
      saveMessageOrderForCurrentChannel();
    }
  }
}

function sortMessagesByOrder(list, order) {
  if (!Array.isArray(list) || list.length === 0) return list;
  if (!Array.isArray(order) || order.length === 0) return list;
  const byId = new Map();
  list.forEach(m => { if (m && typeof m.id !== 'undefined') byId.set(m.id, m); });
  const out = [];
  order.forEach(id => {
    const m = byId.get(id);
    if (m) { out.push(m); byId.delete(id); }
  });
  byId.forEach(m => out.push(m));
  return out.length ? out : list;
}

function renderInitialMessages(list) {
  if (!Array.isArray(list) || list.length === 0) return;
  hideEmpty();
  const frag = document.createDocumentFragment();
  for (const msg of list) {
    const row = createMsgRow(msg, false);
    if (row) frag.appendChild(row);
  }
  requestAnimationFrame(() => {
    if (feedInner) feedInner.appendChild(frag);
  });
}

function loadOrderFromLocal() {
  try {
    const raw = localStorage.getItem(ORDER_STATE_KEY);
    if (!raw) return [];
    const map = JSON.parse(raw);
    if (!map || typeof map !== 'object') return [];
    const key = currentUser ? (currentUser.id + '::' + currentChannel) : ('anon::' + currentChannel);
    const arr = map[key];
    if (!Array.isArray(arr)) return [];
    return arr
      .map(x => Number(x))
      .filter(x => Number.isFinite(x));
  } catch (_) {
    return [];
  }
}

function saveOrderToLocal() {
  try {
    const raw = localStorage.getItem(ORDER_STATE_KEY);
    const map = raw ? JSON.parse(raw) : {};
    const key = currentUser ? (currentUser.id + '::' + currentChannel) : ('anon::' + currentChannel);
    map[key] = (currentMessageOrder || []).slice();
    localStorage.setItem(ORDER_STATE_KEY, JSON.stringify(map));
  } catch (_) {}
}

let globalMsgNum = 0;

function hideEmpty() {

}

function updateMsgCount() {
  msgCountEl.textContent = msgCount + (msgCount === 1 ? ' msg' : ' msgs');

function updateTabsUI() {

  buttons.forEach(btn => {
