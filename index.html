<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>inout</title>
<script type="module">
import { createClient } from "https://esm.sh/@supabase/supabase-js@2"

const supabase = createClient(
  "https://tfmbqiwxfgrwtjvoqomf.supabase.co",
  "sb_publishable_QzPgZBu5XwFXmnvD-DYCRw_EWFuhLn_"
)

const app = document.getElementById("app")

async function login() {
  await supabase.auth.signInWithOAuth({
    provider: "google",
    options: {
      redirectTo: "https://inout.vercel.app"
    }
  })
}

async function logout() {
  await supabase.auth.signOut()
  location.reload()
}

async function sendEntry() {
  const text = document.getElementById("text").value
  if (!text) return

  await supabase.from("entries").insert({ text })

  document.getElementById("text").value = ""
  loadEntries()
}

async function loadEntries() {
  const { data } = await supabase
    .from("entries")
    .select("*")
    .order("created_at", { ascending: false })

  const list = document.getElementById("list")
  list.innerHTML = ""

  data.forEach(e => {
    const div = document.createElement("div")
    div.textContent = e.created_at + " — " + e.text
    list.appendChild(div)
  })
}

async function init() {
  const { data: { session } } = await supabase.auth.getSession()

  if (!session) {
    app.innerHTML = `<button id="login">Login with Google</button>`
    document.getElementById("login").onclick = login
    return
  }

  app.innerHTML = `
    <button id="logout">logout</button>
    <br><br>
    <textarea id="text"></textarea>
    <br>
    <button id="send">send</button>
    <hr>
    <div id="list"></div>
  `

  document.getElementById("logout").onclick = logout
  document.getElementById("send").onclick = sendEntry

  loadEntries()
}

init()
</script>
</head>
<body>
<div id="app"></div>
</body>
</html>
