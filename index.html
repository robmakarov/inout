<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>INOUT</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%230a0a09'/%3E%3Cpath d='M18 44V20h6v24h-6Zm22-24v24h-6V20h6Z' fill='%23e8d5a0'/%3E%3Cpath d='M30 20h4v24h-4z' fill='%23f0ece3' opacity='.65'/%3E%3C/svg%3E"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://js.stripe.com/v3"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:     #0a0a09;
  --bg2:    #111110;
  --line:   #1e1e1c;
  --line2:  #2a2a27;
  --dim:    #3a3a36;
  --muted:  #666660;
  --soft:   #999990;
  --text:   #e2ddd4;
  --bright: #f0ece3;
  --acc:    #e8d5a0;
  --acc2:   #b8a060;
  --mono:   'DM Mono', monospace;
  --sans:   'Syne', sans-serif;
  --vv-top: 0px; /* visual viewport top offset (iOS keyboard) */
}

html,body{
  height:100%;
  overscroll-behavior:none;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--mono);
  font-size:13px;
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
  display:flex;
  flex-direction:column;
  min-height:100vh;
  overflow:hidden; /* only the content area scrolls */
}

/* hide scrollbars, keep scroll behavior */
#feed{
  scrollbar-width:none;
  -ms-overflow-style:none;
}
#feed::-webkit-scrollbar{display:none}

#app{
  flex:1;
  display:flex;
  flex-direction:column;
  min-height:0;
  height:100vh;
}

/* iOS/Safari dynamic viewport handling for app shell */
@supports (height: 100dvh) {
  #app{height:100dvh}
}
@supports (height: 100svh) {
  #app{height:100svh}
}

/* ── HEADER ── */
header{
  background:var(--bg);
  border-bottom:1px solid var(--line);
  padding:0 20px;
  height:48px;
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}

/* ── MANAGE BAR (SELECTION) ── */
#manage-bar{
  flex-shrink:0;
  background:var(--bg2);
  border-bottom:1px solid var(--line);
  padding:4px 20px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  font-size:10px;
  color:var(--dim);
  position:relative;
}

#select-toggle{
  border:1px solid var(--line2);
  background:transparent;
  color:var(--soft);
  font-family:var(--mono);
  font-size:10px;
  padding:3px 8px;
  border-radius:999px;
  cursor:pointer;
  text-transform:uppercase;
  letter-spacing:0.06em;
}
#select-toggle.active{
  background:var(--acc);
  color:var(--bg);
  border-color:var(--acc2);
}

.select-extra{
  display:inline-flex;
  align-items:center;
  gap:4px;
  overflow:hidden;
  max-width:0;
  opacity:0;
  transform:translateX(-4px);
  transition:max-width .2s cubic-bezier(.2,.8,.2,1), opacity .2s cubic-bezier(.2,.8,.2,1), transform .2s cubic-bezier(.2,.8,.2,1);
  vertical-align:top;
}
.select-extra.show{
  max-width:120px;
  opacity:1;
  transform:translateX(0);
}

#manage-actions{
  display:flex;
  align-items:center;
  gap:6px;
}

.manage-btn{
  border:1px solid var(--line2);
  background:var(--bg);
  color:var(--soft);
  font-family:var(--mono);
  font-size:10px;
  padding:3px 8px;
  border-radius:4px;
  cursor:pointer;
  text-transform:uppercase;
  letter-spacing:0.06em;
}
.manage-btn:hover{
  background:var(--line);
  color:var(--text);
}

#move-target{
  border:1px solid var(--line2);
  background:var(--bg);
  color:var(--soft);
  font-family:var(--mono);
  font-size:10px;
  padding:3px 6px;
  border-radius:4px;
}

#view-menu{
  position:absolute;
  top:100%;
  right:20px;
  margin-top:4px;
  padding:6px 8px;
  background:var(--bg);
  border:1px solid var(--line2);
  border-radius:4px;
  font-size:10px;
  color:var(--soft);
  display:none;
  flex-direction:column;
  gap:4px;
  z-index:130;
}
#view-menu.open{
  display:flex;
}
#view-menu label{
  display:inline-flex;
  align-items:center;
  gap:4px;
  cursor:pointer;
}

.logo{
  font-family:var(--sans);
  font-size:15px;
  font-weight:800;
  letter-spacing:0.08em;
  color:var(--bright);
  text-transform:uppercase;
  user-select:none;
}
.logo span{color:var(--acc)}

.header-right{
  display:flex;align-items:center;gap:16px;
}

/* user/account button */
#user-btn{
  width:30px;height:30px;
  display:grid;place-items:center;
  border:1px solid var(--line2);
  background:transparent;
  color:var(--soft);
  border-radius:999px;
  cursor:pointer;
  transition:background .12s, border-color .12s, color .12s;
}
#user-btn:hover{background:var(--line);color:var(--text)}
#user-btn.signed-in{
  border-color:rgba(232,213,160,0.55);
  box-shadow:0 0 0 1px rgba(232,213,160,0.12) inset;
}
#user-btn svg{display:block}

/* ── ACCOUNT DRAWER ── */
#user-modal-backdrop{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.62);
  display:none;
  z-index:250;
}

#user-modal{
  position:absolute;
  top:0;right:0;bottom:0;
  width:360px;
  max-width:92vw;
  background:var(--bg2);
  border-left:1px solid var(--line2);
  box-shadow:-24px 0 60px rgba(0,0,0,0.55);
  padding:14px 16px;
  display:flex;
  flex-direction:column;
  gap:12px;
  animation:drawerIn .18s ease both;
}

@keyframes drawerIn{from{transform:translateX(10px);opacity:0}to{transform:translateX(0);opacity:1}}

.um-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.um-title{
  font-family:var(--sans);
  font-size:13px;
  font-weight:700;
  letter-spacing:0.02em;
  color:var(--bright);
}

#user-close{
  border:1px solid var(--line2);
  background:transparent;
  color:var(--soft);
  width:28px;height:28px;
  border-radius:6px;
  cursor:pointer;
}
#user-close:hover{background:var(--line);color:var(--text)}

.um-section{
  border:1px solid var(--line2);
  background:var(--bg);
  border-radius:8px;
  padding:10px 10px;
}
.um-label{
  text-transform:uppercase;
  letter-spacing:0.08em;
  font-size:9px;
  color:var(--dim);
  margin-bottom:6px;
}
.um-value{
  font-size:11px;
  color:var(--soft);
  word-break:break-word;
}
.um-row{
  display:flex;
  gap:8px;
  align-items:center;
  margin-top:10px;
}
.um-btn{
  border:1px solid var(--line2);
  background:transparent;
  color:var(--soft);
  font-family:var(--mono);
  font-size:10px;
  padding:6px 10px;
  border-radius:6px;
  cursor:pointer;
  text-transform:uppercase;
  letter-spacing:0.06em;
}
.um-btn:hover{background:var(--line);color:var(--text)}
.um-btn-primary{
  background:var(--acc);
  color:var(--bg);
  border-color:var(--acc2);
}
.um-btn-primary:hover{background:#f0e0b0;color:var(--bg)}

@media(max-width:540px){
  #user-modal{
    width:100%;
    max-width:100%;
    border-left:none;
  }
}

#online-count{
  font-size:11px;
  color:var(--muted);
  letter-spacing:0.05em;
  display:flex;align-items:center;gap:6px;
}
.dot{
  width:6px;height:6px;border-radius:50%;
  background:#4a9;
  box-shadow:0 0 6px rgba(68,170,136,0.6);
  animation:pulse 2s ease-in-out infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

#msg-count{
  font-size:11px;color:var(--dim);letter-spacing:0.05em;
  display:none;
}

/* ── FEED ── */
#feed{
  flex:1;
  min-height:0;
  padding:0;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  outline:none;
}
#feed:focus{outline:none}

.feed-inner{
  padding:16px 0 8px;
  display:flex;
  flex-direction:column;
  justify-content:center;
  min-height:100%;
  gap:0;
}

/* empty state */
#empty{
  flex:1;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:10px;
  padding:60px 20px;
  opacity:0;
  animation:fadin .6s .3s ease both;
}
#empty .e-label{
  font-family:var(--sans);
  font-size:22px;font-weight:700;
  color:var(--dim);
  letter-spacing:0.02em;
}
#empty .e-sub{
  font-size:11px;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;
}
@keyframes fadin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* message row */
.msg{
  display:flex;
  align-items:center;
  gap:6px;
  padding:4px 20px;
  border-bottom:1px solid var(--line);
  transition:background .1s, transform .12s;
  animation:msgin .2s ease both;
  position:relative;
}
@keyframes msgin{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.msg-fly-clone{
  position:fixed;
  z-index:9999;
  pointer-events:none;
  box-shadow:0 4px 20px rgba(0,0,0,.35);
  border-radius:4px;
  background:var(--bg2);
  animation:none;
  transition:transform .4s ease-out, opacity .35s ease-out;
}
.msg-fly-clone .msg-actions{visibility:hidden}
.msg:hover{background:var(--bg2)}
.msg:last-child{border-bottom:none}

.msg-sender{
  font-size:10px;
  color:var(--dim);
  font-weight:500;
  flex:0 0 10ch;
  max-width:10ch;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
   display:flex;
   justify-content:flex-end;
   text-align:right;
}

.msg-time{
  font-size:10px;
  color:var(--dim);
  letter-spacing:0.04em;
  flex:0 0 auto;
  max-width:none;
  white-space:nowrap;
  text-align:left;
}

.msg-text{
  flex:1 1 auto;
  font-size:13px;
  color:var(--text);
  line-height:1.55;
  white-space:pre-wrap;
  padding-right:72px; /* reserve space under right-side actions */
  cursor:pointer;
}

@media (max-width:540px){
  /* Disable text selection on messages on mobile so long-press is for drag, not selection */
  .msg,
  .msg *{
    -webkit-user-select:none;
    user-select:none;
  }
}

/* on hover, make all message parameters (time/author) same color as text */
.msg:hover .msg-time,
.msg:hover .msg-sender{
  color:var(--text);
}

.msg-select-wrap{
  flex:0 0 20px;
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:opacity .12s ease;
}

body.select-mode .msg-select-wrap,
.msg:hover .msg-select-wrap,
.msg.msg-selected .msg-select-wrap{
  opacity:1;
  pointer-events:auto;
}

.msg-select{
  width:13px;
  height:13px;
  -webkit-appearance:none;
  appearance:none;
  border:1px solid var(--line2);
  border-radius:3px;
  background:var(--bg);
  cursor:pointer;
}
.msg-select:checked{
  background:var(--acc);
  border-color:var(--acc2);
  box-shadow:inset 0 0 0 2px var(--bg);
}

.msg-actions{
  display:flex;
  align-items:center;
  gap:4px;
  position:absolute;
  right:20px;
  top:50%;
  transform:translateY(-50%);
  margin:0;
  opacity:0;
  pointer-events:none;
  transition:opacity .15s ease;
}
.msg:hover .msg-actions{
  opacity:1;
  pointer-events:auto;
}
.msg-action-btn{
  border:1px solid var(--line2);
  background:var(--bg);
  color:var(--soft);
  font-family:var(--mono);
  font-size:9px;
  padding:1px 4px;
  border-radius:3px;
  cursor:pointer;
}
.msg-action-btn:hover{
  background:var(--line);
  color:var(--text);
}

.msg-text a{
  color:var(--acc);
  text-decoration:none;
  border-bottom:1px solid var(--acc2);
}
.msg-text a:hover{color:var(--bright)}

/* new message flash */
.msg.new-flash{
  background:rgba(232,213,160,0.04);
}

.msg.dragging{
  opacity: 1;
  box-shadow: 0 0 0 1px var(--line);
  background: var(--bg2);
}

/* ── INPUT AREA ── */
#input-area{
  flex-shrink:0;
  background:var(--bg);
  border-top:1px solid var(--line);
  padding:12px 20px calc(16px + env(safe-area-inset-bottom, 0px));
}

.input-wrap{
  display:flex;
  align-items:flex-end;
  gap:10px;
  position:relative;
}

/* clipboard suggestion bubble (this device) */
#clipboard-bubble{
  display:none;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:6px;
  padding:6px 8px;
  border-radius:4px;
  background:var(--bg2);
  border:1px solid var(--line2);
  font-size:11px;
  color:var(--soft);
}
#clipboard-bubble-text{
  flex:1;
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.clipboard-bubble-actions{
  display:flex;
  gap:6px;
}

/* remote draft bubble (other device) */
#draft-bubble{
  display:none;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  margin-bottom:6px;
  padding:6px 8px;
  border-radius:4px;
  background:var(--bg2);
  border:1px dashed var(--line2);
  font-size:11px;
  color:var(--soft);
}
#draft-bubble-text{
  flex:1;
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.draft-bubble-actions{
  display:flex;
  gap:6px;
}
.draft-btn{
  border:1px solid var(--line2);
  background:transparent;
  color:var(--soft);
  font-family:var(--mono);
  font-size:9px;
  padding:3px 6px;
  border-radius:3px;
  cursor:pointer;
  text-transform:uppercase;
  letter-spacing:0.06em;
}
.draft-btn:hover{
  background:var(--line);
  color:var(--text);
}

#msg-input{
  flex:1;
  background:var(--bg2);
  border:1px solid var(--line2);
  color:var(--text);
  font-family:var(--mono);
  font-size:13px;
  line-height:1.55;
  padding:9px 12px;
  resize:none;
  outline:none;
  border-radius:3px;
  min-height:38px;
  max-height:160px;
  overflow-y:auto;
  transition:border-color .15s, background .15s;
  scrollbar-width:none;
}
#msg-input::-webkit-scrollbar{display:none}
#msg-input::placeholder{color:var(--dim)}
#msg-input:focus{
  border-color:var(--line2);
  background:#161614;
  outline:none;
}
#msg-input:focus-visible{outline:none}

#send-btn{
  flex-shrink:0;
  height:38px;
  padding:0 16px;
  background:var(--acc);
  color:var(--bg);
  border:none;
  font-family:var(--sans);
  font-size:12px;
  font-weight:700;
  letter-spacing:0.1em;
  text-transform:uppercase;
  cursor:pointer;
  border-radius:3px;
  transition:background .12s, transform .08s;
  white-space:nowrap;
}
#send-btn:hover{background:#f0e0b0}
#send-btn:active{transform:scale(.97)}
#send-btn:disabled{background:var(--dim);color:var(--muted);cursor:default;transform:none}

.input-tools{
  display:flex;
  justify-content:flex-start;
  margin-top:6px;
}

.clear-input-btn{
  position:absolute;
  top:10px;
  right:66px; /* moved 20px further left inside textarea */
  width:16px;
  height:16px;
  border-radius:999px;
  border:1px solid var(--line2);
  background:var(--bg2);
  color:var(--dim);
  font-size:11px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  opacity:0;
  pointer-events:none;
  transition:opacity .12s ease, background .12s ease, color .12s ease;
}
.clear-input-btn:not(:disabled){
  opacity:1;
  pointer-events:auto;
}
.clear-input-btn:hover:not(:disabled){
  background:var(--line);
  color:var(--text);
}
.clear-input-btn:disabled{
  opacity:0;
  pointer-events:none;
}

/* ── TOAST ── */
#toast{
  position:fixed;
  bottom:80px;left:50%;transform:translateX(-50%) translateY(8px);
  background:var(--bg2);border:1px solid var(--line2);
  border-radius:3px;
  font-size:11px;color:var(--soft);
  padding:6px 14px;
  letter-spacing:0.06em;
  pointer-events:none;
  opacity:0;transition:opacity .2s,transform .2s;
  z-index:999;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── SCROLL TO BOTTOM BTN ── */
#scroll-btn{
  position:fixed;
  bottom:90px;right:20px;
  background:var(--bg2);
  border:1px solid var(--line2);
  color:var(--soft);
  font-family:var(--mono);font-size:11px;
  padding:6px 12px;
  cursor:pointer;border-radius:3px;
  opacity:0;pointer-events:none;
  transition:opacity .2s;
  z-index:50;
  letter-spacing:0.04em;
}
#scroll-btn.visible{opacity:1;pointer-events:auto}
#scroll-btn:hover{background:var(--line);color:var(--text)}

/* ── MOBILE ── */
@media(max-width:540px){
  .msg{gap:8px}
  .msg-meta{
    min-width:120px;
    max-width:160px;
  }
  body{
    overflow:auto;
    scrollbar-width:none;
    -ms-overflow-style:none;
  }
  body::-webkit-scrollbar{display:none}
  #feed{
    scrollbar-width:none;
    -ms-overflow-style:none;
  }
  #feed::-webkit-scrollbar{display:none}
  /* keep header pinned even when keyboard opens */
  header{
    position:fixed;
    top:0;
    left:0;
    right:0;
    width:100%;
    padding:0 14px;
    z-index:120;
    transform:translateY(var(--vv-top));
    transition:transform .22s cubic-bezier(.2,.8,.2,1);
    will-change:transform;
  }
  /* pin manage bar under header too */
  #manage-bar{
    position:fixed;
    top:48px;
    left:0;
    right:0;
    width:100%;
    z-index:115;
    padding:4px 14px;
    transform:translateY(var(--vv-top));
    transition:transform .22s cubic-bezier(.2,.8,.2,1);
    will-change:transform;
  }
  /* reserve space for fixed header + manage bar */
  #app{padding-top:calc(48px + 34px)}
  /* keep input bar above iOS Safari bottom panel & keyboard */
  #input-area{
    position:fixed;
    left:0;
    right:0;
    bottom:0;
    z-index:110;
    padding:10px 10px calc(14px + env(safe-area-inset-bottom, 0px));
    background:var(--bg);
  }
  /* add bottom space in feed so last messages are not hidden behind input */
  #feed{
    padding-bottom:120px;
  }
  #tabs{
    padding:8px 10px 8px;
    margin:-10px -10px 10px;
  }
  /* prevent iOS Safari zoom-on-focus */
  #msg-input{font-size:16px}
  .cm-input{font-size:16px}
}

#tabs{
  display:flex;
  gap:6px;
  padding:8px 20px 8px;
  border-bottom:1px solid var(--line);
  background:var(--bg2);
  align-items:center;
  margin:-12px -20px 10px;
}

.tab{
  border:1px solid var(--line2);
  background:transparent;
  color:var(--soft);
  font-family:var(--mono);
  font-size:11px;
  padding:3px 8px;
  border-radius:999px;
  cursor:pointer;
  letter-spacing:0.04em;
  text-transform:uppercase;
  display:inline-flex;
  align-items:center;
  gap:6px;
  transition:background .15s, color .15s, border-color .15s, box-shadow .15s, transform .15s;
}

.tab-active{
  background:var(--acc);
  color:var(--bg);
  border-color:var(--acc2);
}

.tab-shared{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:14px;height:14px;
  color:var(--dim);
}

// iOS Safari: keep fixed header pinned when keyboard opens
(function setupVisualViewportPinning() {
  const vv = window.visualViewport;
  if (!vv) return;
  let raf = 0;
  let current = 0;
  let pending = 0;

  const readTop = () => {
    const raw = (typeof vv.offsetTop === 'number') ? vv.offsetTop : 0;
    // clamp & quantize to reduce jitter
    return Math.max(0, Math.round(raw));
  };

  const apply = () => {
    raf = 0;
    const next = pending;
    if (Math.abs(next - current) < 2) return; // ignore tiny oscillations
    current = next;
    document.documentElement.style.setProperty('--vv-top', current + 'px');
  };

  const schedule = () => {
    pending = readTop();
    if (!raf) raf = requestAnimationFrame(apply);
  };

  vv.addEventListener('resize', schedule);
  vv.addEventListener('scroll', schedule);
  window.addEventListener('orientationchange', schedule);
  schedule();
})();

/* ═══ LOAD ════════════════════════════════════════════════ */
async function loadMessages() {
  if (!currentUser) return;

  let query = sb
    .from('entries')
    .select('id, created_at, text, channel, user_id, author_name')
    .eq('channel', currentChannel);

  // For the main feed, show only this user's own messages.
  if (currentChannel === 'main' && currentUser) {
    query = query.eq('user_id', currentUser.id);
  }

  const { data, error } = await query
    .order('created_at', { ascending: true })
    .limit(200);

  if (error) { console.error(error); return; }

  if (data && data.length > 0) {
    const list = sortMessagesByOrder(data, currentMessageOrder);
    renderInitialMessages(list);
    msgCount = data.length;
    updateMsgCount();
  }
}

/* ═══ REALTIME ════════════════════════════════════════════ */
function subscribeRealtimeAll() {
  for (const sub of channelSubs.values()) {
    try { sub.unsubscribe(); } catch (_) {}
  }
  channelSubs = new Map();

  if (!currentUser) return;

  channels.forEach(ch => {
    let filter = 'channel=eq.' + ch;
    if (ch === 'main' && currentUser) {
      filter += ',user_id=eq.' + currentUser.id;
    }
    const sub = sb
      .channel('entries-' + ch)
      .on(
        'postgres_changes',
        { event: 'INSERT', schema: 'public', table: 'entries', filter },
        payload => onInsertForChannel(ch, payload.new)
      )
      .on(
        'postgres_changes',
        { event: 'UPDATE', schema: 'public', table: 'entries', filter },
        payload => onUpdateForChannel(ch, payload.new)
      )
      .subscribe();
    channelSubs.set(ch, sub);
  });
}

function updateMessageRowText(msgId, text) {
  if (!feedInner || msgId == null) return;
  const idStr = String(msgId);
  const el = feedInner.querySelector('.msg[data-id="' + CSS.escape(idStr) + '"]');
  if (!el) return;
  const textEl = el.querySelector('.msg-text');
  if (textEl) textEl.innerHTML = linkify(escapeHtml(text || ''));
}

function onUpdateForChannel(ch, row) {
  if (ch !== currentChannel || !row) return;
  const id = row.id != null ? row.id : row.Id;
  if (id == null) return;
  if (id === editingMessageId) {
    editingMessageId = null;
    if (input && input.placeholder === 'Editing message…') input.placeholder = 'say something…';
  }
  const text = row.text != null ? row.text : (row.Text != null ? row.Text : '');
  updateMessageRowText(id, text);
}

function subscribeOrderRealtime() {
  if (!currentUser) return;
  if (orderSub) {
    try { orderSub.unsubscribe(); } catch (_) {}
    orderSub = null;
  }
  orderSub = sb
    .channel('message-orders-' + currentUser.id)
    .on(
      'postgres_changes',
      {
        event: '*',
        schema: 'public',
        table: 'message_orders',
        filter: 'user_id=eq.' + currentUser.id
      },
      async payload => {
        const row = payload.new || payload.old || {};
        if (!row || row.channel !== currentChannel) return;
        if (suppressNextOrderApply) { suppressNextOrderApply = false; return; }
        if (Date.now() < suppressOrderApplyUntil) return;
        await loadMessageOrderForCurrentChannel();
        applyMessageOrderToDOM();
      }
    )
    .subscribe();
}

function subscribeViewRealtime() {
  if (!currentUser) return;
  if (viewSub) {
    try { viewSub.unsubscribe(); } catch (_) {}
    viewSub = null;
  }
  viewSub = sb
    .channel('views-' + currentUser.id)
    .on(
      'postgres_changes',
      {
        event: '*',
        schema: 'public',
        table: 'views',
        filter: 'user_id=eq.' + currentUser.id
      },
      payload => {
        const row = payload.new || payload.old || {};
        if (!row || row.channel !== currentChannel || !row.config) return;
        if (suppressNextViewApply) { suppressNextViewApply = false; return; }
        if (Date.now() < suppressOrderApplyUntil) return;
        const cfg = row.config || {};
        // Update order
        if (Array.isArray(cfg.order)) {
          currentMessageOrder = cfg.order
            .map(x => Number(x))
            .filter(x => Number.isFinite(x));
          saveOrderToLocal();
          applyMessageOrderToDOM();
        }
        // Update field prefs
        const defTime = true;
        const defAuthor = currentChannel === 'main' ? false : true;
        fieldPrefs = {
          showTime: typeof cfg.showTime === 'boolean' ? cfg.showTime : defTime,
          showAuthor: typeof cfg.showAuthor === 'boolean' ? cfg.showAuthor : defAuthor,
        };
        saveFieldPrefsForCurrentChannel();
        applyFieldPrefsToMessages();
      }
    )
    .subscribe();
}

function onInsertForChannel(ch, msg) {
  if (ch === currentChannel) {
    hideEmpty();
    appendMsg(msg, true);
    msgCount++;
    updateMsgCount();
    // Always keep the newest message visible (messenger behavior).
    requestAnimationFrame(scrollBottom);
    return;
  }

  const next = (unreadCounts.get(ch) || 0) + 1;
  unreadCounts.set(ch, next);
  updateTabBadge(ch);
}

/* ═══ PRESENCE (online count) ════════════════════════════ */
function setupPresence() {
  presenceCh = sb.channel('presence-room', {
    config: { presence: { key: myId } }
  });

  presenceCh
    .on('presence', { event: 'sync' }, () => {
      const state = presenceCh.presenceState();
      ocNum.textContent = Object.keys(state).length;
    })
    .on('presence', { event: 'join' }, () => {})
    .on('presence', { event: 'leave' }, () => {})
    .subscribe(async status => {
      if (status === 'SUBSCRIBED') {
        await presenceCh.track({ online_at: new Date().toISOString() });
      }
    });
}

/* ═══ CROSS-DEVICE DRAFTS (SAME USER) ══════════════════════ */
function setupDraftChannel() {
  teardownDraftChannel();
  latestRemoteDraft = '';
  if (!currentUser) return;

  draftChannel = sb
    .channel('drafts-' + currentUser.id, {
      config: {
        broadcast: { self: false }
      }
    })
    .on('broadcast', { event: 'draft' }, payload => {
      const data = payload.payload || {};
      if (!data || data.from === myId) return; // ignore own events
      const text = (data.text || '').trim();
      latestRemoteDraft = text;
      if (text) {
        showDraftBubble(text);
      } else {
        hideDraftBubble();
      }
    })
    .subscribe();
}

function teardownDraftChannel() {
  latestRemoteDraft = '';
  hideDraftBubble();
  if (draftChannel) {
    try { draftChannel.unsubscribe(); } catch (_) {}
    draftChannel = null;
  }
}

function broadcastDraft(text) {
  if (!draftChannel || !currentUser) return;
  draftChannel.send({
    type: 'broadcast',
    event: 'draft',
    payload: { from: myId, text: text || '' }
  });
}

function showDraftBubble(text) {
  if (!draftBubble || !draftBubbleTxt) return;
  draftBubbleTxt.textContent = text;
  draftBubble.style.display = 'flex';
}

function hideDraftBubble() {

/* ═══ RENDER ══════════════════════════════════════════════ */
function setupTouchDragHandlers() {
  if (touchDragState && touchDragState.bound) return;
  touchDragState = {
    row: null,
    started: false,
    timer: null,
    bound: true,
  };
  const move = e => {
    if (!touchDragState || !touchDragState.started || !touchDragState.row) return;
    const touch = e.touches && e.touches[0];
    if (!touch) return;
    e.preventDefault();
    const y = touch.clientY;
    const rows = Array.from(feedInner.querySelectorAll('.msg'));
    if (!rows.length) return;
    let target = null;
    let targetCenterDist = Infinity;
    rows.forEach(r => {
      if (r === touchDragState.row) return;
      const rect = r.getBoundingClientRect();
      const center = rect.top + rect.height / 2;
      const dist = Math.abs(center - y);
      if (dist < targetCenterDist) {
        targetCenterDist = dist;
        target = r;
      }
    });
    if (!target) return;
    const targetRect = target.getBoundingClientRect();
    const before = y < targetRect.top + targetRect.height / 2;
    if (before) {
      feedInner.insertBefore(touchDragState.row, target);
    } else {
      feedInner.insertBefore(touchDragState.row, target.nextSibling);
    }
  };
  const end = () => {
    if (!touchDragState || !touchDragState.row) return;
    clearTimeout(touchDragState.timer);
    document.removeEventListener('touchmove', move, { passive: false });
    document.removeEventListener('touchend', end);
    const r = touchDragState.row;
    r.classList.remove('dragging');
    touchDragState.started = false;
    touchDragState.row = null;
    recomputeOrderFromDOM();
    saveMessageOrderForCurrentChannel();
    r.style.pointerEvents = 'none';
    void r.offsetHeight;
    requestAnimationFrame(() => { r.style.pointerEvents = ''; });
  };
  document.addEventListener('touchmove', move, { passive: false });
  document.addEventListener('touchend', end);
}

function createMsgRow(msg, isNew) {
  if (msg && typeof msg.id !== 'undefined') {
    if (seenIds.has(msg.id)) return null;
    seenIds.add(msg.id);
  }
  // remove empty state
  if (emptyEl.parentNode) emptyEl.remove();

  const row  = document.createElement('div');
  row.className = 'msg' + (isNew ? ' new-flash' : '');
  if (typeof msg.id !== 'undefined') row.dataset.id = String(msg.id);
  row.draggable = true;
  row.addEventListener('dragstart', e => {
    row.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    if (typeof msg.id !== 'undefined') e.dataTransfer.setData('text/plain', String(msg.id));
  });
  row.addEventListener('dragend', () => {
    row.classList.remove('dragging');
    tabsEl.querySelectorAll('.tab.tab-drop-target').forEach(t => t.classList.remove('tab-drop-target'));
    recomputeOrderFromDOM();
    saveMessageOrderForCurrentChannel();
    row.style.pointerEvents = 'none';
    void row.offsetHeight;
    requestAnimationFrame(() => { row.style.pointerEvents = ''; });
  });
  row.addEventListener('dragover', e => {
    e.preventDefault();
    const dragging = feedInner.querySelector('.msg.dragging');
    if (!dragging || dragging === row) return;
    const bounding = row.getBoundingClientRect();
    const offset = e.clientY - bounding.top;
    const halfway = bounding.height / 2;
    if (offset > halfway) {
      feedInner.insertBefore(dragging, row.nextSibling);
    } else {
      feedInner.insertBefore(dragging, row);
    }
  });
  row.addEventListener('drop', e => {
    e.preventDefault();
  });
  row.addEventListener('touchstart', e => {
    if (!feedInner) return;
    if (!touchDragState || !touchDragState.bound) {
      setupTouchDragHandlers();
    }
    if (!touchDragState) return;
    clearTimeout(touchDragState.timer);
    touchDragState.row = row;
    touchDragState.started = false;
    touchDragState.timer = setTimeout(() => {
      if (!touchDragState || touchDragState.row !== row) return;
      touchDragState.started = true;
      row.classList.add('dragging');
    }, 300); // long press threshold
  }, { passive: true });
  if (isNew) setTimeout(() => row.classList.remove('new-flash'), 800);

  const actions = document.createElement('div');
  actions.className = 'msg-actions';

  const actionDelete = document.createElement('button');
  actionDelete.className = 'msg-action-btn';
  actionDelete.textContent = 'Del';
  actionDelete.addEventListener('click', e => {
    e.stopPropagation();
    if (!msg.id) return;
    deleteSingleMessage(msg.id);
  });

  const actionMove = document.createElement('button');
  actionMove.className = 'msg-action-btn';
  actionMove.textContent = 'Move';
  actionMove.addEventListener('click', e => {
    e.stopPropagation();
    if (!msg.id) return;
    moveSingleMessage(msg.id);
  });

  const actionExport = document.createElement('button');
  actionExport.className = 'msg-action-btn';
  actionExport.textContent = 'Exp';
  actionExport.addEventListener('click', e => {
    e.stopPropagation();
    if (!msg.id) return;
    exportSingleMessage(msg.id);
  });

  const actionCopy = document.createElement('button');
  actionCopy.className = 'msg-action-btn';
  actionCopy.textContent = 'Copy';
  actionCopy.addEventListener('click', e => {
    e.stopPropagation();
    if (!msg.text) return;
    try {
      navigator.clipboard.writeText(msg.text);
      toast('Message copied.');
    } catch (err) {
      console.error(err);
      toast('Could not copy.');
    }
  });

  actions.appendChild(actionDelete);
  actions.appendChild(actionMove);
  actions.appendChild(actionExport);
  actions.appendChild(actionCopy);

  const sender = document.createElement('div');
  sender.className = 'msg-sender';
  if (msg.author_name) {
    sender.textContent = String(msg.author_name);
  } else if (msg.user_id && currentUser && msg.user_id === currentUser.id) {
    const nick = currentUser.user_metadata && currentUser.user_metadata.nickname
      ? String(currentUser.user_metadata.nickname)
      : 'you';
    sender.textContent = nick;
  } else if (msg.user_id) {
    sender.textContent = String(msg.user_id);
  } else {
    sender.textContent = 'unknown';
  }
  const fullLabel = sender.textContent;
  if (fullLabel.length > 10) {
    sender.textContent = fullLabel.slice(0, 10) + '…';
  }

  const isMainFeed = (msg.channel && msg.channel === 'main') || (!msg.channel && currentChannel === 'main');
  if (isMainFeed) {
    sender.style.display = 'none';
  } else {
    sender.style.display = '';
  }

  const selectWrap = document.createElement('div');
  selectWrap.className = 'msg-select-wrap';
  const selectBox = document.createElement('input');
  selectBox.type = 'checkbox';
  selectBox.className = 'msg-select';
  selectBox.addEventListener('change', () => {
    if (!msg.id) return;
    if (selectBox.checked) {
      selectedIds.add(msg.id);
      row.classList.add('msg-selected');
    } else {
      selectedIds.delete(msg.id);
      row.classList.remove('msg-selected');
    }
    updateSelectionUI();
  });
  selectWrap.appendChild(selectBox);

  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = formatTime(msg.created_at);

  const text = document.createElement('div');
  text.className = 'msg-text';
  text.innerHTML = linkify(escapeHtml(msg.text));
  text.addEventListener('click', e => {
    if (e.target.closest('a')) return;
    e.stopPropagation();
    if (typeof msg.id === 'undefined') return;
    if (selectMode) {
      selectBox.checked = !selectBox.checked;
      if (selectBox.checked) {
        selectedIds.add(msg.id);
        row.classList.add('msg-selected');
      } else {
        selectedIds.delete(msg.id);
        row.classList.remove('msg-selected');
      }
      updateSelectionUI();
      return;
    }
    input.value = msg.text || '';
    editingMessageId = msg.id;
    input.placeholder = 'Editing message…';
    autoResize();
    sendBtn.disabled = !input.value.trim();
    updateClearInputBtn();
    saveInputGlobal();
    if (input) input.focus();
  });

  row.appendChild(selectWrap);
  row.appendChild(time);
  row.appendChild(sender);
  row.appendChild(text);
  row.appendChild(actions);
  return row;
}

function appendMsg(msg, isNew) {
  const row = createMsgRow(msg, isNew);
  if (!row) return;
  feedInner.appendChild(row);
  if (typeof msg.id !== 'undefined') {
    const idNum = Number(msg.id);
    if (Number.isFinite(idNum)) {
      currentMessageOrder = currentMessageOrder.filter(x => x !== idNum);
      currentMessageOrder.push(idNum);
      saveMessageOrderForCurrentChannel();
    }
  }
}

function sortMessagesByOrder(list, order) {
  if (!Array.isArray(list) || list.length === 0) return list;
  if (!Array.isArray(order) || order.length === 0) return list;
  const byId = new Map();
  list.forEach(m => { if (m && typeof m.id !== 'undefined') byId.set(m.id, m); });
  const out = [];
  order.forEach(id => {
    const m = byId.get(id);
    if (m) { out.push(m); byId.delete(id); }
  });
  byId.forEach(m => out.push(m));
  return out.length ? out : list;
}

function renderInitialMessages(list) {
  if (!Array.isArray(list) || list.length === 0) return;
  hideEmpty();
  const frag = document.createDocumentFragment();
  for (const msg of list) {
    const row = createMsgRow(msg, false);
    if (row) frag.appendChild(row);
  }
  feedInner.appendChild(frag);
}

function loadOrderFromLocal() {

    const arr = map[key];
    if (!Array.isArray(arr)) return [];
    return arr
      .map(x => Number(x))
      .filter(x => Number.isFinite(x));
  } catch (_) {
    return [];
  }
}

function saveOrderToLocal() {

    map[key] = (currentMessageOrder || []).slice();

}

async function loadMessageOrderForCurrentChannel() {
  currentMessageOrder = [];
  // 1) Try unified view object (if table exists and user is signed in).
  if (currentUser) {
    try {
      const { data, error } = await sb
        .from('views')
        .select('config')
        .eq('user_id', currentUser.id)
        .eq('channel', currentChannel)
        .limit(1)
        .maybeSingle();
      if (!error && data && data.config) {
        const cfg = data.config || {};
        const orderArr = Array.isArray(cfg.order) ? cfg.order : [];
        currentMessageOrder = orderArr
          .map(x => Number(x))
          .filter(x => Number.isFinite(x));
        // Pull view rules into fieldPrefs and mirror into local storage.
        const defTime = true;
        const defAuthor = currentChannel === 'main' ? false : true;
        fieldPrefs = {
          showTime: typeof cfg.showTime === 'boolean' ? cfg.showTime : defTime,
          showAuthor: typeof cfg.showAuthor === 'boolean' ? cfg.showAuthor : defAuthor,
        };
        saveFieldPrefsForCurrentChannel();
        // also mirror order into local backup
        saveOrderToLocal();
      }
    } catch (e) {
      // views table might not exist yet; fail soft
      console.error(e);
    }
  }
  // 2) If no view-based order, fall back to legacy message_orders + local.
  if (!currentMessageOrder.length && currentUser) {
    try {
      const { data, error } = await sb
        .from('message_orders')
        .select('entry_id, position')
        .eq('user_id', currentUser.id)
        .eq('channel', currentChannel)
        .order('position', { ascending: true });
      if (!error && data && data.length) {
        currentMessageOrder = data
          .map(row => Number(row.entry_id))
          .filter(x => Number.isFinite(x));
      }
    } catch (e) {
      console.error(e);
    }
  }
  // 3) Final fallback: pure local order.
  if (!currentMessageOrder.length) {
    currentMessageOrder = loadOrderFromLocal();
  }
}

let suppressNextOrderApply = false;
let suppressNextViewApply = false;
let suppressOrderApplyUntil = 0; /* ignore realtime order/view applies until this timestamp */

async function saveMessageOrderForCurrentChannel() {
  if (!currentMessageOrder.length) return;
  saveOrderToLocal();
  suppressOrderApplyUntil = Date.now() + 600;
  if (currentUser) {
    try {
      const rows = currentMessageOrder.map((entryId, index) => ({
        user_id: currentUser.id,
        channel: currentChannel,
        entry_id: entryId,
        position: index,
      }));
      suppressNextOrderApply = true;
      const { error } = await sb
        .from('message_orders')
        .upsert(rows, { onConflict: 'user_id,channel,entry_id' });
      if (error) console.error(error);
    } catch (e) { console.error(e); }
  }
  if (currentUser) {
    try {
      const cfg = {
        order: currentMessageOrder.slice(),
        showTime: !!fieldPrefs.showTime,
        showAuthor: !!fieldPrefs.showAuthor,
      };
      suppressNextViewApply = true;
      await sb.from('views').upsert(
        { user_id: currentUser.id, channel: currentChannel, config: cfg },
        { onConflict: 'user_id,channel' }
      );
    } catch (e) { console.error(e); }
  }
}

function recomputeOrderFromDOM() {
  if (!feedInner) return;
  const ids = Array.from(feedInner.querySelectorAll('.msg'))
    .map(row => Number(row.dataset.id))
    .filter(id => Number.isFinite(id));
  currentMessageOrder = ids;
}

function applyMessageOrderToDOM() {
  if (!feedInner) return;
  if (!currentMessageOrder.length) return;
  const rows = Array.from(feedInner.querySelectorAll('.msg'));
  if (!rows.length) return;
  // Skip if DOM order already matches — avoids reflow/blink when nothing changed
  const domOrder = rows.map(r => Number(r.dataset.id)).filter(id => Number.isFinite(id));
  if (domOrder.length === currentMessageOrder.length &&
      domOrder.every((id, i) => id === currentMessageOrder[i])) return;
  const byId = new Map();
  rows.forEach(row => {
    const id = Number(row.dataset.id);
    if (Number.isFinite(id)) byId.set(id, row);
  });
  if (!byId.size) return;
  const frag = document.createDocumentFragment();
  currentMessageOrder.forEach(id => {
    const row = byId.get(id);
    if (row) {
      frag.appendChild(row);
      byId.delete(id);
    }
  });
  // append any remaining rows that weren't in the saved order
  byId.forEach(row => frag.appendChild(row));
  feedInner.appendChild(frag);
}

function renderTabs() {

    }

    const badge = document.createElement('span');

    btn.appendChild(badge);

    if (ch !== 'main') {
      const close = document.createElement('span');
      close.className = 'tab-close';
      close.textContent = '×';
      close.addEventListener('click', e => {
        e.stopPropagation();
        deleteChannel(ch);
      });
      btn.appendChild(close);
    }

    btn.addEventListener('click', () => switchChannel(ch));
    btn.addEventListener('dragenter', e => {
      e.preventDefault();
      e.stopPropagation();
      e.dataTransfer.dropEffect = 'move';
      tabsEl.querySelectorAll('.tab.tab-drop-target').forEach(t => t.classList.remove('tab-drop-target'));
      btn.classList.add('tab-drop-target');
    });
    btn.addEventListener('dragover', e => {
      e.preventDefault();
      e.stopPropagation();
      e.dataTransfer.dropEffect = 'move';
      btn.classList.add('tab-drop-target');
    });
    btn.addEventListener('dragleave', e => {
      if (!btn.contains(e.relatedTarget)) btn.classList.remove('tab-drop-target');
    });
    btn.addEventListener('drop', e => {
      e.preventDefault();
      btn.classList.remove('tab-drop-target');
      const id = e.dataTransfer.getData('text/plain');
      if (!id || ch === currentChannel) return;
      const numId = Number(id);
      if (!Number.isFinite(numId)) return;
      const rowEl = feedInner.querySelector('.msg[data-id="' + CSS.escape(String(numId)) + '"]');

          const ok = await moveSingleMessage(numId, ch);
          if (!ok) rowEl.style.visibility = '';

  addBtn.textContent = '+';
  addBtn.addEventListener('click', openChannelModal);
  tabsEl.appendChild(addBtn);

  updateTabsUI();
  updateAllTabBadges();
  refreshMoveTargets();
}

async function syncChannelsFromServer() {
  if (!currentUser) return;
  try {
    const { data, error } = await sb
      .from('channel_members')
      .select('channel')
      .eq('user_id', currentUser.id);
    if (error) {
      console.error(error);
      return;
    }
    const server = (data || [])
      .map(r => (typeof r.channel === 'string' ? r.channel.trim() : ''))
      .filter(ch => ch && ch !== 'main');
    const merged = new Set(['main', ...channels, ...server]);
    channels = Array.from(merged);
    saveChannelsList();
    await refreshSharedFlags();
    renderTabs();
    subscribeRealtimeAll();
    refreshMoveTargets();
  } catch (e) {
    console.error(e);
  }
}

async function refreshSharedFlags() {
  if (!currentUser) return;
  sharedChannels.clear();
  try {
    // mark channel as shared if it has any member other than me
    const { data, error } = await sb
      .from('channel_members')
      .select('channel,user_id')
      .in('channel', channels)
      .neq('user_id', currentUser.id);
    if (error) {
      console.error(error);
      return;
    }
    (data || []).forEach(r => {
      if (r && typeof r.channel === 'string') sharedChannels.add(r.channel);
    });
  } catch (e) {
    console.error(e);
  }
}

function switchChannel(ch) {
  if (ch === currentChannel) return;
  if (feedEl) {
    channelScroll.set(currentChannel, feedEl.scrollTop);
  }
  currentChannel = ch;
  try {
    localStorage.setItem(CURRENT_CHANNEL_KEY, currentChannel);
  } catch (_) {}
  unreadCounts.set(ch, 0);
  updateTabsUI();
  updateTabBadge(ch);
  refreshMoveTargets();
  loadFieldPrefsForCurrentChannel();
  applyFieldPrefsToMessages();
  if (input) input.blur();
  if (currentUser) {
    ensureMembership().then(reloadForUser);
  } else {
    clearMessages();
  }
}

async function createChannelFromModal() {
  if (!currentUser) {
    toast('Sign in to create a feed.');
    return;
  }
  if (!cmName || !cmOthers) return;
  let name = cmName.value.trim();
  if (!name) {
    toast('Feed name is required.');
    return;
  }
  if (name.toLowerCase() === 'main') {
    toast('Feed name "main" is reserved.');
    return;
  }

  if (!channels.includes(name)) {
    channels.push(name);
    saveChannelsList();
    renderTabs();
  }

  const extraRaw = cmOthers.value || '';
  const extraIds = extraRaw
    .split(',')
    .map(x => x.trim())
    .filter(x => x && x !== currentUser.id);

  try {
    const rows = [
      { channel: name, user_id: currentUser.id, creator_id: currentUser.id },
      ...extraIds.map(id => ({ channel: name, user_id: id, creator_id: currentUser.id })),
    ];
    await sb.from('channel_members').upsert(rows, { onConflict: 'channel,user_id' });
  } catch (e) {
    console.error(e);
    toast('Failed to save members — ' + humanError(e.message));
  }

  if (extraIds.length > 0) sharedChannels.add(name);

  closeChannelModal();
  switchChannel(name);
}

function deleteChannel(ch) {
  if (ch === 'main') return;
  channels = channels.filter(x => x !== ch);
  saveChannelsList();
  unreadCounts.delete(ch);
  sharedChannels.delete(ch);
  if (currentChannel === ch) {
    currentChannel = 'main';

  renderTabs();
  subscribeRealtimeAll();
  if (currentUser) {
    reloadForUser();
  } else {
    clearMessages();

function setupAuthListener() {
  sb.auth.onAuthStateChange(async (_event, session) => {
    const prevUser = currentUser;
    currentUser = session?.user ?? null;
    updateAuthUI();
    if (!prevUser && currentUser) {
      await syncChannelsFromServer();
      reloadForUser();

async function send() {
  const text = input.value.trim();
  if (!text) return;

  await sendText(text);
}

async function sendText(text) {
  const trimmed = (text || '').trim();
  if (!trimmed) return;

  if (!currentUser) {
    toast('Sign in with Google to send.');
    return;
  }

  sendBtn.disabled = true;
  input.disabled   = true;

  if (editingMessageId) {
    const { data, error } = await sb
      .from('entries')
      .update({ text: trimmed })
      .eq('id', editingMessageId)
      .eq('user_id', currentUser.id)
      .select('id, created_at, text, channel, user_id, author_name')
      .single();
    input.disabled = false;
    if (error) {
      console.error(error);
      toast('Failed to update — ' + humanError(error.message));
      sendBtn.disabled = false;
      return;
    }
    updateMessageRowText(editingMessageId, trimmed);
    editingMessageId = null;
    input.value = '';
    autoResize();
    sendBtn.disabled = true;
    updateClearInputBtn();
    saveInputGlobal();
    if (input.placeholder !== 'say something…') input.placeholder = 'say something…';
    requestAnimationFrame(() => { if (input) input.focus(); });
    return;
  }

  const { data, error } = await sb
    .from('entries')
    .insert({
      text: trimmed,
      user_id: currentUser.id,
      channel: currentChannel,
    })
    .select('id, created_at, text, channel, user_id, author_name')
    .single();

  input.disabled = false;

  if (error) {
    console.error(error);
    toast('Failed to send — ' + humanError(error.message));
    sendBtn.disabled = false;
  } else {
    if (data && data.channel === currentChannel) {
      hideEmpty();
      appendMsg(data, true);
      msgCount++;
      updateMsgCount();
    }
    input.value = '';
    autoResize();
    sendBtn.disabled = true;
    updateClearInputBtn();
    saveInputGlobal();
    requestAnimationFrame(() => { if (input) input.focus(); });
  }
}

function animateMessageToTab(rowEl, tabEl, onDone) {
  const from = rowEl.getBoundingClientRect();
  const clone = rowEl.cloneNode(true);
  clone.classList.add('msg-fly-clone');
  clone.style.left = from.left + 'px';
  clone.style.top = from.top + 'px';
  clone.style.width = from.width + 'px';
  clone.style.height = from.height + 'px';
  clone.style.transform = 'translate(0,0) scale(1)';
  clone.style.opacity = '1';
  document.body.appendChild(clone);
  rowEl.style.visibility = 'hidden';
  const to = tabEl.getBoundingClientRect();
  const toCenterX = to.left + to.width / 2;
  const toCenterY = to.top + to.height / 2;
  const fromCenterX = from.left + from.width / 2;
  const fromCenterY = from.top + from.height / 2;
  const dx = toCenterX - fromCenterX;
  const dy = toCenterY - fromCenterY;
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      clone.style.transform = 'translate(' + dx + 'px,' + dy + 'px) scale(0.25)';
      clone.style.opacity = '0';
    });
  });
  let done = false;
  const finish = () => {
    if (done) return;
    done = true;
    clone.remove();
    if (typeof onDone === 'function') onDone();
  };
  clone.addEventListener('transitionend', finish);
  setTimeout(finish, 500);
}

async function exportSingleMessage(id) {
  if (!currentUser || !id) return;
  try {
    const { data, error } = await sb
      .from('entries')
      .select('created_at,text,channel,user_id,author_name')
      .eq('id', id)
      .maybeSingle();
    if (error) {
      console.error(error);
      toast('Failed to export — ' + humanError(error.message));
      return;
    }
    if (!data) {
      toast('Nothing to export.');
      return;
    }
    const d = new Date(data.created_at);
    const timeStr = d.toLocaleString();
    let line;
    if (data.channel === 'main') {
      line = `[${timeStr}] ${data.text}`;
    } else {
      const author = data.author_name
        ? String(data.author_name)
        : (data.user_id ? String(data.user_id) : 'unknown');
      line = `[${timeStr}] ${author}: ${data.text}`;
    }
    const blob = new Blob([line + '\n'], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    const name = data.channel === 'main' ? 'feed' : data.channel;
    a.download = `inout-${name}-msg-${id}.txt`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  } catch (e) {
    console.error(e);
    toast('Failed to export — ' + humanError(e.message));
  }
}

          return row && row.dataset.id ? Number(row.dataset.id) : null;
        })
        .filter(id => typeof id === 'number');

      let query = sb
        .from('entries')
        .select('created_at,text,channel,user_id,author_name')
        .order('created_at', { ascending: true })
        .limit(1000);

      if (ids.length) {
        query = query.in('id', ids);
      } else {
        query = query.eq('channel', currentChannel);
        if (currentChannel === 'main') {
          query = query.eq('user_id', currentUser.id);
        }
      }

      const { data, error } = await query;
      if (error) {
        console.error(error);
        toast('Failed to export — ' + humanError(error.message));
        return;
      }

      const rows = data || [];
      if (!rows.length) {
        toast('Nothing to export.');
        return;
      }

      const lines = rows.map(row => {
        const d = new Date(row.created_at);
        const timeStr = d.toLocaleString();
        if (row.channel === 'main') {
          return `[${timeStr}] ${row.text}`;
        }
        const author = row.author_name
          ? String(row.author_name)
          : (row.user_id ? String(row.user_id) : 'unknown');
        return `[${timeStr}] ${author}: ${row.text}`;
      });

      const content = lines.join('\n');
      const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const name = currentChannel === 'main' ? 'feed' : currentChannel;
      a.href = url;
      a.download = `inout-${name}.txt`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    } catch (e) {
      console.error(e);
      toast('Failed to export — ' + humanError(e.message));
    }
  });
}

function autoResize() {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 160) + 'px';
}

/* ═══ SCROLL ══════════════════════════════════════════════ */
feedEl.addEventListener('scroll', () => {
  atBottom = isNearBottom();
  if (atBottom) scrollBtn.classList.remove('visible');
  if (input && document.activeElement === input) input.blur();
}, { passive: true });

function scrollBottom() {
  feedEl.scrollTop = feedEl.scrollHeight;
  scrollBtn.classList.remove('visible');
  atBottom = true;
}

/* ═══ UTILS ═══════════════════════════════════════════════ */
function formatTime(iso) {
  const d = new Date(iso);
  const now = new Date();
  const diff = now - d;

  if (diff < 60000)  return 'just now';
  if (diff < 3600000) {
    const m = Math.floor(diff / 60000);
    return m + 'm ago';
  }
  if (diff < 86400000) {
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });
  }
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

function escapeHtml(s) {
  return s
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function linkify(s) {
  return s.replace(
    /(https?:\/\/[^\s<>"']+)/g,
    '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>'
  );
}

function toast(msg, dur = 2800) {
  clearTimeout(toastTimer);
  toastEl.textContent = typeof msg === 'string' ? msg : String(msg);
  toastEl.classList.add('show');
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), dur);
}

function humanError(message) {
  if (!message) return 'Something went wrong.';
  const msg = message.toLowerCase();

  if (msg.includes('row-level security')) {
    return 'Not allowed to send this message (security rules).';
  }

  if (msg.includes('failed to fetch') || msg.includes('network')) {
    return 'Network issue — check your connection.';
  }

  if (msg.includes('invalid jw') || msg.includes('jwt')) {
    return 'Session expired — refresh and sign in again.';
  }

  return message;
}

/* ═══ GO ══════════════════════════════════════════════════ */
init();
</script>
